version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    build:
      html:
        - cd docs && uv run python -m sphinx -T -W -b dirhtml -j auto . $READTHEDOCS_OUTPUT/html

python:
  install:
    - method: uv
      command: sync

# No .html on files
sphinx:
  builder: dirhtml
  configuration: docs/conf.py
  fail_on_warning: true

# No PDF
formats: []
