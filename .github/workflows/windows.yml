name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

env:
  BUILD_VIDEOS: true


jobs:
  sphinx-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync

    - name: Build
      shell: cmd
      working-directory: ./docs
      run: |
        set SPHINXBUILD=uv run sphinx-build
        make.bat html
