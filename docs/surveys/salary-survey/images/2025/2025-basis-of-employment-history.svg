      <!-- Legend (right-aligned, 15px margins, boxed in top right corner) -->
      <g class="legend scale-employment-history">
        <rect x="348" y="85" width="295" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
        <circle class="employees" cx="365" cy="95" r="6"/>
        <text font-size="10" fill="#252521"><tspan x="374" y="99">Employees</tspan></text>
        <circle class="contractors" cx="439" cy="95" r="6"/>
        <text font-size="10" fill="#252521"><tspan x="448" y="99">Contractors</tspan></text>
        <circle class="employee-contractors" cx="521" cy="95" r="6"/>
        <text font-size="10" fill="#252521"><tspan x="530" y="99">Employee-contractors</tspan></text>
      </g>

