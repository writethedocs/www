            <text font-size="10" text-anchor="middle"><tspan x="424.3" y="374.0">2023</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="504.6" y="374.0">2024</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="584.9" y="374.0">2025</tspan></text>
          </g>
