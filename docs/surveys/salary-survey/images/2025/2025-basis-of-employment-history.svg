        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <clipPath id="clip-col0"><rect x="72.0"  y="216.7" width="62.3" height="138.8" rx="2"/></clipPath>
    <clipPath id="clip-col1"><rect x="152.3" y="194.5" width="62.3" height="161.0" rx="2"/></clipPath>
    <clipPath id="clip-col2"><rect x="232.6" y="163.7" width="62.3" height="191.8" rx="2"/></clipPath>
    <clipPath id="clip-col3"><rect x="312.9" y="250.5" width="62.2" height="105.0" rx="2"/></clipPath>
    <clipPath id="clip-col4"><rect x="393.1" y="152.1" width="62.3" height="203.4" rx="2"/></clipPath>
