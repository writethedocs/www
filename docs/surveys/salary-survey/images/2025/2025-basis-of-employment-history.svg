          <text font-size="10"><tspan x="40" y="308.0">250</tspan></text>
          <text font-size="10"><tspan x="40" y="258.0">500</tspan></text>
          <text font-size="10"><tspan x="40" y="208.0">750</tspan></text>
          <text font-size="10"><tspan x="40" y="158.0">1,000</tspan></text>
        </g>
