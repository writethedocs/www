        <g class="gridlines">
          <path d="M68 355.5H620" stroke="#F0F0F0"/>
          <path d="M68 305.5H620" stroke="#F0F0F0"/>
          <path d="M68 255.5H620" stroke="#F0F0F0"/>
          <path d="M68 205.5H620" stroke="#F0F0F0"/>
          <path d="M68 155.5H620" stroke="#F0F0F0"/>
        </g>
        <g class="axis-labels">
