  <g id="2025-basis-of-employment-history">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Basis of employment</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Respondents by survey year (2019-2025)</tspan></text>
    </g>

    <g class="bar-chart-vertical scale-employment-history">

