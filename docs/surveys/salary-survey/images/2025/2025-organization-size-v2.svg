<svg viewBox="0 0 660 436" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-organization-size-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Organization size</text>
        <text x="20" y="55" class="subtitle-text">Number of employees</text>
      </g>

      <g class="legend scale-single-series">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="552" y="20" width="88"/>
            <circle class="series-a" cx="565" cy="31"/>
            <text class="legend-label" x="573" y="35">Respondents</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-vertical scale-single-series" transform="translate(0 -20)">

      <g class="y-axis">

        <g class="gridlines">
          <path d="M68 369.5H620" stroke="#F0F0F0"/>
          <path d="M68 299.5H620" stroke="#F0F0F0"/>
          <path d="M68 229.5H620" stroke="#F0F0F0"/>
          <path d="M68 159.5H620" stroke="#F0F0F0"/>
        </g>

        <g class="axis-labels">
          <text font-size="10"><tspan x="45" y="372">0%</tspan></text>
          <text font-size="10"><tspan x="40" y="302">10%</tspan></text>
          <text font-size="10"><tspan x="40" y="232">20%</tspan></text>
          <text font-size="10"><tspan x="40" y="162">30%</tspan></text>
        </g>

      </g>

      <g class="data-series">

        <g class="a">

          <g class="axis-labels">
            <text font-size="10"><tspan x="98" y="386">1-10</tspan></text>
            <text font-size="10"><tspan x="174" y="386">11-50</tspan></text>
            <text font-size="10"><tspan x="251" y="386">51-100</tspan></text>
            <text font-size="10"><tspan x="324" y="386">101-1000</tspan></text>
            <text font-size="10"><tspan x="397" y="386">1001-10,000</tspan></text>
            <text font-size="10"><tspan x="469" y="386">10,001-100,000</tspan></text>
            <text font-size="10"><tspan x="560" y="386">100,000+</tspan></text>
          </g>

          <g class="bars">
            <!-- 1-10: 1.2% → top=362 -->
            <rect class="series-a" x="71"  y="362" width="73" height="8"   rx="2"/>
            <!-- 11-50: 4.9% → top=335 -->
            <rect class="series-a" x="150" y="335" width="73" height="35"  rx="2"/>
            <!-- 51-100: 7.4% → top=318 -->
            <rect class="series-a" x="229" y="318" width="72" height="52"  rx="2"/>
            <!-- 101-1,000: 34.4% → top=127 -->
            <rect class="series-a" x="308" y="127" width="72" height="243" rx="2"/>
            <!-- 1,001-10,000: 29.4% → top=162 -->
            <rect class="series-a" x="387" y="162" width="72" height="208" rx="2"/>
            <!-- 10,001-100,000: 14.4% → top=268 -->
            <rect class="series-a" x="465" y="268" width="73" height="102" rx="2"/>
            <!-- 100,000+: 8.3% → top=311 -->
            <rect class="series-a" x="544" y="311" width="73" height="59"  rx="2"/>
          </g>

          <g class="value-labels">

          </g>

        </g>

      </g>

      
    </g>
  </g>

</svg>
