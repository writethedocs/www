<svg viewBox="0 0 660 500" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
        .bars rect {
          fill-opacity: 0.8;
        }
        .bars rect:hover {
          fill-opacity: 1;
        }
