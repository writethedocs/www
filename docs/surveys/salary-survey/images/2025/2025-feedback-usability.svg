<svg viewBox="0 55 660 188" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-feedback-usability">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Survey feedback</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Form/website is usable</tspan></text>
    </g>

    <g class="donut-chart scale-feedback-likert">

      <!-- D (0.7%): t=180.0→182.5 -->
      <path class="slice disagree" d="M 180.0,222.0 A 150,150 0 0,1 180.1,215.4 L 270.1,219.4 A 60,60 0 0,0 270.0,222.0 Z"/>

      <!-- N (3.8%): t=182.5→196.2 -->
      <path class="slice neutral" d="M 180.1,215.4 A 150,150 0 0,1 186.0,180.2 L 272.4,205.3 A 60,60 0 0,0 270.1,219.4 Z"/>

      <!-- A (34.2%): t=196.2→319.3 -->
      <path class="slice agree" d="M 186.0,180.2 A 150,150 0 0,1 443.8,124.2 L 375.5,182.9 A 60,60 0 0,0 272.4,205.3 Z"/>

      <!-- SA (61.3%): t=319.3→540.0 -->
      <path class="slice strongly-agree" d="M 443.8,124.2 A 150,150 0 1,1 180.0,222.0 L 270.0,222.0 A 60,60 0 1,0 375.5,182.9 Z"/>

      <!-- Connectors -->
      <path d="M 469,105 C 463,105 443,114 440,116 L 437.0,119.5" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 190,109 C 196,110 208,120 212,123 L 215.1,125.6" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 145,179 C 151,179 175,188 179,191 L 182.9,192.6" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 145,205 C 150,205 173,211 176,212 L 180.0,213.7" stroke="#252521" stroke-dasharray="1 3"/>

      <!-- External labels -->
      <text font-size="10"><tspan x="473" y="103">Strongly agree</tspan></text>
      <text font-size="10"><tspan x="154" y="109">Agree</tspan></text>
      <text font-size="10"><tspan x="112" y="179">Neutral</tspan></text>
      <text font-size="10"><tspan x="54" y="205">Disagree (0.7%)</tspan></text>

      <!-- Inner value labels -->
      <text font-size="14" class="value-labels-inner reverse"><tspan x="383" y="140">61.3%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="228" y="142">34.2%</tspan></text>
      <text font-size="12" class="value-labels-inner"><tspan x="190" y="204">3.8%</tspan></text>

    </g>

  </g>

</svg>
