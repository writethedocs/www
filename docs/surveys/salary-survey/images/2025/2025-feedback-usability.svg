<svg viewBox="0 55 660 251" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-feedback-usability">
    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Survey feedback</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Form/website is usable</tspan></text>
    </g>

    <g class="donut-chart scale-feedback-likert" transform="translate(0 20)">
      <path class="slice disagree" d="M180 262 A150 150 0 0 1 180.036 258.702 L270.015 260.681 A60 60 0 0 0 270 262 Z"/>
      <path class="slice neutral" d="M180.036 258.702 A150 150 0 0 1 181.496 240.865 L270.599 253.546 A60 60 0 0 0 270.015 260.681 Z"/>
      <path class="slice agree" d="M181.496 240.865 A150 150 0 0 1 277.861 121.353 L309.145 205.741 A60 60 0 0 0 270.599 253.546 Z"/>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="248" y="200">34.2%</tspan></text>
      <path class="slice strongly-agree" d="M277.861 121.353 A150 150 0 0 1 480 262 L390 262 A60 60 0 0 0 309.145 205.741 Z"/>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="390" y="180">61.3%</tspan></text>
    </g>

    <g class="legend scale-feedback-likert">
      <rect x="220" y="70" width="425" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
      <circle class="swatch strongly-disagree" cx="233" cy="80" r="6"/>
      <text font-size="10"><tspan x="243" y="84">Strongly disagree</tspan></text>
      <circle class="swatch disagree" cx="341" cy="80" r="6"/>
      <text font-size="10"><tspan x="351" y="84">Disagree</tspan></text>
      <circle class="swatch neutral" cx="413" cy="80" r="6"/>
      <text font-size="10"><tspan x="423" y="84">Neutral</tspan></text>
      <circle class="swatch agree" cx="470" cy="80" r="6"/>
      <text font-size="10"><tspan x="480" y="84">Agree</tspan></text>
      <circle class="swatch strongly-agree" cx="523" cy="80" r="6"/>
      <text font-size="10"><tspan x="533" y="84">Strongly agree</tspan></text>
    </g>
  </g>

</svg>
