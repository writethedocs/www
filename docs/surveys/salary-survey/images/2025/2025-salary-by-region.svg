<svg viewBox="0 65 660 478" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-region" class="scale-salary-range">

    <g class="title">
      <text font-size="14"><tspan x="40" y="20">Median salary (USD) by respondent region</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="36">Employees — bar shows 25th–75th percentile range, line marks median</tspan></text>
    </g>

    <!-- Scale: BAR_START_X=158, x_end=625, range $0–$175,000 → 467px -->
    <!-- SCALE = 467/175000 = 0.002669 per dollar -->
    <!-- x($50K)=291.4, x($100K)=424.9, x($150K)=558.3 -->

    <!-- Grid lines (start 30px below legend bottom: legend bottom=100, grid start=130) -->
    <line x1="291.4" y1="130" x2="291.4" y2="515" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="424.9" y1="130" x2="424.9" y2="515" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="558.3" y1="130" x2="558.3" y2="515" stroke="#E8E8E8" stroke-width="1"/>

    <!-- X-axis line -->
    <line x1="158" y1="515" x2="625" y2="515" stroke="#CCCCCC" stroke-width="1"/>

    <!-- X-axis labels -->
    <text font-size="10" text-anchor="middle" fill="#888888"><tspan x="158" y="528">$0</tspan></text>
    <text font-size="10" text-anchor="middle" fill="#888888"><tspan x="291.4" y="528">$50K</tspan></text>
    <text font-size="10" text-anchor="middle" fill="#888888"><tspan x="424.9" y="528">$100K</tspan></text>
    <text font-size="10" text-anchor="middle" fill="#888888"><tspan x="558.3" y="528">$150K</tspan></text>

    <!-- Legend (right-aligned, 15px margins, boxed; box top=80=65+15, right edge=645=660-15) -->
    <rect x="340" y="80" width="305" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
    <rect x="347" y="86" width="16" height="8" class="percentile-range" rx="1"/>
    <text font-size="9" fill="#252521"><tspan x="368" y="94">25th–75th percentile</tspan></text>
    <line x1="479" y1="84" x2="479" y2="96" class="median" stroke-width="3"/>
    <text font-size="9" fill="#252521"><tspan x="486" y="94">median</tspan></text>
    <circle cx="535" cy="90" r="4" class="median-only" opacity="0.4"/>
    <text font-size="9" fill="#252521"><tspan x="543" y="94">median only (N&lt;30)</tspan></text>

    <!-- Rows: BAR_HEIGHT=16, ROW_HEIGHT=26 -->
    <!-- Region labels: font-size=12, bold. Sub-region labels: font-size=11, indented. -->

    <!-- 1. Worldwide (696): 25=$65,450→332.6, 50=$93,759→408.2, 75=$138,625→527.9 -->
    <text font-size="12" text-anchor="end" font-weight="bold" fill="#252521"><tspan x="150" y="143">Worldwide (696)</tspan></text>
    <rect x="332.6" y="130" width="195.3" height="16" class="percentile-range" rx="1"/>
    <line x1="408.2" y1="127" x2="408.2" y2="147" class="median" stroke-width="3"/>

    <!-- 2. North America (421): 25=$90,000→398.2, 50=$119,000→475.6, 75=$160,000→585.0 -->
    <text font-size="12" text-anchor="end" font-weight="bold" fill="#252521"><tspan x="150" y="169">North America (421)</tspan></text>
    <rect x="398.2" y="156" width="186.8" height="16" class="percentile-range" rx="1"/>
    <line x1="475.6" y1="153" x2="475.6" y2="173" class="median" stroke-width="3"/>

    <!-- 3. United States (370): 50=$125,000→491.6 -->
    <text font-size="11" text-anchor="end" fill="#666666"><tspan x="150" y="195">&#x2014; United States (370)</tspan></text>
    <circle cx="491.6" cy="190" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="499" y="194">$125,000</tspan></text>

    <!-- 4. Canada (50): 50=$71,543→348.9 -->
    <text font-size="11" text-anchor="end" fill="#666666"><tspan x="150" y="221">&#x2014; Canada (50)</tspan></text>
    <circle cx="348.9" cy="216" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="356" y="220">$71,543</tspan></text>

    <!-- 5. Europe (182): 25=$50,397→292.5, 50=$66,808→336.3, 75=$90,830→400.4 -->
    <text font-size="12" text-anchor="end" font-weight="bold" fill="#252521"><tspan x="150" y="247">Europe (182)</tspan></text>
    <rect x="292.5" y="234" width="107.9" height="16" class="percentile-range" rx="1"/>
    <line x1="336.3" y1="231" x2="336.3" y2="251" class="median" stroke-width="3"/>

    <!-- 6. United Kingdom (43): 50=$85,681→386.6 -->
    <text font-size="11" text-anchor="end" fill="#666666"><tspan x="150" y="273">&#x2014; United Kingdom (43)</tspan></text>
    <circle cx="386.6" cy="268" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="394" y="272">$85,681</tspan></text>

    <!-- 7. Germany (39): 50=$76,815→362.9 -->
    <text font-size="11" text-anchor="end" fill="#666666"><tspan x="150" y="299">&#x2014; Germany (39)</tspan></text>
    <circle cx="362.9" cy="294" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="370" y="298">$76,815</tspan></text>

    <!-- 8. France (16): 50=$49,619→290.4 -->
    <text font-size="11" text-anchor="end" fill="#666666"><tspan x="150" y="325">&#x2014; France (16)</tspan></text>
    <circle cx="290.4" cy="320" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="298" y="324">$49,619</tspan></text>

    <!-- 9. Romania (12): 50=$53,420→300.5 -->
    <text font-size="11" text-anchor="end" fill="#666666"><tspan x="150" y="351">&#x2014; Romania (12)</tspan></text>
    <circle cx="300.5" cy="346" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="308" y="350">$53,420</tspan></text>

    <!-- 10. Asia (39): 25=$20,220→212.0, 50=$32,134→243.8, 75=$59,762→317.5 -->
    <text font-size="12" text-anchor="end" font-weight="bold" fill="#252521"><tspan x="150" y="377">Asia (39)</tspan></text>
    <rect x="212.0" y="364" width="105.5" height="16" class="percentile-range" rx="1"/>
    <line x1="243.8" y1="361" x2="243.8" y2="381" class="median" stroke-width="3"/>

    <!-- 11. India (27): 50=$32,134→243.8 -->
    <text font-size="11" text-anchor="end" fill="#666666"><tspan x="150" y="403">&#x2014; India (27)</tspan></text>
    <circle cx="243.8" cy="398" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="251" y="402">$32,134</tspan></text>

    <!-- 12. Oceania (29): 50=$80,591→373.0 -->
    <text font-size="12" text-anchor="end" font-weight="bold" fill="#252521"><tspan x="150" y="429">Oceania (29)</tspan></text>
    <circle cx="373.0" cy="424" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="381" y="428">$80,591</tspan></text>

    <!-- 13. Australia (25): 50=$88,006→392.8 -->
    <text font-size="11" text-anchor="end" fill="#666666"><tspan x="150" y="455">&#x2014; Australia (25)</tspan></text>
    <circle cx="392.8" cy="450" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="400" y="454">$88,006</tspan></text>

    <!-- 14. South America (15): 50=$13,325→193.6 -->
    <text font-size="12" text-anchor="end" font-weight="bold" fill="#252521"><tspan x="150" y="481">South America (15)</tspan></text>
    <circle cx="193.6" cy="476" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="201" y="480">$13,325</tspan></text>

    <!-- 15. Brazil (13): 50=$12,895→192.4 -->
    <text font-size="11" text-anchor="end" fill="#666666"><tspan x="150" y="507">&#x2014; Brazil (13)</tspan></text>
    <circle cx="192.4" cy="502" r="5" class="median-only" opacity="0.5"/>
    <text font-size="9" fill="#666666"><tspan x="200" y="506">$12,895</tspan></text>

  </g>

</svg>
