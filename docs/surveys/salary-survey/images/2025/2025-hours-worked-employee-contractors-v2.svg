<svg viewBox="0 0 660 355" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-hours-worked-employee-contractors-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Approximate total weekly hours</text>
        <text x="20" y="55" class="subtitle-text">Employee-contractor respondents (34)</text>
      </g>

      <g class="legend scale-single-series">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="512" y="20" width="128"/>
            <circle class="series-a" cx="525" cy="31"/>
            <text class="legend-label" x="533" y="35">Employee-contractors</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-vertical scale-single-series">
      <g class="y-axis">
        <g class="gridlines">
          <path d="M20 314.9H640"/>
          <path d="M20 240.7H640"/>
          <path d="M20 166.3H640"/>
        </g>
        <g class="axis-labels">
          <text font-size="10"><tspan x="25" y="317.9">0%</tspan></text>
          <text font-size="10"><tspan x="20" y="243.7">25%</tspan></text>
          <text font-size="10"><tspan x="20" y="169.3">50%</tspan></text>
        </g>
      </g>

      <g class="data-series">
        <g class="a">
          <g class="axis-labels">
            <text font-size="12" text-anchor="middle"><tspan x="126.8" y="332.8">1–40</tspan></text>
            <text font-size="12" text-anchor="middle"><tspan x="275.3" y="332.8">41–60</tspan></text>
            <text font-size="12" text-anchor="middle"><tspan x="423.8" y="332.8">61–80</tspan></text>
            <text font-size="12" text-anchor="middle"><tspan x="572.3" y="332.8">81+</tspan></text>
          </g>
          <g class="bars">
            <rect x="62.0" y="288.5" width="129.5" height="26.8" rx="2"/>
            <rect x="210.5" y="183.2" width="129.5" height="132.2" rx="2"/>
            <rect x="359.0" y="191.9" width="129.5" height="123.4" rx="2"/>
            <rect x="507.5" y="297.4" width="129.5" height="18.1" rx="2"/>
          </g>
          <g class="value-labels">
          </g>
        </g>
      </g>
    </g>
  </g>

</svg>
