<svg viewBox="0 20 660 430" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-satisfaction-factors-teams-contractors">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Satisfaction factors: teams and organizations</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Contractors</tspan></text>
    </g>

    <g class="bar-chart-horizontal scale-statement-bars">

      <g class="legend">
        <rect x="395" y="35" width="250" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
        <circle cx="405" cy="45" r="6" class="disagree"/>
        <circle cx="468" cy="45" r="6" class="neutral"/>
        <circle cx="526" cy="45" r="6" class="agree"/>
        <circle cx="580" cy="45" r="6" class="dont-know"/>
        <text font-size="10" fill="#252521"><tspan x="415" y="49">Disagree</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="478" y="49">Neutral</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="536" y="49">Agree</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="590" y="49">Don&#x2019;t know</tspan></text>
      </g>

      <g class="row-0">
        <text font-size="12" fill="#252521"><tspan x="83" y="100">To my knowledge, rates are</tspan><tspan x="73" y="113">consistent across similar roles</tspan></text>
        <rect x="243" y="82" width="82" height="38" rx="2" class="disagree"/>
        <rect x="327" y="82" width="27" height="38" rx="2" class="neutral"/>
        <rect x="356" y="82" width="86" height="38" rx="2" class="agree"/>
        <rect x="518" y="82" width="127" height="38" rx="2" class="dont-know"/>
        <text font-size="12" class="value-labels-inner"><tspan x="266" y="105">25.4%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="381" y="105">26.8%</tspan></text>
        <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="582" y="105">39.4%</tspan></text>
      </g>

      <g class="row-1">
        <text font-size="12" fill="#252521"><tspan x="12" y="157">To my knowledge, all genders are paid equally</tspan></text>
        <rect x="267" y="132" width="58" height="38" rx="2" class="disagree"/>
        <rect x="327" y="132" width="27" height="38" rx="2" class="neutral"/>
        <rect x="356" y="132" width="80" height="38" rx="2" class="agree"/>
        <rect x="488" y="132" width="157" height="38" rx="2" class="dont-know"/>
        <text font-size="12" class="value-labels-inner"><tspan x="281" y="155">18.1%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="378" y="155">25.0%</tspan></text>
        <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="567" y="155">48.6%</tspan></text>
      </g>

      <g class="row-2">
        <text font-size="12" fill="#252521"><tspan x="91" y="200">My role is sufficiently</tspan><tspan x="100" y="213">valued / funded</tspan></text>
        <rect x="221" y="182" width="96" height="38" rx="2" class="disagree"/>
        <rect x="319" y="182" width="42" height="38" rx="2" class="neutral"/>
        <rect x="363" y="182" width="184" height="38" rx="2" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="251" y="205">29.9%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="325" y="205">13.0%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="437" y="205">57.1%</tspan></text>
      </g>

      <g class="row-3">
        <text font-size="12" fill="#252521"><tspan x="15" y="257">I like and/or respect my managers and team leaders</tspan></text>
        <rect x="301" y="232" width="25" height="38" rx="2" class="disagree"/>
        <rect x="328" y="232" width="25" height="38" rx="2" class="neutral"/>
        <rect x="355" y="232" width="271" height="38" rx="2" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="472" y="255">84.2%</tspan></text>
      </g>

      <g class="row-4">
        <text font-size="12" fill="#252521"><tspan x="125" y="307">I like and/or respect my co-workers</tspan></text>
        <rect x="319" y="282" width="5" height="38" rx="2" class="disagree"/>
        <rect x="326" y="282" width="17" height="38" rx="2" class="neutral"/>
        <rect x="345" y="282" width="300" height="38" rx="2" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="477" y="305">93.2%</tspan></text>
      </g>

      <g class="row-5">
        <text font-size="12" fill="#252521"><tspan x="65" y="357">I like and/or respect my organization</tspan></text>
        <rect x="270" y="332" width="30" height="38" rx="2" class="disagree"/>
        <rect x="302" y="332" width="77" height="38" rx="2" class="neutral"/>
        <rect x="381" y="332" width="215" height="38" rx="2" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="322" y="355">24.0%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="470" y="355">66.7%</tspan></text>
      </g>

      <g class="row-6">
        <text font-size="12" fill="#252521"><tspan x="43" y="400">I&#x2019;m satisfied with our</tspan><tspan x="6" y="413">methodologies, systems &amp; practices</tspan></text>
        <rect x="199" y="382" width="99" height="38" rx="2" class="disagree"/>
        <rect x="300" y="382" width="81" height="38" rx="2" class="neutral"/>
        <rect x="383" y="382" width="142" height="38" rx="2" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="230" y="405">30.7%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="322" y="405">25.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="436" y="405">44.0%</tspan></text>
      </g>

    </g>

  </g>

</svg>
