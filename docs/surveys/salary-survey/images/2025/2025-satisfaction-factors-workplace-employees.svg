<svg viewBox="0 20 660 235" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-satisfaction-factors-workplace-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Satisfaction factors: workplace</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees</tspan></text>
    </g>

    <g class="bar-chart-horizontal">

      <g class="legend">
        <rect x="469" y="35" width="176" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
        <circle cx="482" cy="45" r="6" fill="#E4774E"/>
        <circle cx="545" cy="45" r="6" fill="#E9C168"/>
        <circle cx="603" cy="45" r="6" fill="#82A555"/>
        <text font-size="10" fill="#252521"><tspan x="492" y="49">Disagree</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="555" y="49">Neutral</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="613" y="49">Agree</tspan></text>
      </g>

      <g class="flexibility">
        <text font-size="10" fill="#252521"><tspan x="50" y="99">I have flexibility in my work location</tspan></text>
        <rect x="263" y="82" width="53" height="27" rx="5" fill="#E4774E"/>
        <rect x="318" y="82" width="25" height="27" rx="5" fill="#E9C168"/>
        <rect x="345" y="82" width="244" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="272" y="100">16.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="449" y="100">75.8%</tspan></text>
      </g>

      <g class="remote">
        <text font-size="10" fill="#252521"><tspan x="88" y="138">Our remote work systems function well</tspan></text>
        <rect x="295" y="121" width="19" height="27" rx="5" fill="#E4774E"/>
        <rect x="316" y="121" width="28" height="27" rx="5" fill="#E9C168"/>
        <rect x="346" y="121" width="275" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="466" y="139">85.4%</tspan></text>
      </g>

      <g class="on-site">
        <text font-size="10" fill="#252521"><tspan x="55" y="177">Our on-site work systems function well</tspan></text>
        <rect x="271" y="160" width="27" height="27" rx="5" fill="#E4774E"/>
        <rect x="300" y="160" width="61" height="27" rx="5" fill="#E9C168"/>
        <rect x="363" y="160" width="234" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="313" y="178">19.0%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="462" y="178">72.7%</tspan></text>
      </g>

      <g class="hybrid">
        <text font-size="10" fill="#252521"><tspan x="63" y="216">Our hybrid work systems function well</tspan></text>
        <rect x="271" y="199" width="26" height="27" rx="5" fill="#E4774E"/>
        <rect x="299" y="199" width="62" height="27" rx="5" fill="#E9C168"/>
        <rect x="363" y="199" width="234" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="312" y="217">19.1%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="462" y="217">72.7%</tspan></text>
      </g>

    </g>

  </g>

</svg>
