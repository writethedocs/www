<svg viewBox="0 35 660 217" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-earnings-satisfaction-contractors">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Earnings satisfaction</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Contractors</tspan></text>
    </g>

    <g class="donut-chart">

      <!-- Very unsatisfied (13.8%): 180.0°→204.8° -->
      <path d="M180.000 236.000 A150 150 0 0 1 193.779 173.201 L275.511 210.880 A60 60 0 0 0 270.000 236.000 Z" fill="#C2255C" stroke="white" stroke-width="2"/>

      <!-- Unsatisfied (16.2%): 204.8°→234.0° -->
      <path d="M193.779 173.201 A150 150 0 0 1 241.832 114.647 L294.733 187.459 A60 60 0 0 0 275.511 210.880 Z" fill="#E4774E" stroke="white" stroke-width="2"/>

      <!-- Neutral (17.5%): 234.0°→265.5° -->
      <path d="M241.832 114.647 A150 150 0 0 1 318.231 86.462 L325.292 176.185 A60 60 0 0 0 294.733 187.459 Z" fill="#E9C168" stroke="white" stroke-width="2"/>

      <!-- Satisfied (41.2%): 265.5°→339.8° -->
      <path d="M318.231 86.462 A150 150 0 0 1 470.729 184.082 L386.291 215.233 A60 60 0 0 0 325.292 176.185 Z" fill="#82A555" stroke="white" stroke-width="2"/>

      <!-- Very satisfied (11.2%): 339.8°→360.0° -->
      <path d="M470.729 184.082 A150 150 0 0 1 480.000 236.000 L390.000 236.000 A60 60 0 0 0 386.291 215.233 Z" fill="#087F5B" stroke="white" stroke-width="2"/>

      <!-- Connectors and labels -->
      <path d="M144.3 198.4 C144.3 198.4 163.9 199.6 180.6 203.2" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M182.0 120.6 C182.0 120.6 198.6 128.2 211.7 138.9" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M261.0 64.4 C261.0 64.4 271.2 76.5 277.0 92.5" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M434.7 82.2 C434.7 82.2 421.7 92.8 412.5 107.1" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M517.1 205.5 C517.1 205.5 497.4 206.1 480.6 209.1" stroke="#252521" stroke-dasharray="1 3"/>

      <!-- Outer labels -->
      <text font-size="12"><tspan x="62" y="200">Very unsatisfied</tspan></text>
      <text font-size="12"><tspan x="125" y="123">Unsatisfied</tspan></text>
      <text font-size="12"><tspan x="222" y="66">Neutral</tspan></text>
      <text font-size="12"><tspan x="438" y="84">Satisfied</tspan></text>
      <text font-size="12"><tspan x="520" y="207">Very satisfied</tspan></text>

      <!-- Inner percentage labels -->
      <text font-size="14" class="value-labels-inner"><tspan x="205" y="217">13.8%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="227" y="171">16.2%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="274" y="138">17.5%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="371" y="148">41.2%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="420" y="222">11.2%</tspan></text>

    </g>

  </g>

</svg>