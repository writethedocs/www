      <rect x="228" y="62" width="313" height="16"/>
      <!-- Information architecture: 44.8% = 261px -->
      <rect x="228" y="88" width="261" height="16"/>
      <!-- UX writer: 34.3% = 200px -->
      <rect x="228" y="114" width="200" height="16"/>
      <!-- DocOps: 32.2% = 188px -->
