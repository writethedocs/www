<svg viewBox="0 40 660 330" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-additional-role-categories">

    <g class="title">
      <text font-size="14"><tspan x="40" y="25">Additional role categories</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="41">All respondents (n=755) — top 11 of 19 categories</tspan></text>
    </g>

    <!-- Gridlines at 20%, 40%, 60% (scale: 350px = 60%) -->
    <g class="gridlines">
      <line x1="345" y1="62" x2="345" y2="348" stroke="#F2F4F6" stroke-width="1"/>
      <line x1="461" y1="62" x2="461" y2="348" stroke="#F2F4F6" stroke-width="1"/>
      <line x1="578" y1="62" x2="578" y2="348" stroke="#F2F4F6" stroke-width="1"/>
    </g>

    <!-- Axis baseline -->
    <line x1="228" y1="62" x2="228" y2="348" stroke="#D8D8D5" stroke-width="1"/>

    <!-- Row labels (right-aligned) -->
    <g font-size="10" text-anchor="end" fill="#50514F">
      <text><tspan x="222" y="74">Editor</tspan></text>
      <text><tspan x="222" y="100">Information architecture</tspan></text>
      <text><tspan x="222" y="126">Technical writer</tspan></text>
      <text><tspan x="222" y="152">UX writer</tspan></text>
      <text><tspan x="222" y="178">DocOps</tspan></text>
      <text><tspan x="222" y="204">Content producer</tspan></text>
      <text><tspan x="222" y="230">Mentoring</tspan></text>
      <text><tspan x="222" y="256">Subject matter expert</tspan></text>
      <text><tspan x="222" y="282">Testing / QA</tspan></text>
      <text><tspan x="222" y="308">Manager or team leader</tspan></text>
      <text><tspan x="222" y="334">Project or product manager</tspan></text>
    </g>

    <!-- Bars -->
    <g fill="#00AEFF">
      <!-- Editor: 54.7% = 319px -->
      <rect x="228" y="62" width="319" height="16"/>
      <!-- Information architecture: 45.3% = 264px -->
      <rect x="228" y="88" width="264" height="16"/>
      <!-- Technical writer: 43.4% = 253px -->
      <rect x="228" y="114" width="253" height="16"/>
      <!-- UX writer: 34.7% = 202px -->
      <rect x="228" y="140" width="202" height="16"/>
      <!-- DocOps: 32.8% = 192px -->
      <rect x="228" y="166" width="192" height="16"/>
      <!-- Content producer: 24.2% = 141px -->
      <rect x="228" y="192" width="141" height="16"/>
      <!-- Mentoring: 24.2% = 141px -->
      <rect x="228" y="218" width="141" height="16"/>
      <!-- Subject matter expert: 24.0% = 140px -->
      <rect x="228" y="244" width="140" height="16"/>
      <!-- Testing / QA: 21.7% = 127px -->
      <rect x="228" y="270" width="127" height="16"/>
      <!-- Manager or team leader: 21.3% = 124px -->
      <rect x="228" y="296" width="124" height="16"/>
      <!-- Project or product manager: 19.7% = 115px -->
      <rect x="228" y="322" width="115" height="16"/>
    </g>

    <!-- Value labels -->
    <g font-size="9" text-anchor="start" fill="#50514F">
      <text><tspan x="552" y="74">54.7%</tspan></text>
      <text><tspan x="497" y="100">45.3%</tspan></text>
      <text><tspan x="486" y="126">43.4%</tspan></text>
      <text><tspan x="435" y="152">34.7%</tspan></text>
      <text><tspan x="425" y="178">32.8%</tspan></text>
      <text><tspan x="374" y="204">24.2%</tspan></text>
      <text><tspan x="374" y="230">24.2%</tspan></text>
      <text><tspan x="373" y="256">24.0%</tspan></text>
      <text><tspan x="360" y="282">21.7%</tspan></text>
      <text><tspan x="357" y="308">21.3%</tspan></text>
      <text><tspan x="348" y="334">19.7%</tspan></text>
    </g>

    <!-- X-axis percentage labels -->
    <g font-size="9" text-anchor="middle" fill="#999999">
      <text><tspan x="228" y="364">0%</tspan></text>
      <text><tspan x="345" y="364">20%</tspan></text>
      <text><tspan x="461" y="364">40%</tspan></text>
      <text><tspan x="578" y="364">60%</tspan></text>
    </g>

  </g>

</svg>
