<svg viewBox="0 0 660 340" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
        .range-row rect,
        .range-row line,
        .point-row circle {
          transition: opacity 0.15s ease;
        }
        .range-row rect,
        .range-row line {
          opacity: 0.8;
        }
        .point-row circle {
          opacity: 0.5;
        }
        .range-row:hover rect,
        .range-row:hover line,
        .point-row:hover circle {
          opacity: 1;
        }
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-education-na-v2" class="scale-salary-range">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text"><tspan x="20" y="35">Salary (USD)</tspan><tspan x="20" y="53">by education level — North America</tspan></text>
        <text x="20" y="76" class="subtitle-text"><tspan x="20" y="76">Bars show 25th–75th percentile range,</tspan><tspan x="20" y="92">markers show median</tspan></text>
      </g>

      <g class="legend">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="310" y="20" width="134"/>
            <rect class="percentile-range" x="323" y="27" width="16" height="8" rx="1"/>
            <text class="legend-label" x="344" y="35">25th–75th percentile</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="454" y="20" width="65"/>
            <line class="median" x1="467" y1="28" x2="467" y2="36" stroke-width="3"/>
            <text class="legend-label" x="475" y="35">Median</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="529" y="20" width="111"/>
            <circle class="median-only" cx="542" cy="31" r="4"/>
            <text class="legend-label" x="550" y="35">Median only (&lt;30)</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-horizontal scale-salary-range" transform="translate(0 70)">
      <g class="grid" stroke="#E8E8E8" stroke-width="1">
        <line x1="224.0" y1="66" x2="224.0" y2="208"/>
        <line x1="320.0" y1="66" x2="320.0" y2="208"/>
        <line x1="416.0" y1="66" x2="416.0" y2="208"/>
        <line x1="512.0" y1="66" x2="512.0" y2="208"/>
      </g>

      <g class="labels" font-size="10" text-anchor="end">
        <text><tspan x="120" y="80">High school</tspan></text>
        <text><tspan x="120" y="108">Undergraduate</tspan></text>
        <text><tspan x="120" y="136">Multiple undergraduate</tspan></text>
        <text><tspan x="120" y="164">Postgraduate</tspan></text>
        <text><tspan x="120" y="192">Multiple postgraduate</tspan></text>
      </g>

      <g class="tracks">
        <rect class="track" x="128" y="66" width="480" height="20"/>
        <rect class="track" x="128" y="94" width="480" height="20"/>
        <rect class="track" x="128" y="122" width="480" height="20"/>
        <rect class="track" x="128" y="150" width="480" height="20"/>
        <rect class="track" x="128" y="178" width="480" height="20"/>
      </g>

      <g class="ranges">
        <g class="range-row">
          <rect x="344.3" y="94" width="160.0" height="20" class="percentile-range" rx="2"/>
          <line x1="410.7" y1="91" x2="410.7" y2="117" class="median" stroke-width="3"/>
        </g>
        <g class="range-row">
          <rect x="332.1" y="150" width="181.8" height="20" class="percentile-range" rx="2"/>
          <line x1="413.1" y1="147" x2="413.1" y2="173" class="median" stroke-width="3"/>
        </g>
      </g>

      <g class="median-points">
        <g class="point-row"><circle cx="404.7" cy="76" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="368.7" cy="132" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="420.3" cy="188" r="5" class="median-only"/></g>
      </g>

      <g class="value-labels-outer" text-anchor="end">
        <text><tspan x="640" y="80">$116K</tspan></text>
        <text><tspan x="640" y="108">$118K</tspan></text>
        <text><tspan x="640" y="136">$101K</tspan></text>
        <text><tspan x="640" y="164">$119K</tspan></text>
        <text><tspan x="640" y="192">$122K</tspan></text>
      </g>

      <g class="x-axis" text-anchor="middle">
        <line x1="128" y1="218" x2="608" y2="218" stroke="#F0F0F0" stroke-width="1"/>
        <g class="axis-labels">
          <text font-size="10"><tspan x="128" y="238">$0</tspan></text>
          <text font-size="10"><tspan x="224.0" y="238">$40K</tspan></text>
          <text font-size="10"><tspan x="320.0" y="238">$80K</tspan></text>
          <text font-size="10"><tspan x="416.0" y="238">$120K</tspan></text>
          <text font-size="10"><tspan x="512.0" y="238">$160K</tspan></text>
          <text font-size="10"><tspan x="608.0" y="238">$200K</tspan></text>
        </g>
      </g>
    </g>
  </g>

</svg>
