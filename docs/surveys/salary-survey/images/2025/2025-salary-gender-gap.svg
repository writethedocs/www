<svg viewBox="0 50 660 233" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-salary-gender-gap" class="scale-gender-gap">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Median salary by gender identity (USD)</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees — regions with 30+ respondents per gender shown</tspan></text>
    </g>

    <!-- Scale: x_base=118 (at $50K), x_end=622 (at $150K), range=$100K over 504px -->
    <!-- SCALE = 504/100000 = 0.00504 px/dollar; x(v) = 118 + (v - 50000) * 0.00504 -->
    <!-- x($50K)=118, x($75K)=244, x($100K)=370, x($125K)=496, x($150K)=622 -->

    <!-- Legend (right-aligned, 15px right margin, 15px top margin, 6px internal padding) -->
    <!-- Box: right edge=645 (660-15), top=65 (50+15), bottom=89, legend-to-graph gap=15px -->
    <rect x="529" y="65" width="116" height="24" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
    <circle cx="541" cy="77" r="6" class="women"/>
    <text font-size="10" fill="#252521"><tspan x="552" y="81">Women</tspan></text>
    <circle cx="606" cy="77" r="6" class="men"/>
    <text font-size="10" fill="#252521"><tspan x="617" y="81">Men</tspan></text>

    <!-- Grid lines (start at y=104, 15px below legend bottom at y=89) -->
    <line x1="118" y1="104" x2="118" y2="255" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="244" y1="104" x2="244" y2="255" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="370" y1="104" x2="370" y2="255" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="496" y1="104" x2="496" y2="255" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="622" y1="104" x2="622" y2="255" stroke="#E8E8E8" stroke-width="1"/>

    <!-- X-axis line -->
    <line x1="118" y1="255" x2="622" y2="255" stroke="#CCCCCC" stroke-width="1"/>

    <!-- X-axis labels -->
    <text font-size="10" text-anchor="middle" fill="#888888"><tspan x="118" y="268">$50K</tspan></text>
    <text font-size="10" text-anchor="middle" fill="#888888"><tspan x="244" y="268">$75K</tspan></text>
    <text font-size="10" text-anchor="middle" fill="#888888"><tspan x="370" y="268">$100K</tspan></text>
    <text font-size="10" text-anchor="middle" fill="#888888"><tspan x="496" y="268">$125K</tspan></text>
    <text font-size="10" text-anchor="middle" fill="#888888"><tspan x="622" y="268">$150K</tspan></text>

    <!-- Row: Worldwide — row labels right-align at x=90 (~15px left margin) -->
    <!-- Women $91,750 → x=328.4, Men $99,000 → x=365.0 -->
    <text font-size="11" text-anchor="end" fill="#252521"><tspan x="90" y="122">Worldwide</tspan></text>
    <line x1="328.4" y1="118" x2="365.0" y2="118" stroke="#888888" stroke-width="1.5"/>
    <circle cx="328.4" cy="118" r="8" class="women"/>
    <circle cx="365.0" cy="118" r="8" class="men"/>
    <text font-size="9" text-anchor="middle" fill="#555555"><tspan x="328.4" y="136">$91,750</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#555555"><tspan x="365.0" y="136">$99,000</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#888888"><tspan x="346.7" y="107">+7.9%</tspan></text>

    <!-- Row: North America -->
    <!-- Women $116,000 → x=450.6, Men $131,500 → x=528.8 -->
    <text font-size="11" text-anchor="end" fill="#252521"><tspan x="90" y="174">North America</tspan></text>
    <line x1="450.6" y1="170" x2="528.8" y2="170" stroke="#888888" stroke-width="1.5"/>
    <circle cx="450.6" cy="170" r="8" class="women"/>
    <circle cx="528.8" cy="170" r="8" class="men"/>
    <text font-size="9" text-anchor="middle" fill="#555555"><tspan x="450.6" y="188">$116,000</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#555555"><tspan x="528.8" y="188">$131,500</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#888888"><tspan x="489.7" y="159">+13.4%</tspan></text>

    <!-- Row: Europe -->
    <!-- Women $60,526 → x=171.0, Men $76,137 → x=249.7 -->
    <text font-size="11" text-anchor="end" fill="#252521"><tspan x="90" y="226">Europe</tspan></text>
    <line x1="171.0" y1="222" x2="249.7" y2="222" stroke="#888888" stroke-width="1.5"/>
    <circle cx="171.0" cy="222" r="8" class="women"/>
    <circle cx="249.7" cy="222" r="8" class="men"/>
    <text font-size="9" text-anchor="middle" fill="#555555"><tspan x="171.0" y="240">$60,526</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#555555"><tspan x="249.7" y="240">$76,137</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#888888"><tspan x="210.4" y="211">+25.8%</tspan></text>

  </g>

</svg>
