<svg viewBox="0 0 660 473" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-satisfaction-factors-team-employees-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Satisfaction factors:</text>
        <text x="20" y="53" class="title-text">team and organization</text>
        <text x="20" y="71" class="subtitle-text">Employee respondents (709)</text>
      </g>

      <g class="legend scale-statement-bars">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="334" y="20" width="70"/>
            <circle class="disagree" cx="347" cy="31"/>
            <text class="legend-label" x="355" y="35">Disagree</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="414" y="20" width="65"/>
            <circle class="neutral" cx="427" cy="31"/>
            <text class="legend-label" x="435" y="35">Neutral</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="489" y="20" width="59"/>
            <circle class="agree" cx="502" cy="31"/>
            <text class="legend-label" x="510" y="35">Agree</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="558" y="20" width="82"/>
            <circle class="dont-know" cx="571" cy="31"/>
            <text class="legend-label" x="579" y="35">Don&#x2019;t know</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-horizontal scale-statement-bars" transform="translate(0 33)">
<g class="consistent">
        <text font-size="12" fill="#252521"><tspan x="117" y="100">Salaries are consistent</tspan><tspan x="132" y="113">across similar roles</tspan></text>
        <rect x="249" y="82" width="59" height="38" rx="5" class="disagree"/>
        <rect x="310" y="82" width="41" height="38" rx="5" class="neutral"/>
        <rect x="353" y="82" width="109" height="38" rx="5" class="agree"/>
        <rect x="530" y="82" width="114" height="38" rx="5" class="dont-know"/>
        <text font-size="12" class="value-labels-inner"><tspan x="261" y="105">18.2%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="315.5" y="105">12.8%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="390" y="105">33.7%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="580" y="105">35.3%</tspan></text>
      </g>

      <g class="gender-gap">
        <text font-size="12" fill="#252521"><tspan x="118" y="157">All genders are paid equally</tspan></text>
        <rect x="277" y="132" width="35" height="38" rx="5" class="disagree"/>
        <rect x="314" y="132" width="33" height="38" rx="5" class="neutral"/>
        <rect x="349" y="132" width="126" height="38" rx="5" class="agree"/>
        <rect x="515" y="132" width="129" height="38" rx="5" class="dont-know"/>
        <text font-size="12" class="value-labels-inner"><tspan x="394" y="155">39.1%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="565" y="155">39.8%</tspan></text>
      </g>

      <g class="valued">
        <text font-size="12" fill="#252521"><tspan x="68" y="199">My role is sufficiently</tspan><tspan x="81" y="214">valued/funded</tspan></text>
        <rect x="193" y="182" width="105" height="38" rx="5" class="disagree"/>
        <rect x="300" y="182" width="60" height="38" rx="5" class="neutral"/>
        <rect x="362" y="182" width="157" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="228" y="205">32.7%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="312" y="205">18.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="423" y="205">48.7%</tspan></text>
      </g>

      <g class="managers">
        <text font-size="12" fill="#252521"><tspan x="65" y="257">I like/respect my managers/team leaders</tspan></text>
        <rect x="270" y="232" width="38" height="38" rx="5" class="disagree"/>
        <rect x="310" y="232" width="41" height="38" rx="5" class="neutral"/>
        <rect x="353" y="232" width="243" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner" style="display:none"><tspan x="271" y="255">11.7%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="315.5" y="255">12.8%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="457" y="255">75.5%</tspan></text>
      </g>

      <g class="coworkers">
        <text font-size="12" fill="#252521"><tspan x="148" y="307">I like/respect my co-workers</tspan></text>
        <rect x="307" y="282" width="11" height="38" rx="5" class="disagree"/>
        <rect x="320" y="282" width="20" height="38" rx="5" class="neutral"/>
        <rect x="342" y="282" width="291" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="470" y="305">90.5%</tspan></text>
      </g>

      <g class="organization">
        <text font-size="12" fill="#252521"><tspan x="73" y="357">I like/respect my organization</tspan></text>
        <rect x="243" y="332" width="46" height="38" rx="5" class="disagree"/>
        <rect x="291" y="332" width="78" height="38" rx="5" class="neutral"/>
        <rect x="371" y="332" width="198" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="251" y="355">14.2%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="312" y="355">24.4%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="452" y="355">61.5%</tspan></text>
      </g>

      <g class="systems">
        <text font-size="12" fill="#252521"><tspan x="35" y="407">I&#x2019;m satisfied with our systems etc</tspan></text>
        <rect x="192" y="382" width="92" height="38" rx="5" class="disagree"/>
        <rect x="286" y="382" width="89" height="38" rx="5" class="neutral"/>
        <rect x="377" y="382" width="141" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="220" y="405">28.5%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="313" y="405">27.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="444" y="405">43.9%</tspan></text>
      </g>
    </g>
  </g>

</svg>
