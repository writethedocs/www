<svg viewBox="0 55 660 188" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-feedback-relevance">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Survey feedback</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Questions are relevant</tspan></text>
    </g>

    <g class="donut-chart scale-feedback-likert">

      <!-- D (0.3%): t=180.0→181.1 -->
      <path class="slice disagree" d="M 180.0,222.0 A 150,150 0 0,1 180.0,219.2 L 270.0,220.9 A 60,60 0 0,0 270.0,222.0 Z"/>

      <!-- N (2.6%): t=181.1→190.4 -->
      <path class="slice neutral" d="M 180.0,219.2 A 150,150 0 0,1 182.5,194.8 L 271.0,211.1 A 60,60 0 0,0 270.0,220.9 Z"/>

      <!-- A (38.4%): t=190.4→328.7 -->
      <path class="slice agree" d="M 182.5,194.8 A 150,150 0 0,1 458.1,144.0 L 381.3,190.8 A 60,60 0 0,0 271.0,211.1 Z"/>

      <!-- SA (58.7%): t=328.7→540.0 -->
      <path class="slice strongly-agree" d="M 458.1,144.0 A 150,150 0 1,1 180.0,222.0 L 270.0,222.0 A 60,60 0 1,0 381.3,190.8 Z"/>

      <!-- Connectors -->
      <path d="M 469,105 C 463,105 443,114 440,116 L 438.0,117.8" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 190,109 C 196,110 208,120 212,123 L 215.1,125.6" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 145,179 C 151,179 170,188 174,191 L 180.3,198.5" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 145,205 C 150,205 172,211 175,212 L 179.5,213.7" stroke="#252521" stroke-dasharray="1 3"/>

      <!-- External labels -->
      <text font-size="10"><tspan x="473" y="103">Strongly agree</tspan></text>
      <text font-size="10"><tspan x="154" y="109">Agree</tspan></text>
      <text font-size="10"><tspan x="112" y="179">Neutral</tspan></text>
      <text font-size="10"><tspan x="54" y="205">Disagree (0.3%)</tspan></text>

      <!-- Inner value labels -->
      <text font-size="14" class="value-labels-inner reverse"><tspan x="383" y="140">58.7%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="228" y="142">38.4%</tspan></text>

    </g>

  </g>

</svg>
