<svg viewBox="0 55 660 226" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-salary-change-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Salary change</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees (n=709)</tspan></text>
    </g>

    <g class="donut-chart scale-three-trend" transform="translate(0 35)">

      <!-- Decrease: 4.1% — theta 180 to 172.638 -->
      <path class="slice negative" d="M180 222 A150 150 0 0 1 181.24 202.78 L270.49 214.31 A60 60 0 0 0 270 222 Z"/>

      <!-- No change: 24.5% — theta 172.638 to 128.463 -->
      <path class="slice neutral" d="M181.24 202.78 A150 150 0 0 1 236.70 104.55 L292.68 175.02 A60 60 0 0 0 270.49 214.31 Z"/>

      <!-- Increase: 71.4% — theta 128.463 to 0 -->
      <path class="slice positive" d="M236.70 104.55 A150 150 0 0 1 480 222 L390 222 A60 60 0 0 0 292.68 175.02 Z"/>

      <!-- Inner value labels -->
      <text font-size="14" class="value-labels-inner" text-anchor="middle"><tspan x="376" y="127">71.4%</tspan></text>
      <text font-size="14" class="value-labels-inner" text-anchor="middle"><tspan x="239" y="170">24.5%</tspan></text>

    </g>

    <g class="legend scale-three-trend">
      <rect x="438" y="70" width="207" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
      <circle class="swatch negative" cx="451" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="461" y="84">Decrease</tspan></text>
      <circle class="swatch neutral" cx="515" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="525" y="84">No change</tspan></text>
      <circle class="swatch positive" cx="584" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="594" y="84">Increase</tspan></text>
    </g>

  </g>

</svg>
