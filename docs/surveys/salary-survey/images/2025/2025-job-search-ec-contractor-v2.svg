<svg viewBox="0 0 660 440" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-job-search-ec-contractor-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Job search status</text>
        <text x="20" y="53" class="title-text">— as contractor</text>
        <text x="20" y="75" class="subtitle-text">Employee-contractor respondents (34)</text>
      </g>

      <g class="legend scale-job-search-status">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="317" y="20" width="149"/>
            <circle class="open-offers" cx="330" cy="31"/>
            <text class="legend-label" x="338" y="35">Not looking, open to offers</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="476" y="20" width="164"/>
            <circle class="not-open" cx="489" cy="31"/>
            <text class="legend-label" x="497" y="35">Not looking, not open to offers</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="372" y="52" width="156"/>
            <circle class="open-to-permanent" cx="385" cy="63"/>
            <text class="legend-label" x="393" y="67">Looking, open to permanent</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="538" y="52" width="102"/>
            <circle class="actively-looking" cx="551" cy="63"/>
            <text class="legend-label" x="559" y="67">Actively looking</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="429" y="84" width="211"/>
            <circle class="contracting-while-looking" cx="442" cy="95"/>
            <text class="legend-label" x="450" y="99">Contracting while looking for permanent</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-job-search-status" transform="translate(110 24)">
      <path class="slice open-offers" d="M 220,90 A 150 150 0 0 1 247.6,387.4 L 231,299 A 60 60 0 0 0 220,180 Z"/>
      <path class="slice not-open" d="M 247.6,387.4 A 150 150 0 0 1 70.6,226.2 L 160.3,234.5 A 60 60 0 0 0 231,299 Z"/>
      <path class="slice open-to-permanent" d="M 70.6,226.2 A 150 150 0 0 1 118.9,129.1 L 179.6,195.7 A 60 60 0 0 0 160.3,234.5 Z"/>
      <path class="slice actively-looking" d="M 118.9,129.1 A 150 150 0 0 1 192.4,92.6 L 209,181 A 60 60 0 0 0 179.6,195.7 Z"/>
      <path class="slice contracting-while-looking" d="M 192.4,92.6 A 150 150 0 0 1 220,90 L 220,180 A 60 60 0 0 0 209,181 Z"/>

      <text text-anchor="middle" class="value-labels-inner"><tspan x="325" y="234">47.1%</tspan></text>
      <text text-anchor="middle" class="value-labels-inner"><tspan x="149" y="322">29.4%</tspan></text>
      <text text-anchor="middle" class="value-labels-inner"><tspan x="126" y="194">11.8%</tspan></text>
      <text text-anchor="middle" class="value-labels-inner"><tspan x="173" y="146">8.8%</tspan></text>
      <text text-anchor="middle" class="value-labels-inner" style="display:none"><tspan x="210" y="136">2.9%</tspan></text>
    </g>
  </g>

</svg>
