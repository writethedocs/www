<svg viewBox="0 20 660 196" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-satisfaction-factors-salary-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Satisfaction factors: salary and benefits</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees</tspan></text>
    </g>

    <g class="bar-chart-horizontal">

      <g class="legend">
        <rect x="469" y="35" width="176" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
        <circle cx="482" cy="45" r="6" fill="#E4774E"/>
        <circle cx="545" cy="45" r="6" fill="#E9C168"/>
        <circle cx="603" cy="45" r="6" fill="#82A555"/>
        <text font-size="10" fill="#252521"><tspan x="492" y="49">Disagree</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="555" y="49">Neutral</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="613" y="49">Agree</tspan></text>
      </g>

      <g class="paid-fairly">
        <text font-size="10" fill="#252521"><tspan x="155" y="99">I&#x2019;m paid fairly</tspan></text>
        <rect x="238" y="82" width="62" height="27" rx="5" fill="#E4774E"/>
        <rect x="302" y="82" width="57" height="27" rx="5" fill="#E9C168"/>
        <rect x="361" y="82" width="203" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="251" y="100">19.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="312" y="100">17.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="444" y="100">63.0%</tspan></text>
      </g>

      <g class="inflation">
        <text font-size="10" fill="#252521"><tspan x="40" y="131">My salary keeps up with</tspan><tspan x="43" y="142">inflation / cost-of-living</tspan></text>
        <rect x="173" y="121" width="122" height="27" rx="5" fill="#E4774E"/>
        <rect x="297" y="121" width="66" height="27" rx="5" fill="#E9C168"/>
        <rect x="365" y="121" width="134" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="216" y="139">37.9%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="312" y="139">20.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="414" y="139">41.5%</tspan></text>
      </g>

      <g class="benefits">
        <text font-size="10" fill="#252521"><tspan x="100" y="177">My benefits are sufficient</tspan></text>
        <rect x="249" y="160" width="53" height="27" rx="5" fill="#E4774E"/>
        <rect x="304" y="160" width="52" height="27" rx="5" fill="#E9C168"/>
        <rect x="358" y="160" width="217" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="257" y="178">16.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="312" y="178">16.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="448" y="178">67.4%</tspan></text>
      </g>

    </g>

  </g>

</svg>
