<svg viewBox="0 0 660 600" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
        .range-row rect,
        .range-row line,
        .point-row circle {
          transition: opacity 0.15s ease;
        }
        .range-row rect,
        .range-row line {
          opacity: 0.8;
        }
        .point-row circle {
          opacity: 0.5;
        }
        .range-row:hover rect,
        .range-row:hover line,
        .point-row:hover circle {
          opacity: 1;
        }
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-region-v2" class="scale-salary-range">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text"><tspan x="20" y="35">Median salary (USD)</tspan><tspan x="20" y="53">by respondent region</tspan></text>
        <text x="20" y="76" class="subtitle-text"><tspan x="20" y="76">Bars show 25th–75th percentile range,</tspan><tspan x="20" y="92">markers show median</tspan></text>
      </g>

      <g class="legend">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="310" y="20" width="134"/>
            <rect class="percentile-range" x="323" y="27" width="16" height="8" rx="1"/>
            <text class="legend-label" x="344" y="35">25th–75th percentile</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="454" y="20" width="65"/>
            <line class="median" x1="467" y1="28" x2="467" y2="36" stroke-width="3"/>
            <text class="legend-label" x="475" y="35">Median</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="529" y="20" width="111"/>
            <circle class="median-only" cx="542" cy="31" r="4" opacity="0.5"/>
            <text class="legend-label" x="550" y="35">Median only (&lt;30)</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-horizontal scale-salary-range" transform="translate(0 55)">
      <g class="grid" stroke="#E8E8E8" stroke-width="1">
        <line x1="258.0" y1="66" x2="258.0" y2="488"/>
        <line x1="398.0" y1="66" x2="398.0" y2="488"/>
        <line x1="538.0" y1="66" x2="538.0" y2="488"/>
      </g>

      <g class="labels" font-size="10" text-anchor="end">
        <text font-weight="700"><tspan x="110" y="80">Worldwide (696)</tspan></text>
        <text font-weight="700"><tspan x="110" y="108">North America (421)</tspan></text>
        <text fill="#666666"><tspan x="110" y="136">United States (370)</tspan></text>
        <text fill="#666666"><tspan x="110" y="164">Canada (50)</tspan></text>
        <text font-weight="700"><tspan x="110" y="192">Europe (182)</tspan></text>
        <text fill="#666666"><tspan x="110" y="220">United Kingdom (43)</tspan></text>
        <text fill="#666666"><tspan x="110" y="248">Germany (39)</tspan></text>
        <text fill="#666666"><tspan x="110" y="276">France (16)</tspan></text>
        <text fill="#666666"><tspan x="110" y="304">Romania (12)</tspan></text>
        <text font-weight="700"><tspan x="110" y="332">Asia (39)</tspan></text>
        <text fill="#666666"><tspan x="110" y="360">India (27)</tspan></text>
        <text font-weight="700"><tspan x="110" y="388">Oceania (29)</tspan></text>
        <text fill="#666666"><tspan x="110" y="416">Australia (25)</tspan></text>
        <text font-weight="700"><tspan x="110" y="444">South America (15)</tspan></text>
        <text fill="#666666"><tspan x="110" y="472">Brazil (13)</tspan></text>
      </g>

      <g class="tracks">
        <rect class="track" x="118" y="66" width="490" height="20"/>
        <rect class="track" x="118" y="94" width="490" height="20"/>
        <rect class="track" x="118" y="122" width="490" height="20"/>
        <rect class="track" x="118" y="150" width="490" height="20"/>
        <rect class="track" x="118" y="178" width="490" height="20"/>
        <rect class="track" x="118" y="206" width="490" height="20"/>
        <rect class="track" x="118" y="234" width="490" height="20"/>
        <rect class="track" x="118" y="262" width="490" height="20"/>
        <rect class="track" x="118" y="290" width="490" height="20"/>
        <rect class="track" x="118" y="318" width="490" height="20"/>
        <rect class="track" x="118" y="346" width="490" height="20"/>
        <rect class="track" x="118" y="374" width="490" height="20"/>
        <rect class="track" x="118" y="402" width="490" height="20"/>
        <rect class="track" x="118" y="430" width="490" height="20"/>
        <rect class="track" x="118" y="458" width="490" height="20"/>
      </g>

      <g class="ranges">
        <g class="range-row">
          <rect x="301.3" y="66" width="204.8" height="20" class="percentile-range" rx="2"/>
          <line x1="380.5" y1="63" x2="380.5" y2="89" class="median" stroke-width="3"/>
        </g>
        <g class="range-row">
          <rect x="370.0" y="94" width="196.0" height="20" class="percentile-range" rx="2"/>
          <line x1="451.2" y1="91" x2="451.2" y2="117" class="median" stroke-width="3"/>
        </g>
        <g class="range-row">
          <rect x="259.1" y="178" width="113.2" height="20" class="percentile-range" rx="2"/>
          <line x1="305.1" y1="175" x2="305.1" y2="201" class="median" stroke-width="3"/>
        </g>
        <g class="range-row">
          <rect x="174.6" y="318" width="110.7" height="20" class="percentile-range" rx="2"/>
          <line x1="208.0" y1="315" x2="208.0" y2="341" class="median" stroke-width="3"/>
        </g>
      </g>

      <g class="median-points">
        <g class="point-row"><circle cx="468.0" cy="132" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="318.3" cy="160" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="357.9" cy="216" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="333.1" cy="244" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="256.9" cy="272" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="267.6" cy="300" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="208.0" cy="356" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="343.7" cy="384" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="364.4" cy="412" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="155.3" cy="440" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="154.1" cy="468" r="5" class="median-only"/></g>
      </g>

      <g class="value-labels-outer" text-anchor="end">
        <text><tspan x="640" y="80">$93K</tspan></text>
        <text><tspan x="640" y="108">$119K</tspan></text>
        <text><tspan x="640" y="136">$125K</tspan></text>
        <text><tspan x="640" y="164">$71K</tspan></text>
        <text><tspan x="640" y="192">$66K</tspan></text>
        <text><tspan x="640" y="220">$85K</tspan></text>
        <text><tspan x="640" y="248">$76K</tspan></text>
        <text><tspan x="640" y="276">$49K</tspan></text>
        <text><tspan x="640" y="304">$53K</tspan></text>
        <text><tspan x="640" y="332">$32K</tspan></text>
        <text><tspan x="640" y="360">$32K</tspan></text>
        <text><tspan x="640" y="388">$80K</tspan></text>
        <text><tspan x="640" y="416">$88K</tspan></text>
        <text><tspan x="640" y="444">$13K</tspan></text>
        <text><tspan x="640" y="472">$12K</tspan></text>
      </g>

      <g class="x-axis" text-anchor="middle">
        <line x1="118" y1="498" x2="608" y2="498" stroke="#F0F0F0" stroke-width="1"/>
        <g class="axis-labels">
          <text font-size="10"><tspan x="118" y="518">$0</tspan></text>
          <text font-size="10"><tspan x="258.0" y="518">$50K</tspan></text>
          <text font-size="10"><tspan x="398.0" y="518">$100K</tspan></text>
          <text font-size="10"><tspan x="538.0" y="518">$150K</tspan></text>
        </g>
      </g>
    </g>
  </g>

</svg>
