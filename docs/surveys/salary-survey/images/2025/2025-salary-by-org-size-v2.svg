<svg viewBox="0 0 660 383" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-org-size-v2" class="scale-salary-lines">
    <g class="chart-header">
      <g class="chart-title">
        <text class="title-text"><tspan x="20" y="35">Median salary (USD) by</tspan><tspan x="20" y="53">organization size</tspan></text>
        <text class="subtitle-text"><tspan x="20" y="76">Employees — worldwide, North America,</tspan><tspan x="20" y="92">and Europe</tspan></text>
      </g>

      <g class="legend scale-salary-lines">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="348" y="20" width="91"/>
            <line class="worldwide" x1="360" y1="31" x2="376" y2="31" stroke-width="2.5" stroke-linecap="round"/>
            <circle class="worldwide" cx="368" cy="31" r="4"/>
            <text class="legend-label" x="384" y="35">Worldwide</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="449" y="20" width="109"/>
            <line class="north-america" x1="461" y1="31" x2="477" y2="31" stroke-width="2.5" stroke-linecap="round"/>
            <circle class="north-america" cx="469" cy="31" r="4"/>
            <text class="legend-label" x="485" y="35">North America</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="566" y="20" width="74"/>
            <line class="europe" x1="578" y1="31" x2="594" y2="31" stroke-width="2.5" stroke-linecap="round"/>
            <circle class="europe" cx="586" cy="31" r="4"/>
            <text class="legend-label" x="602" y="35">Europe</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area line-chart scale-salary-lines" transform="translate(0 28)">
      <g class="y-axis">
        <g class="gridlines">
          <line x1="60" y1="109.0" x2="620" y2="109.0"/>
          <line x1="60" y1="135.8" x2="620" y2="135.8"/>
          <line x1="60" y1="162.7" x2="620" y2="162.7"/>
          <line x1="60" y1="189.6" x2="620" y2="189.6"/>
          <line x1="60" y1="216.5" x2="620" y2="216.5"/>
          <line x1="60" y1="243.4" x2="620" y2="243.4"/>
          <line x1="60" y1="270.2" x2="620" y2="270.2"/>
        </g>

        <g class="axis-labels">
          <text font-size="10" text-anchor="end"><tspan x="55" y="273">$40K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="246">$60K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="220">$80K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="193">$100K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="166">$120K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="139">$140K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="112">$160K</tspan></text>
        </g>
      </g>

      <g class="series-lines">
        <polyline points="80,215.1 210,215.7 340,196.3 470,161.4 600,150.1" class="worldwide" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="80" cy="215.1" r="4" class="worldwide"/>
        <circle cx="210" cy="215.7" r="4" class="worldwide"/>
        <circle cx="340" cy="196.3" r="4" class="worldwide"/>
        <circle cx="470" cy="161.4" r="4" class="worldwide"/>
        <circle cx="600" cy="150.1" r="4" class="worldwide"/>

        <polyline points="80,162.7 210,173.5 340,183.6 470,134.3 600,129.2" class="north-america" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="80" cy="162.7" r="4" class="north-america"/>
        <circle cx="210" cy="173.5" r="4" class="north-america"/>
        <circle cx="340" cy="183.6" r="4" class="north-america"/>
        <circle cx="470" cy="134.3" r="4" class="north-america"/>
        <circle cx="600" cy="129.2" r="4" class="north-america"/>

        <polyline points="80,238.2 210,240.5 340,226.2 470,202.5" class="europe" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="80" cy="238.2" r="4" class="europe"/>
        <circle cx="210" cy="240.5" r="4" class="europe"/>
        <circle cx="340" cy="226.2" r="4" class="europe"/>
        <circle cx="470" cy="202.5" r="4" class="europe"/>
      </g>

      <g class="x-axis" text-anchor="middle">
        <line x1="60" y1="305" x2="620" y2="305" stroke="#F0F0F0" stroke-width="1"/>
        <g class="axis-labels">
          <text font-size="10"><tspan x="80" y="325">1–100</tspan></text>
          <text font-size="10"><tspan x="210" y="325">101–1,000</tspan></text>
          <text font-size="10"><tspan x="340" y="325">1,001–10,000</tspan></text>
          <text font-size="10"><tspan x="470" y="325">10,001–100,000</tspan></text>
          <text font-size="10"><tspan x="600" y="325">100,000+</tspan></text>
        </g>
      </g>
    </g>
  </g>
</svg>