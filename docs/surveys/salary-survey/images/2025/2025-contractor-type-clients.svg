      <!-- Not specified (12.5%): 522.5°→567.5° -->
      <path d="M184.958 277.156 A150 150 0 0 1 194.924 162.784 L274.770 204.314 A60 60 0 0 0 270.783 250.062 Z" fill="#BBBBBB" stroke="white" stroke-width="2"/>

      <!-- Both (6.2%): 567.5°→589.8° -->
      <path d="M194.924 162.784 A150 150 0 0 1 231.181 117.431 L289.273 186.172 A60 60 0 0 0 274.770 204.314 Z" fill="#FFA600" stroke="white" stroke-width="2"/>

      <!-- Connectors and labels -->
      <path d="M501.0 149.5 C501.0 149.5 479.9 155.6 464.7 163.3" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M230.0 397.4 C230.0 397.4 243.9 379.8 252.3 365.0" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M135.7 217.7 C135.7 217.7 158.6 217.2 175.6 218.7" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M176.2 116.6 C176.2 116.6 195.2 125.8 208.5 136.5" stroke="#252521" stroke-dasharray="1 3"/>

      <!-- Labels -->
      <text font-size="10"><tspan x="504" y="148">Single client (57.5%)</tspan></text>
      <text font-size="10"><tspan x="115" y="395">Multiple clients (23.8%)</tspan></text>
      <text font-size="10"><tspan x="36" y="216">Not specified (12.5%)</tspan></text>
      <text font-size="10"><tspan x="121" y="115">Both (6.2%)</tspan></text>

      <!-- Inner percentage labels for large segments -->
      <text font-size="14" class="value-labels-inner"><tspan x="408" y="188">57.5%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="256" y="333">23.8%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="200" y="227">12.5%</tspan></text>

    </g>

