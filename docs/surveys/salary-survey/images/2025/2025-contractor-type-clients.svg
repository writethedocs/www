<svg viewBox="0 55 660 350" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-contractor-type-clients">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Typical client configuration</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Contractors</tspan></text>
    </g>

    <g class="donut-chart">

      <!-- Single client (57.5%): 229.8°→436.8° -->
      <path d="M231.181 117.431 A150 150 0 1 1 362.253 378.037 L341.701 290.415 A60 60 0 1 0 289.273 186.172 Z" fill="#00AEFF" stroke="white" stroke-width="2"/>

      <!-- Multiple clients (23.8%): 436.8°→522.5° -->
