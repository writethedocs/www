<svg viewBox="0 55 660 188" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-feedback-survey-length">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Survey feedback</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Length is appropriate</tspan></text>
    </g>

    <g class="donut-chart scale-feedback-likert">

      <!-- SD (0.3%): t=180.0→181.1 -->
      <path class="slice strongly-disagree" d="M 180.0,222.0 A 150,150 0 0,1 180.0,219.2 L 270.0,220.9 A 60,60 0 0,0 270.0,222.0 Z"/>

      <!-- D (1.3%): t=181.1→185.8 -->
      <path class="slice disagree" d="M 180.0,219.2 A 150,150 0 0,1 180.8,206.9 L 270.3,216.0 A 60,60 0 0,0 270.0,220.9 Z"/>

      <!-- N (3.2%): t=185.8→197.3 -->
      <path class="slice neutral" d="M 180.8,206.9 A 150,150 0 0,1 186.8,177.4 L 272.7,204.2 A 60,60 0 0,0 270.3,216.0 Z"/>

      <!-- A (36.3%): t=197.3→328.0 -->
      <path class="slice agree" d="M 186.8,177.4 A 150,150 0 0,1 457.2,142.4 L 380.9,190.2 A 60,60 0 0,0 272.7,204.2 Z"/>

      <!-- SA (58.9%): t=328.0→540.0 -->
      <path class="slice strongly-agree" d="M 457.2,142.4 A 150,150 0 1,1 180.0,222.0 L 270.0,222.0 A 60,60 0 1,0 380.9,190.2 Z"/>

      <!-- Connectors -->
      <path d="M 469,105 C 463,105 443,114 440,116 L 438.0,117.8" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 190,109 C 196,110 208,120 212,123 L 215.1,125.6" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 145,179 C 151,179 175,188 179,191 L 182.9,192.6" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 145,205 C 150,205 175,211 177,212 L 180.3,213.0" stroke="#252521" stroke-dasharray="1 3"/>

      <!-- External labels -->
      <text font-size="10"><tspan x="473" y="103">Strongly agree</tspan></text>
      <text font-size="10"><tspan x="154" y="109">Agree</tspan></text>
      <text font-size="10"><tspan x="112" y="179">Neutral</tspan></text>
      <text font-size="10"><tspan x="54" y="199">Disagree / strongly</tspan><tspan x="72" y="210">disagree (1.6%)</tspan></text>

      <!-- Inner value labels -->
      <text font-size="14" class="value-labels-inner reverse"><tspan x="383" y="140">58.9%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="228" y="142">36.3%</tspan></text>
      <text font-size="12" class="value-labels-inner"><tspan x="190" y="204">3.2%</tspan></text>

    </g>

  </g>

</svg>
