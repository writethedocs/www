<svg viewBox="0 0 660 440" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-job-search-contractors-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Job search status</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (46)</text>
      </g>

      <g class="legend scale-job-search-status">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="325" y="20" width="149"/>
            <circle class="open-offers" cx="338" cy="31"/>
            <text class="legend-label" x="346" y="35">Not looking, open to offers</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="484" y="20" width="156"/>
            <circle class="open-to-permanent" cx="497" cy="31"/>
            <text class="legend-label" x="505" y="35">Looking, open to permanent</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="253" y="52" width="211"/>
            <circle class="contracting-while-looking" cx="266" cy="63"/>
            <text class="legend-label" x="274" y="67">Contracting while looking for permanent</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="474" y="52" width="166"/>
            <circle class="not-open" cx="487" cy="63"/>
            <text class="legend-label" x="495" y="67">Not looking, not open to offers</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="340" y="84" width="188"/>
            <circle class="not-looking-yet" cx="353" cy="95"/>
            <text class="legend-label" x="361" y="99">Not looking, expect to within a year</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="538" y="84" width="102"/>
            <circle class="actively-looking" cx="551" cy="95"/>
            <text class="legend-label" x="559" y="99">Actively looking</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-job-search-status" transform="translate(110 24)">
      <path class="slice open-offers" d="M 220,90 A 150 150 0 0 1 342.5,326.5 L 269,274.6 A 60 60 0 0 0 220,180 Z"/>
      <path class="slice open-to-permanent" d="M 342.5,326.5 A 150 150 0 0 1 142.1,368.2 L 188.8,291.3 A 60 60 0 0 0 269,274.6 Z"/>
      <path class="slice contracting-while-looking" d="M 142.1,368.2 A 150 150 0 0 1 73.1,270.5 L 161.3,252.2 A 60 60 0 0 0 188.8,291.3 Z"/>
      <path class="slice not-open" d="M 73.1,270.5 A 150 150 0 0 1 86.8,171 L 166.7,212.4 A 60 60 0 0 0 161.3,252.2 Z"/>
      <path class="slice not-looking-yet" d="M 86.8,171 A 150 150 0 0 1 160.2,102.4 L 196.1,185 A 60 60 0 0 0 166.7,212.4 Z"/>
      <path class="slice actively-looking" d="M 160.2,102.4 A 150 150 0 0 1 220,90 L 220,180 A 60 60 0 0 0 196.1,185 Z"/>

      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="313" y="196">34.8%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="241" y="347">23.9%</tspan></text>
      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="125" y="224">13.0%</tspan></text>
    </g>
  </g>

</svg>
