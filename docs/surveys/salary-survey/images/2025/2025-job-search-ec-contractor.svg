<svg viewBox="0 40 660 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-job-search-ec-contractor">

    <g class="title">
      <text font-size="14"><tspan x="40" y="65">Job search status — as contractor</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="82">Employee-contractors (n=34)</tspan></text>
    </g>

    <g class="donut-chart">

      <!-- Not looking — open to offers: 47.1% -->
      <path d="M 220,90 A 150 150 0 0 1 247.6,387.4 L 231,299 A 60 60 0 0 0 220,180 Z" fill="#00AEFF" stroke="white" stroke-width="2"/>

      <!-- Not looking — not open: 29.4% -->
      <path d="M 247.6,387.4 A 150 150 0 0 1 70.6,226.2 L 160.3,234.5 A 60 60 0 0 0 231,299 Z" fill="#1A4A8C" stroke="white" stroke-width="2"/>

      <!-- Looking, open to permanent role: 11.8% -->
      <path d="M 70.6,226.2 A 150 150 0 0 1 118.9,129.1 L 179.6,195.7 A 60 60 0 0 0 160.3,234.5 Z" fill="#E4774E" stroke="white" stroke-width="2"/>

      <!-- Actively looking: 8.8% -->
      <path d="M 118.9,129.1 A 150 150 0 0 1 192.4,92.6 L 209,181 A 60 60 0 0 0 179.6,195.7 Z" fill="#FFA600" stroke="white" stroke-width="2"/>

      <!-- Only contracting while looking: 2.9% -->
      <path d="M 192.4,92.6 A 150 150 0 0 1 220,90 L 220,180 A 60 60 0 0 0 209,181 Z" fill="#C94040" stroke="white" stroke-width="2"/>

      <!-- Inner value labels -->
      <text font-size="12" fill="white" text-anchor="middle" font-weight="bold"><tspan x="325" y="234">47.1%</tspan></text>
      <text font-size="12" fill="white" text-anchor="middle" font-weight="bold"><tspan x="149" y="322">29.4%</tspan></text>

    </g>

    <!-- Legend -->
    <g font-size="10" fill="#50514F">

      <!-- Not looking — open to offers -->
      <rect x="415" y="175" width="12" height="12" fill="#00AEFF"/>
      <text text-anchor="start"><tspan x="433" y="185">Not looking — open to offers (47.1%)</tspan></text>

      <!-- Not looking — not open -->
      <rect x="415" y="203" width="12" height="12" fill="#1A4A8C"/>
      <text text-anchor="start"><tspan x="433" y="213">Not looking — not open to offers (29.4%)</tspan></text>

      <!-- Looking, open to permanent role -->
      <rect x="415" y="231" width="12" height="12" fill="#E4774E"/>
      <text text-anchor="start"><tspan x="433" y="241">Actively looking, open to permanent role (11.8%)</tspan></text>

      <!-- Actively looking -->
      <rect x="415" y="259" width="12" height="12" fill="#FFA600"/>
      <text text-anchor="start"><tspan x="433" y="269">Actively looking (8.8%)</tspan></text>

      <!-- Only contracting while looking -->
      <rect x="415" y="287" width="12" height="12" fill="#C94040"/>
      <text text-anchor="start"><tspan x="433" y="297">Only contracting while looking for permanent role (2.9%)</tspan></text>

    </g>

  </g>

</svg>
