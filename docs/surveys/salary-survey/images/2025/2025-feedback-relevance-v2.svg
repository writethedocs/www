<svg viewBox="0 0 660 305" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-feedback-relevance-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Survey feedback</text>
        <text x="20" y="55" class="subtitle-text">Questions are relevant</text>
      </g>

      <g class="legend scale-feedback-likert">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="376" y="20" width="109"/>
            <circle class="strongly-disagree" cx="389" cy="31"/>
            <text class="legend-label" x="397" y="35">Strongly disagree</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="495" y="20" width="70"/>
            <circle class="disagree" cx="508" cy="31"/>
            <text class="legend-label" x="516" y="35">Disagree</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="575" y="20" width="65"/>
            <circle class="neutral" cx="588" cy="31"/>
            <text class="legend-label" x="596" y="35">Neutral</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="478" y="52" width="59"/>
            <circle class="agree" cx="491" cy="63"/>
            <text class="legend-label" x="499" y="67">Agree</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="547" y="52" width="93"/>
            <circle class="strongly-agree" cx="560" cy="63"/>
            <text class="legend-label" x="568" y="67">Strongly agree</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-feedback-likert" transform="translate(0 22) translate(330 262) scale(1.2) translate(-330 -262)">
      <path class="slice disagree" d="M180 262 A150 150 0 0 1 180.007 260.586 L270.003 261.435 A60 60 0 0 0 270 262 Z"/>
      <path class="slice neutral" d="M180.007 260.586 A150 150 0 0 1 180.622 248.353 L270.249 256.541 A60 60 0 0 0 270.003 261.435 Z"/>
      <path class="slice agree" d="M180.622 248.353 A150 150 0 0 1 289.511 117.568 L313.804 204.227 A60 60 0 0 0 270.249 256.541 Z"/>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="249" y="199">38.4%</tspan></text>
      <path class="slice strongly-agree" d="M289.511 117.568 A150 150 0 0 1 480 262 L390 262 A60 60 0 0 0 313.804 204.227 Z"/>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="393" y="182">58.7%</tspan></text>
    
    </g>
  </g>

</svg>
