<svg viewBox="0 0 660 420" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-contractor-type-clients-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Typical client configuration</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (46)</text>
      </g>

      <g class="legend scale-client-config">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="341" y="20" width="58"/>
            <circle class="single" cx="354" cy="31"/>
            <text class="legend-label" x="362" y="35">Single</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="409" y="20" width="69"/>
            <circle class="multiple" cx="422" cy="31"/>
            <text class="legend-label" x="430" y="35">Multiple</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="488" y="20" width="52"/>
            <circle class="both" cx="501" cy="31"/>
            <text class="legend-label" x="509" y="35">Both</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="550" y="20" width="90"/>
            <circle class="not-specified" cx="563" cy="31"/>
            <text class="legend-label" x="571" y="35">Not specified</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-client-config" transform="translate(2 10)">
      <path class="slice single" d="M231.181 117.431 A150 150 0 1 1 362.253 378.037 L341.701 290.415 A60 60 0 1 0 289.273 186.172 Z"/>
      <path class="slice multiple" d="M362.253 378.037 A150 150 0 0 1 184.958 277.156 L270.783 250.062 A60 60 0 0 0 341.701 290.415 Z"/>
      <path class="slice not-specified" d="M184.958 277.156 A150 150 0 0 1 194.924 162.784 L274.770 204.314 A60 60 0 0 0 270.783 250.062 Z"/>
      <path class="slice both" d="M194.924 162.784 A150 150 0 0 1 231.181 117.431 L289.273 186.172 A60 60 0 0 0 274.770 204.314 Z"/>

      <text class="value-labels-inner" text-anchor="middle"><tspan x="424" y="203">57.5%</tspan></text>
      <text class="value-labels-inner" text-anchor="middle"><tspan x="278" y="331">23.8%</tspan></text>
      <text class="value-labels-inner" text-anchor="middle"><tspan x="225" y="228">12.5%</tspan></text>
      <text class="value-labels-inner" text-anchor="middle"><tspan x="241" y="166">6.2%</tspan></text>
    </g>
  </g>

</svg>
