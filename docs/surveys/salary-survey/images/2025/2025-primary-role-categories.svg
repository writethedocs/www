<svg viewBox="0 40 660 445" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-primary-role-categories" class="scale-single-series">

    <g class="title">
      <text font-size="14"><tspan x="40" y="25">Primary role categories</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="41">All respondents (n=755)</tspan></text>
    </g>

    <!-- Gridlines at 1%, 2%, 3% (scale: 350px = 3%) -->
    <g class="gridlines">
      <line x1="345" y1="62" x2="345" y2="432" stroke="#F2F4F6" stroke-width="1"/>
      <line x1="462" y1="62" x2="462" y2="432" stroke="#F2F4F6" stroke-width="1"/>
      <line x1="578" y1="62" x2="578" y2="432" stroke="#F2F4F6" stroke-width="1"/>
    </g>

    <!-- Axis baseline -->
    <line x1="228" y1="62" x2="228" y2="432" stroke="#D8D8D5" stroke-width="1"/>

    <!-- Row labels (right-aligned) -->
    <g font-size="10" text-anchor="end" fill="#50514F">
      <text><tspan x="222" y="80">Technical writer</tspan></text>
      <text><tspan x="222" y="118">Project / product manager</tspan></text>
      <text><tspan x="222" y="156">Editor</tspan></text>
      <text><tspan x="222" y="194">DocOps</tspan></text>
      <text><tspan x="222" y="232">Other</tspan></text>
      <text><tspan x="222" y="270">Manager or team leader</tspan></text>
      <text><tspan x="222" y="308">Developer / engineer</tspan></text>
      <text><tspan x="222" y="346">Programmer-writer</tspan></text>
      <text><tspan x="222" y="384">Support</tspan></text>
      <text><tspan x="222" y="422">UX writer</tspan></text>
    </g>

    <!-- Bars -->
      <g class="series-a">
      <!-- Technical writer: 81.2% — truncated, drawn to near-full chart width -->
      <rect x="228" y="62" width="342" height="28"/>
      <!-- Project / product manager: 2.6% = 303px -->
      <rect x="228" y="100" width="303" height="28"/>
      <!-- Editor: 2.5% = 292px -->
      <rect x="228" y="138" width="292" height="28"/>
      <!-- DocOps: 1.9% = 222px -->
      <rect x="228" y="176" width="222" height="28"/>
      <!-- Other: 1.9% = 222px -->
      <rect x="228" y="214" width="222" height="28"/>
      <!-- Manager or team leader: 1.5% = 175px -->
      <rect x="228" y="252" width="175" height="28"/>
      <!-- Developer / engineer: 1.5% = 175px -->
      <rect x="228" y="290" width="175" height="28"/>
      <!-- Programmer-writer: 1.3% = 152px -->
      <rect x="228" y="328" width="152" height="28"/>
      <!-- Support: 1.1% = 128px -->
      <rect x="228" y="366" width="128" height="28"/>
      <!-- UX writer: 1.1% = 128px -->
      <rect x="228" y="404" width="128" height="28"/>
    </g>

    <!-- TW break mark — two diagonal white cuts near right end of bar -->
    <polygon points="556,62 561,62 557,90 552,90" fill="white"/>
    <polygon points="564,62 569,62 565,90 560,90" fill="white"/>

    <!-- Value labels -->
    <g font-size="9" text-anchor="start" fill="#50514F">
      <text><tspan x="574" y="80">81.2%</tspan></text>
      <text><tspan x="536" y="118">2.6%</tspan></text>
      <text><tspan x="525" y="156">2.5%</tspan></text>
      <text><tspan x="455" y="194">1.9%</tspan></text>
      <text><tspan x="455" y="232">1.9%</tspan></text>
      <text><tspan x="408" y="270">1.5%</tspan></text>
      <text><tspan x="408" y="308">1.5%</tspan></text>
      <text><tspan x="385" y="346">1.3%</tspan></text>
      <text><tspan x="361" y="384">1.1%</tspan></text>
      <text><tspan x="361" y="422">1.1%</tspan></text>
    </g>

    <!-- X-axis percentage labels -->
    <g font-size="9" text-anchor="middle" fill="#999999">
      <text><tspan x="228" y="452">0%</tspan></text>
      <text><tspan x="345" y="452">1%</tspan></text>
      <text><tspan x="462" y="452">2%</tspan></text>
      <text><tspan x="578" y="452">3%</tspan></text>
    </g>

