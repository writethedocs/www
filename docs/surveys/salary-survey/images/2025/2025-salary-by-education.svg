<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 660 305">
  <title>Salary (USD) by education level</title>
  <text x="330" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#252521">Salary (USD) by education level</text>

  <!-- Grid lines -->
  <line x1="306.2" y1="97" x2="306.2" y2="316" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="412.5" y1="97" x2="412.5" y2="316" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="518.8" y1="97" x2="518.8" y2="316" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="625.0" y1="97" x2="625.0" y2="316" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Axes -->
  <line x1="200" y1="97" x2="200" y2="316" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="200" y1="316" x2="625.0" y2="316" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Bars -->
  <rect x="200" y="97" width="425" height="18" fill="#F0F0F0"/>
  <rect x="445.5" y="97" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="110" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">High school</text>
  <text x="454.0" y="110" font-family="sans-serif" font-size="10" fill="#666666">$93K</text>
  <rect x="200" y="137" width="425" height="18" fill="#F0F0F0"/>
  <rect x="440.0" y="137" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="150" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Technical/vocational</text>
  <text x="448.5" y="150" font-family="sans-serif" font-size="10" fill="#666666">$90.9K</text>
  <rect x="200" y="177" width="425" height="18" fill="#F0F0F0"/>
  <rect x="371.9" y="177" width="190.6" height="18" fill="#A8C8E8"/>
  <rect x="462.6" y="177" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="190" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Undergraduate</text>
  <text x="569.5" y="190" font-family="sans-serif" font-size="10" fill="#252521">$99.4K</text>
  <rect x="200" y="217" width="425" height="18" fill="#F0F0F0"/>
  <rect x="444.4" y="217" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="230" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Multiple undergraduate</text>
  <text x="452.9" y="230" font-family="sans-serif" font-size="10" fill="#666666">$92.6K</text>
  <rect x="200" y="257" width="425" height="18" fill="#F0F0F0"/>
  <rect x="365.6" y="257" width="195.1" height="18" fill="#A8C8E8"/>
  <rect x="428.1" y="257" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="270" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Postgraduate</text>
  <text x="567.7" y="270" font-family="sans-serif" font-size="10" fill="#252521">$86.5K</text>
  <rect x="200" y="297" width="425" height="18" fill="#F0F0F0"/>
  <rect x="350.8" y="297" width="185.3" height="18" fill="#A8C8E8"/>
  <rect x="425.4" y="297" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="310" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Multiple postgraduate</text>
  <text x="543.1" y="310" font-family="sans-serif" font-size="10" fill="#252521">$85.4K</text>

  <!-- X-axis ticks and labels -->
  <line x1="306.2" y1="316" x2="306.2" y2="321" stroke="#CCCCCC" stroke-width="1"/>
  <text x="306.2" y="333" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$40K</text>
  <line x1="412.5" y1="316" x2="412.5" y2="321" stroke="#CCCCCC" stroke-width="1"/>
  <text x="412.5" y="333" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$80K</text>
  <line x1="518.8" y1="316" x2="518.8" y2="321" stroke="#CCCCCC" stroke-width="1"/>
  <text x="518.8" y="333" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$120K</text>
  <line x1="625.0" y1="316" x2="625.0" y2="321" stroke="#CCCCCC" stroke-width="1"/>
  <text x="625.0" y="333" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$160K</text>

  <!-- Legend -->
  <rect x="502" y="55" width="143" height="36" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
  <rect x="514" y="60" width="3" height="10" fill="#1A4A8C"/>
  <text x="524" y="69" font-family="sans-serif" font-size="10" fill="#252521">Median</text>
  <circle cx="516" cy="79" r="5" fill="#A8C8E8"/>
  <text x="524" y="83" font-family="sans-serif" font-size="10" fill="#252521">25th–75th percentile</text>
</svg>