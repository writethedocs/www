<svg viewBox="0 0 660 370" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
        .range-row rect,
        .range-row line,
        .point-row circle {
          transition: opacity 0.15s ease;
        }
        .range-row rect,
        .range-row line {
          opacity: 0.8;
        }
        .point-row circle {
          opacity: 0.5;
        }
        .range-row:hover rect,
        .range-row:hover line,
        .point-row:hover circle {
          opacity: 1;
        }
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-primary-role-category-v2" class="scale-salary-range">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text"><tspan x="20" y="35">Salary (USD)</tspan><tspan x="20" y="53">by primary role category</tspan></text>
        <text x="20" y="76" class="subtitle-text"><tspan x="20" y="76">Bars show 25th–75th percentile range,</tspan><tspan x="20" y="92">markers show median</tspan></text>
      </g>

      <g class="legend">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="310" y="20" width="134"/>
            <rect class="percentile-range" x="323" y="27" width="16" height="8" rx="1"/>
            <text class="legend-label" x="344" y="35">25th–75th percentile</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="454" y="20" width="65"/>
            <line class="median" x1="467" y1="28" x2="467" y2="36" stroke-width="3"/>
            <text class="legend-label" x="475" y="35">Median</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="529" y="20" width="111"/>
            <circle class="median-only" cx="542" cy="31" r="4"/>
            <text class="legend-label" x="550" y="35">Median only (&lt;30)</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-horizontal scale-salary-range" transform="translate(0 70)">
      <g class="grid" stroke="#E8E8E8" stroke-width="1">
        <line x1="225.4" y1="66" x2="225.4" y2="248"/>
        <line x1="353.0" y1="66" x2="353.0" y2="248"/>
        <line x1="480.6" y1="66" x2="480.6" y2="248"/>
      </g>

      <g class="labels" font-size="10" text-anchor="end">
        <text><tspan x="90" y="76">DocOps</tspan></text>
        <text><tspan x="90" y="110">Developer or</tspan><tspan x="90" y="122">engineer</tspan></text>
        <text><tspan x="90" y="148">Project or</tspan><tspan x="90" y="160">product manager</tspan></text>
        <text><tspan x="90" y="186">Technical</tspan><tspan x="90" y="198">writer</tspan></text>
        <text><tspan x="90" y="224">Editor</tspan></text>
      </g>

      <g class="tracks">
        <rect class="track" x="98" y="66" width="510" height="20"/>
        <rect class="track" x="98" y="104" width="510" height="20"/>
        <rect class="track" x="98" y="142" width="510" height="20"/>
        <rect class="track" x="98" y="180" width="510" height="20"/>
        <rect class="track" x="98" y="218" width="510" height="20"/>
      </g>

      <g class="ranges">
        <g class="range-row">
          <rect x="296.7" y="180" width="231.6" height="20" class="percentile-range" rx="2"/>
          <line x1="385.1" y1="177" x2="385.1" y2="203" class="median" stroke-width="3"/>
        </g>
      </g>

      <g class="median-points">
        <g class="point-row"><circle cx="506.7" cy="76" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="395.0" cy="114" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="388.9" cy="152" r="5" class="median-only"/></g>
        <g class="point-row"><circle cx="384.2" cy="228" r="5" class="median-only"/></g>
      </g>

      <g class="value-labels-outer" text-anchor="end">
        <text><tspan x="640" y="80">$128K</tspan></text>
        <text><tspan x="640" y="118">$93K</tspan></text>
        <text><tspan x="640" y="156">$91K</tspan></text>
        <text><tspan x="640" y="194">$90K</tspan></text>
        <text><tspan x="640" y="232">$90K</tspan></text>
      </g>

      <g class="x-axis" text-anchor="middle">
        <line x1="98" y1="258" x2="608" y2="258" stroke="#F0F0F0" stroke-width="1"/>
        <g class="axis-labels">
          <text font-size="10"><tspan x="98" y="278">$0</tspan></text>
          <text font-size="10"><tspan x="225.4" y="278">$40K</tspan></text>
          <text font-size="10"><tspan x="353.0" y="278">$80K</tspan></text>
          <text font-size="10"><tspan x="480.6" y="278">$120K</tspan></text>
          <text font-size="10"><tspan x="608.0" y="278">$160K</tspan></text>
        </g>
      </g>
    </g>
  </g>

</svg>
