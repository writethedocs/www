<svg viewBox="0 55 660 300" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-time-in-role-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33.054">Time in current role</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49.054">Employees (n=709)</tspan></text>
    </g>

    <g class="bar-chart-vertical scale-single-series">

      <g class="y-axis">

        <g class="gridlines">
          <path d="M68.5 319.5H620.5"/>
          <path d="M68.5 273.5H620.5"/>
          <path d="M68.5 227.5H620.5"/>
          <path d="M68.5 180.5H620.5"/>
          <path d="M68.5 134.5H620.5"/>
          <path d="M68.5 87.5H620.5"/>
        </g>

        <g class="axis-labels">
          <text font-size="10"><tspan x="46.4883" y="323.384">0%</tspan></text>
          <text font-size="10"><tspan x="40.4824" y="277.384">10%</tspan></text>
          <text font-size="10"><tspan x="40.4824" y="231.384">20%</tspan></text>
          <text font-size="10"><tspan x="40.4824" y="185.384">30%</tspan></text>
          <text font-size="10"><tspan x="40.4824" y="139.384">40%</tspan></text>
          <text font-size="10"><tspan x="40.4824" y="92.3843">50%</tspan></text>
        </g>

      </g>

      <g class="data-series">

        <g class="a">

          <g class="axis-labels">
            <text font-size="10"><tspan x="100.177" y="337.384">0-1 year</tspan></text>
            <text font-size="10"><tspan x="207.574" y="337.384">1-2 years</tspan></text>
            <text font-size="10"><tspan x="317.974" y="337.384">2-5 years</tspan></text>
            <text font-size="10"><tspan x="425.371" y="337.384">5-10 years</tspan></text>
            <text font-size="10"><tspan x="538.774" y="337.384">10+ years</tspan></text>
          </g>

          <g class="bars">
            <!-- 0-1 year: 20.6% = 95px -->
            <rect x="72.5"  y="225" width="102" height="95"  rx="2"/>
            <!-- 1-2 years: 15.7% = 72px -->
            <rect x="183.5" y="248" width="101" height="72"  rx="2"/>
            <!-- 2-5 years: 40.1% = 184px -->
            <rect x="293.5" y="136" width="102" height="184" rx="2"/>
            <!-- 5-10 years: 17.3% = 80px -->
            <rect x="404.5" y="240" width="101" height="80"  rx="2"/>
            <!-- 10+ years: 6.3% = 29px -->
            <rect x="514.5" y="291" width="102" height="29"  rx="2"/>
          </g>

        </g>

      </g>

      <g class="legend">
        <rect x="565" y="70" width="80" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
        <circle class="series-a" cx="579" cy="80" r="6"/>
        <text font-size="10" fill="#252521"><tspan x="589" y="84">Employees</tspan></text>
      </g>

    </g>

  </g>

</svg>
