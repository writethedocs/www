<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 660 315">
  <title>Median salary (USD) by age group</title>
  <text x="330" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#252521">Median salary (USD) by age group</text>

  <!-- Horizontal grid lines and Y-axis labels -->
  <line x1="90" y1="270.0" x2="570" y2="270.0" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="274.0" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$40K</text>
  <line x1="90" y1="229.8" x2="570" y2="229.8" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="233.8" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$80K</text>
  <line x1="90" y1="189.5" x2="570" y2="189.5" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="193.5" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$120K</text>
  <line x1="90" y1="149.2" x2="570" y2="149.2" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="153.2" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$160K</text>
  <line x1="90" y1="109.0" x2="570" y2="109.0" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="113.0" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$200K</text>

  <!-- Axes -->
  <line x1="90" y1="109.0" x2="90" y2="270.0" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="90" y1="270.0" x2="570" y2="270.0" stroke="#CCCCCC" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="90" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">18-25</text>
  <text x="210" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">26-35</text>
  <text x="330" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">36-45</text>
  <text x="450" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">46-55</text>
  <text x="570" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">56-65</text>

  <!-- Series lines and markers -->
  <polyline points="90,237.1 210,235.8 330,216.6 450,205.4 570,184.3" fill="none" stroke="#E4774E" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="90" cy="237.1" r="5" fill="#E4774E"/>
  <circle cx="210" cy="235.8" r="5" fill="#E4774E"/>
  <circle cx="330" cy="216.6" r="5" fill="#E4774E"/>
  <circle cx="450" cy="205.4" r="5" fill="#E4774E"/>
  <circle cx="570" cy="184.3" r="5" fill="#E4774E"/>
  <polyline points="90,231.8 210,215.7 330,182.5 450,189.5 570,169.9" fill="none" stroke="#1A4A8C" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="90" cy="231.8" r="5" fill="#1A4A8C"/>
  <circle cx="210" cy="215.7" r="5" fill="#1A4A8C"/>
  <circle cx="330" cy="182.5" r="5" fill="#1A4A8C"/>
  <circle cx="450" cy="189.5" r="5" fill="#1A4A8C"/>
  <circle cx="570" cy="169.9" r="5" fill="#1A4A8C"/>
  <polyline points="210,247.7 330,239.8 450,237.3" fill="none" stroke="#82A555" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="210" cy="247.7" r="5" fill="#82A555"/>
  <circle cx="330" cy="239.8" r="5" fill="#82A555"/>
  <circle cx="450" cy="237.3" r="5" fill="#82A555"/>

  <!-- Legend -->
  <rect x="545" y="55" width="100" height="50" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
  <circle cx="558" cy="66" r="5" fill="#E4774E"/>
  <text x="567" y="70" font-family="sans-serif" font-size="10" fill="#252521">Worldwide</text>
  <circle cx="558" cy="80" r="5" fill="#1A4A8C"/>
  <text x="567" y="84" font-family="sans-serif" font-size="10" fill="#252521">North America</text>
  <circle cx="558" cy="94" r="5" fill="#82A555"/>
  <text x="567" y="98" font-family="sans-serif" font-size="10" fill="#252521">Europe</text>
</svg>