<svg viewBox="0 0 660 420" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-contractor-type-products-services-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Products and/or services provided</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (46)</text>
      </g>

      <g class="legend scale-products-services">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="364" y="20" width="66"/>
            <circle class="product" cx="377" cy="31"/>
            <text class="legend-label" x="385" y="35">Product</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="440" y="20" width="63"/>
            <circle class="service" cx="453" cy="31"/>
            <text class="legend-label" x="461" y="35">Service</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="513" y="20" width="52"/>
            <circle class="both" cx="526" cy="31"/>
            <text class="legend-label" x="534" y="35">Both</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="575" y="20" width="65"/>
            <circle class="neither" cx="588" cy="31"/>
            <text class="legend-label" x="596" y="35">Neither</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-products-services" transform="translate(2 10)">
      <path class="slice neither" d="M231.181 117.431 A150 150 0 1 1 238.819 352.610 L292.327 280.244 A60 60 0 1 0 289.273 186.172 Z"/>
      <path class="slice service" d="M238.819 352.610 A150 150 0 0 1 194.924 162.784 L274.770 204.314 A60 60 0 0 0 292.327 280.244 Z"/>
      <path class="slice both" d="M194.924 162.784 A150 150 0 0 1 222.826 125.049 L285.931 189.220 A60 60 0 0 0 274.770 204.314 Z"/>
      <path class="slice product" d="M222.826 125.049 A150 150 0 0 1 231.181 117.431 L289.273 186.172 A60 60 0 0 0 285.931 189.220 Z"/>

      <text class="value-labels-inner" text-anchor="middle"><tspan x="435" y="247">71.3%</tspan></text>
      <text class="value-labels-inner" text-anchor="middle"><tspan x="228" y="264">22.5%</tspan></text>
      <text class="value-labels-inner" text-anchor="middle"><tspan x="245" y="174">5.0%</tspan></text>
    </g>
  </g>

</svg>
