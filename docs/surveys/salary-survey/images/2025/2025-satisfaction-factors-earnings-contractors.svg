<svg viewBox="0 20 660 230" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-satisfaction-factors-earnings-contractors">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Satisfaction factors: earnings</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Contractors</tspan></text>
    </g>

    <g class="bar-chart-horizontal scale-statement-bars">

      <g class="legend">
        <rect x="469" y="35" width="176" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
        <circle cx="482" cy="45" r="6" class="disagree"/>
        <circle cx="545" cy="45" r="6" class="neutral"/>
        <circle cx="603" cy="45" r="6" class="agree"/>
        <text font-size="10" fill="#252521"><tspan x="492" y="49">Disagree</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="555" y="49">Neutral</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="613" y="49">Agree</tspan></text>
      </g>

      <g class="row-0">
        <text font-size="12" fill="#252521"><tspan x="62" y="99">My rates keep pace with</tspan><tspan x="66" y="114">inflation / cost-of-living</tspan></text>
        <rect x="207" y="82" width="140" height="38" rx="5" class="disagree"/>
        <rect x="349" y="82" width="62" height="38" rx="5" class="neutral"/>
        <rect x="413" y="82" width="120" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="263" y="105">43.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="364" y="105">19.2%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="455" y="105">37.2%</tspan></text>
      </g>

      <g class="row-1">
        <text font-size="12" fill="#252521"><tspan x="159" y="150">My rates match the</tspan><tspan x="140" y="163">expectations of my clients</tspan></text>
        <rect x="292" y="132" width="56" height="38" rx="5" class="disagree"/>
        <rect x="350" y="132" width="60" height="38" rx="5" class="neutral"/>
        <rect x="412" y="132" width="206" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="306" y="155">17.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="364" y="155">18.7%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="497" y="155">64.0%</tspan></text>
      </g>

      <g class="row-2">
        <text font-size="12" fill="#252521"><tspan x="35" y="200">I am comfortable managing the overhead</tspan><tspan x="39" y="213">associated with contracting/freelancing</tspan></text>
        <rect x="268" y="182" width="90" height="38" rx="5" class="disagree"/>
        <rect x="360" y="182" width="40" height="38" rx="5" class="neutral"/>
        <rect x="402" y="182" width="192" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="299" y="205">27.8%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="365" y="205">12.5%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="480" y="205">59.7%</tspan></text>
      </g>

    </g>

  </g>

</svg>
