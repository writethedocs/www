<svg viewBox="0 0 660 323" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-satisfaction-factors-workplace-employees-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Satisfaction factors: workplace</text>
        <text x="20" y="55" class="subtitle-text">Employee respondents (709)</text>
      </g>

      <g class="legend scale-statement-bars">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="426" y="20" width="70"/>
            <circle class="disagree" cx="439" cy="31"/>
            <text class="legend-label" x="447" y="35">Disagree</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="506" y="20" width="65"/>
            <circle class="neutral" cx="519" cy="31"/>
            <text class="legend-label" x="527" y="35">Neutral</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="581" y="20" width="59"/>
            <circle class="agree" cx="594" cy="31"/>
            <text class="legend-label" x="602" y="35">Agree</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-horizontal scale-statement-bars" transform="translate(0 33)">
<g class="flexibility">
        <text font-size="12" fill="#252521"><tspan x="55" y="107">I have flexibility in my work location</tspan></text>
        <rect x="263" y="82" width="53" height="38" rx="5" class="disagree"/>
        <rect x="318" y="82" width="25" height="38" rx="5" class="neutral"/>
        <rect x="345" y="82" width="244" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="272" y="105">16.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="449" y="105">75.8%</tspan></text>
      </g>

      <g class="remote">
        <text font-size="12" fill="#252521"><tspan x="78" y="157">Our remote work systems function well</tspan></text>
        <rect x="295" y="132" width="19" height="38" rx="5" class="disagree"/>
        <rect x="316" y="132" width="28" height="38" rx="5" class="neutral"/>
        <rect x="346" y="132" width="275" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="466" y="155">85.4%</tspan></text>
      </g>

      <g class="on-site">
        <text font-size="12" fill="#252521"><tspan x="55" y="207">Our on-site work systems function well</tspan></text>
        <rect x="271" y="182" width="27" height="38" rx="5" class="disagree"/>
        <rect x="300" y="182" width="61" height="38" rx="5" class="neutral"/>
        <rect x="363" y="182" width="234" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="313" y="205">19.0%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="462" y="205">72.7%</tspan></text>
      </g>

      <g class="hybrid">
        <text font-size="12" fill="#252521"><tspan x="60" y="257">Our hybrid work systems function well</tspan></text>
        <rect x="271" y="232" width="26" height="38" rx="5" class="disagree"/>
        <rect x="299" y="232" width="62" height="38" rx="5" class="neutral"/>
        <rect x="363" y="232" width="234" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="312" y="255">19.1%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="462" y="255">72.7%</tspan></text>
      </g>
    </g>
  </g>

</svg>
