<svg viewBox="0 0 660 305" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-overall-satisfaction-employees-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Overall satisfaction</text>
        <text x="20" y="55" class="subtitle-text">Employee respondents (709)</text>
      </g>

      <g class="legend scale-satisfaction">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="373" y="20" width="101"/>
            <circle class="very-unsatisfied" cx="386" cy="31"/>
            <text class="legend-label" x="394" y="35">Very unsatisfied</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="484" y="20" width="81"/>
            <circle class="unsatisfied" cx="497" cy="31"/>
            <text class="legend-label" x="505" y="35">Unsatisfied</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="575" y="20" width="65"/>
            <circle class="neutral" cx="588" cy="31"/>
            <text class="legend-label" x="596" y="35">Neutral</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="471" y="52" width="69"/>
            <circle class="satisfied" cx="484" cy="63"/>
            <text class="legend-label" x="492" y="67">Satisfied</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="550" y="52" width="90"/>
            <circle class="very-satisfied" cx="563" cy="63"/>
            <text class="legend-label" x="571" y="67">Very satisfied</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-satisfaction" transform="translate(0 22) translate(330 262) scale(1.2) translate(-330 -262)">
      <path class="slice very-unsatisfied" d="M180.000 262.000 A150 150 0 0 1 180.847 246.078 L270.339 255.631 A60 60 0 0 0 270.000 262.000 Z"/>
      <path class="slice unsatisfied" d="M180.847 246.078 A150 150 0 0 1 203.845 180.853 L279.538 229.541 A60 60 0 0 0 270.339 255.631 Z"/>
      <path class="slice neutral" d="M203.845 180.853 A150 150 0 0 1 258.870 129.938 L301.548 209.175 A60 60 0 0 0 279.538 229.541 Z"/>
      <path class="slice satisfied" d="M258.870 129.938 A150 150 0 0 1 447.245 168.439 L376.898 224.576 A60 60 0 0 0 301.548 209.175 Z"/>
      <path class="slice very-satisfied" d="M447.245 168.439 A150 150 0 0 1 480.000 262.000 L390.000 262.000 A60 60 0 0 0 376.898 224.576 Z"/>

      <text font-size="14" class="value-labels-inner"><tspan x="208" y="230">14.8%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="237" y="186">16.1%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="334" y="159">44.3%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="416" y="231">21.4%</tspan></text>
    </g>
  </g>

</svg>
