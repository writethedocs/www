<svg viewBox="0 55 660 231" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-overall-satisfaction-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Overall satisfaction</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees</tspan></text>
    </g>

    <g class="donut-chart">

      <!-- Very unsatisfied (3.4%): 180.0°→186.1° -->
      <path d="M180.000 262.000 A150 150 0 0 1 180.847 246.078 L270.339 255.631 A60 60 0 0 0 270.000 262.000 Z" fill="#C2255C" stroke="white" stroke-width="2"/>

      <!-- Unsatisfied (14.8%): 186.1°→212.8° -->
      <path d="M180.847 246.078 A150 150 0 0 1 203.845 180.853 L279.538 229.541 A60 60 0 0 0 270.339 255.631 Z" fill="#E4774E" stroke="white" stroke-width="2"/>

      <!-- Neutral (16.1%): 212.8°→241.7° -->
      <path d="M203.845 180.853 A150 150 0 0 1 258.870 129.938 L301.548 209.175 A60 60 0 0 0 279.538 229.541 Z" fill="#E9C168" stroke="white" stroke-width="2"/>

      <!-- Satisfied (44.3%): 241.7°→321.4° -->
      <path d="M258.870 129.938 A150 150 0 0 1 447.245 168.439 L376.898 224.576 A60 60 0 0 0 301.548 209.175 Z" fill="#82A555" stroke="white" stroke-width="2"/>

      <!-- Very satisfied (21.4%): 321.4°→360.0° -->
      <path d="M447.245 168.439 A150 150 0 0 1 480.000 262.000 L390.000 262.000 A60 60 0 0 0 376.898 224.576 Z" fill="#087F5B" stroke="white" stroke-width="2"/>

      <!-- Connectors and labels -->
      <path d="M140.3 254.2 C140.3 254.2 160.2 253.0 177.2 253.9" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M150.5 202.5 C150.5 202.5 169.7 205.5 185.7 211.1" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M199.4 128.2 C199.4 128.2 214.5 137.2 226.1 149.7" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M372.0 82.7 C372.0 82.7 364.0 95.4 360.6 112.1" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M509.6 202.9 C509.6 202.9 490.5 205.8 474.4 211.4" stroke="#252521" stroke-dasharray="1 3"/>

      <!-- Outer labels -->
      <text font-size="12"><tspan x="20" y="256">Very unsatisfied (3.4%)</tspan></text>
      <text font-size="12"><tspan x="90" y="204">Unsatisfied</tspan></text>
      <text font-size="12"><tspan x="154" y="130">Neutral</tspan></text>
      <text font-size="12"><tspan x="375" y="85">Satisfied</tspan></text>
      <text font-size="12"><tspan x="513" y="205">Very satisfied</tspan></text>

      <!-- Inner percentage labels -->
      <text font-size="14" class="value-labels-inner"><tspan x="208" y="230">14.8%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="237" y="186">16.1%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="334" y="159">44.3%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="416" y="231">21.4%</tspan></text>

    </g>

  </g>

</svg>