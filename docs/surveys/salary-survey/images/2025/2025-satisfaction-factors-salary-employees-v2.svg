<svg viewBox="0 0 660 273" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-satisfaction-factors-salary-employees-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Satisfaction factors: salary and benefits</text>
        <text x="20" y="55" class="subtitle-text">Employee respondents (709)</text>
      </g>

      <g class="legend scale-statement-bars">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="426" y="20" width="70"/>
            <circle class="disagree" cx="439" cy="31"/>
            <text class="legend-label" x="447" y="35">Disagree</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="506" y="20" width="65"/>
            <circle class="neutral" cx="519" cy="31"/>
            <text class="legend-label" x="527" y="35">Neutral</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="581" y="20" width="59"/>
            <circle class="agree" cx="594" cy="31"/>
            <text class="legend-label" x="602" y="35">Agree</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-horizontal scale-statement-bars" transform="translate(0 33)">
<g class="paid-fairly">
        <text font-size="12" fill="#252521"><tspan x="155" y="107">I&#x2019;m paid fairly</tspan></text>
        <rect x="238" y="82" width="62" height="38" rx="5" class="disagree"/>
        <rect x="302" y="82" width="57" height="38" rx="5" class="neutral"/>
        <rect x="361" y="82" width="203" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="254" y="105">19.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="315" y="105">17.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="444" y="105">63.0%</tspan></text>
      </g>

      <g class="inflation">
        <text font-size="12" fill="#252521"><tspan x="35" y="150">My salary keeps up with</tspan><tspan x="38" y="163">inflation / cost-of-living</tspan></text>
        <rect x="173" y="132" width="122" height="38" rx="5" class="disagree"/>
        <rect x="297" y="132" width="66" height="38" rx="5" class="neutral"/>
        <rect x="365" y="132" width="134" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="216" y="155">37.9%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="312" y="155">20.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="414" y="155">41.5%</tspan></text>
      </g>

      <g class="benefits">
        <text font-size="12" fill="#252521"><tspan x="100" y="207">My benefits are sufficient</tspan></text>
        <rect x="249" y="182" width="53" height="38" rx="5" class="disagree"/>
        <rect x="304" y="182" width="52" height="38" rx="5" class="neutral"/>
        <rect x="358" y="182" width="217" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="260" y="205">16.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="315" y="205">16.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="448" y="205">67.4%</tspan></text>
      </g>
    </g>
  </g>

</svg>
