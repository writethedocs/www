<svg viewBox="0 55 660 385" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-contractor-type-contract-length">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Typical contract length</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Contractors</tspan></text>
    </g>

    <g class="donut-chart" transform="translate(0 35)">

      <!-- Long term only (30.1%): 229.8°→338.2° -->
      <path d="M231.181 117.431 A150 150 0 0 1 467.234 176.198 L383.694 209.679 A60 60 0 0 0 289.273 186.172 Z" fill="#00AEFF" stroke="white" stroke-width="2"/>

      <!-- Not specified (28.7%): 338.2°→441.5° -->
      <path d="M467.234 176.198 A150 150 0 0 1 350.223 380.345 L336.889 291.338 A60 60 0 0 0 383.694 209.679 Z" fill="#BBBBBB" stroke="white" stroke-width="2"/>

      <!-- Mixed lengths (25.0%): 441.5°→531.5° -->
      <path d="M350.223 380.345 A150 150 0 0 1 179.655 254.223 L268.662 240.889 A60 60 0 0 0 336.889 291.338 Z" fill="#7EA4FF" stroke="white" stroke-width="2"/>

      <!-- Short term only (10.0%): 531.5°→567.5° -->
      <path d="M179.655 254.223 A150 150 0 0 1 194.924 162.784 L274.770 204.314 A60 60 0 0 0 268.662 240.889 Z" fill="#FFA600" stroke="white" stroke-width="2"/>

      <!-- Medium term only (6.2%): 567.5°→589.8° -->
      <path d="M194.924 162.784 A150 150 0 0 1 231.181 117.431 L289.273 186.172 A60 60 0 0 0 274.770 204.314 Z" fill="#FFD080" stroke="white" stroke-width="2"/>

      <!-- Inner percentage labels for large segments -->
      <text font-size="14" class="value-labels-inner" text-anchor="middle"><tspan x="355" y="138">30.1%</tspan></text>
      <text font-size="14" class="value-labels-inner" text-anchor="middle"><tspan x="421" y="292">28.7%</tspan></text>
      <text font-size="14" class="value-labels-inner" text-anchor="middle"><tspan x="268" y="324">25.0%</tspan></text>
      <text font-size="14" class="value-labels-inner" text-anchor="middle"><tspan x="226" y="223">10.0%</tspan></text>

    </g>

    <g class="legend">
      <rect x="295" y="70" width="350" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
      <circle cx="308" cy="80" r="6" fill="#FFA600"/>
      <text font-size="10" fill="#252521"><tspan x="318" y="84">Short only</tspan></text>
      <circle cx="374" cy="80" r="6" fill="#FFD080"/>
      <text font-size="10" fill="#252521"><tspan x="384" y="84">Medium only</tspan></text>
      <circle cx="454" cy="80" r="6" fill="#00AEFF"/>
      <text font-size="10" fill="#252521"><tspan x="464" y="84">Long only</tspan></text>
      <circle cx="519" cy="80" r="6" fill="#7EA4FF"/>
      <text font-size="10" fill="#252521"><tspan x="529" y="84">Mixed</tspan></text>
      <circle cx="570" cy="80" r="6" fill="#BBBBBB"/>
      <text font-size="10" fill="#252521"><tspan x="580" y="84">Not specified</tspan></text>
    </g>

  </g>

</svg>
