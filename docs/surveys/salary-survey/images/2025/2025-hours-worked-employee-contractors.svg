          <text font-size="10"><tspan x="40.4824" y="246.384">25%</tspan></text>
          <text font-size="10"><tspan x="40.4824" y="169.384">50%</tspan></text>
          
        </g>
      </g>

      <g class="data-series">
        <g class="a">
          <g class="axis-labels">
            <text font-size="12" text-anchor="middle"><tspan x="133.8" y="337.384">1–40</tspan></text>
            <text font-size="12" text-anchor="middle"><tspan x="274.3" y="337.384">41–60</tspan></text>
            <text font-size="12" text-anchor="middle"><tspan x="414.8" y="337.384">61–80</tspan></text>
