  <text x="447.7" y="230" font-family="sans-serif" font-size="10" fill="#252521">$90.6K</text>
  <rect x="200" y="257" width="425" height="18" fill="#F0F0F0"/>
  <rect x="438.5" y="257" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="270" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Editor</text>
  <text x="447.0" y="270" font-family="sans-serif" font-size="10" fill="#666666">$90.4K</text>

  <!-- X-axis ticks and labels -->
  <line x1="306.2" y1="276" x2="306.2" y2="281" stroke="#CCCCCC" stroke-width="1"/>
  <text x="306.2" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$40K</text>
  <line x1="412.5" y1="276" x2="412.5" y2="281" stroke="#CCCCCC" stroke-width="1"/>
  <text x="412.5" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$80K</text>
  <line x1="518.8" y1="276" x2="518.8" y2="281" stroke="#CCCCCC" stroke-width="1"/>
  <text x="518.8" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$120K</text>
  <line x1="625.0" y1="276" x2="625.0" y2="281" stroke="#CCCCCC" stroke-width="1"/>
  <text x="625.0" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$160K</text>

  <!-- Legend -->
  <rect x="502" y="55" width="143" height="36" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
