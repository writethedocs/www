  <rect x="200" y="177" width="425" height="18" fill="#F0F0F0"/>
  <rect x="442.4" y="177" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="190" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Project or product manager</text>
  <text x="450.9" y="190" font-family="sans-serif" font-size="10" fill="#666666">$91.8K</text>
  <rect x="200" y="217" width="425" height="18" fill="#F0F0F0"/>
