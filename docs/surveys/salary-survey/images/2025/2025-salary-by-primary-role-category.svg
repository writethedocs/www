<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 660 265">
  <title>Salary (USD) by primary role category</title>
  <text x="330" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#252521">Salary (USD) by primary role category</text>

  <!-- Grid lines -->
  <line x1="306.2" y1="97" x2="306.2" y2="276" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="412.5" y1="97" x2="412.5" y2="276" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="518.8" y1="97" x2="518.8" y2="276" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="625.0" y1="97" x2="625.0" y2="276" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Axes -->
  <line x1="200" y1="97" x2="200" y2="276" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="200" y1="276" x2="625.0" y2="276" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Bars -->
  <rect x="200" y="97" width="425" height="18" fill="#F0F0F0"/>
