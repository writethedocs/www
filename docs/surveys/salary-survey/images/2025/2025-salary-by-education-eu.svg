<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 660 185">
  <title>Salary (USD) by education level — Europe</title>
  <text x="330" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#252521">Salary (USD) by education level — Europe</text>

  <!-- Grid lines -->
  <line x1="306.2" y1="97" x2="306.2" y2="196" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="412.5" y1="97" x2="412.5" y2="196" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="518.8" y1="97" x2="518.8" y2="196" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="625.0" y1="97" x2="625.0" y2="196" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Axes -->
  <line x1="200" y1="97" x2="200" y2="196" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="200" y1="196" x2="625.0" y2="196" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Bars -->
  <rect x="200" y="97" width="425" height="18" fill="#F0F0F0"/>
  <rect x="368.7" y="97" width="178.9" height="18" fill="#A8C8E8"/>
  <rect x="425.2" y="97" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="110" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Undergraduate</text>
  <text x="554.6" y="110" font-family="sans-serif" font-size="10" fill="#252521">$64K</text>
  <rect x="200" y="137" width="425" height="18" fill="#F0F0F0"/>
  <rect x="378.9" y="137" width="139.7" height="18" fill="#A8C8E8"/>
  <rect x="437.0" y="137" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="150" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Postgraduate</text>
  <text x="525.6" y="150" font-family="sans-serif" font-size="10" fill="#252521">$67.3K</text>
  <rect x="200" y="177" width="425" height="18" fill="#F0F0F0"/>
  <rect x="402.8" y="177" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="190" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Multiple postgraduate</text>
  <text x="411.3" y="190" font-family="sans-serif" font-size="10" fill="#666666">$57.7K</text>

  <!-- X-axis ticks and labels -->
  <line x1="306.2" y1="196" x2="306.2" y2="201" stroke="#CCCCCC" stroke-width="1"/>
  <text x="306.2" y="213" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$30K</text>
  <line x1="412.5" y1="196" x2="412.5" y2="201" stroke="#CCCCCC" stroke-width="1"/>
  <text x="412.5" y="213" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$60K</text>
  <line x1="518.8" y1="196" x2="518.8" y2="201" stroke="#CCCCCC" stroke-width="1"/>
  <text x="518.8" y="213" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$90K</text>
  <line x1="625.0" y1="196" x2="625.0" y2="201" stroke="#CCCCCC" stroke-width="1"/>
  <text x="625.0" y="213" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$120K</text>

  <!-- Legend -->
  <rect x="502" y="55" width="143" height="36" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
  <rect x="514" y="60" width="3" height="10" fill="#1A4A8C"/>
  <text x="524" y="69" font-family="sans-serif" font-size="10" fill="#252521">Median</text>
  <circle cx="516" cy="79" r="5" fill="#A8C8E8"/>
  <text x="524" y="83" font-family="sans-serif" font-size="10" fill="#252521">25th–75th percentile</text>
</svg>