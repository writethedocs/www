        <rect x="289" y="238" width="83" height="27" rx="5" fill="#E9C168"/>
        <rect x="374" y="238" width="123" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="211" y="256">36.1%</tspan></text>
