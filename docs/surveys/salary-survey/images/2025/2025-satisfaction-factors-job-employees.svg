<svg viewBox="0 25 660 421" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-satisfaction-factors-job-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Satisfaction factors: overall job</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees</tspan></text>
    </g>

    <g class="bar-chart-horizontal">

      <g class="legend">
        <rect x="469" y="35" width="176" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
        <circle cx="482" cy="45" r="6" fill="#E4774E"/>
        <circle cx="545" cy="45" r="6" fill="#E9C168"/>
        <circle cx="603" cy="45" r="6" fill="#82A555"/>
        <text font-size="10" fill="#252521"><tspan x="492" y="49">Disagree</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="555" y="49">Neutral</tspan></text>
        <text font-size="10" fill="#252521"><tspan x="613" y="49">Agree</tspan></text>
      </g>

      <g class="hours">
        <text font-size="10" fill="#252521"><tspan x="160" y="99">My hours are reasonable</tspan></text>
        <rect x="295" y="82" width="23" height="27" rx="5" fill="#E4774E"/>
        <rect x="320" y="82" width="20" height="27" rx="5" fill="#E9C168"/>
        <rect x="342" y="82" width="279" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="464" y="100">86.7%</tspan></text>
      </g>

      <g class="flexibility">
        <text font-size="10" fill="#252521"><tspan x="148" y="138">I have flexibility in my hours</tspan></text>
        <rect x="307" y="121" width="13" height="27" rx="5" fill="#E4774E"/>
        <rect x="322" y="121" width="17" height="27" rx="5" fill="#E9C168"/>
        <rect x="341" y="121" width="292" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="469" y="139">90.7%</tspan></text>
      </g>

      <g class="responsibilities">
        <text font-size="10" fill="#252521"><tspan x="96" y="177">My responsibilities are reasonable</tspan></text>
        <rect x="268" y="160" width="41" height="27" rx="5" fill="#E4774E"/>
        <rect x="311" y="160" width="38" height="27" rx="5" fill="#E9C168"/>
        <rect x="351" y="160" width="243" height="27" rx="5" fill="#82A555"/>
