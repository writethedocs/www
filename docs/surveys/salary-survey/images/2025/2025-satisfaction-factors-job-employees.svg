        <text font-size="12" class="value-labels-inner"><tspan x="418" y="256">38.1%</tspan></text>
      </g>

      <g class="professional">
        <text font-size="10" fill="#252521"><tspan x="100" y="288">I have opportunities for</tspan><tspan x="94" y="299">professional development</tspan></text>
        <rect x="233" y="277" width="64" height="27" rx="5" fill="#E4774E"/>
        <rect x="299" y="277" width="63" height="27" rx="5" fill="#E9C168"/>
        <rect x="364" y="277" width="195" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="247" y="295">19.7%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="313" y="295">19.7%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="444" y="295">60.6%</tspan></text>
      </g>

      <g class="challenging">
        <text font-size="10" fill="#252521"><tspan x="130" y="327">My work is sufficiently</tspan><tspan x="120" y="338">interesting / challenging</tspan></text>
        <rect x="262" y="316" width="37" height="27" rx="5" fill="#E4774E"/>
        <rect x="301" y="316" width="58" height="27" rx="5" fill="#E9C168"/>
        <rect x="361" y="316" width="227" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="263" y="334">11.6%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="312" y="334">17.9%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="457" y="334">70.5%</tspan></text>
