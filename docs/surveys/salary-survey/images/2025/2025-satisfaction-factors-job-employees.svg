      <g class="toolset">
        <text font-size="10" fill="#252521"><tspan x="94" y="366">I&#x2019;m satisfied with the</tspan><tspan x="74" y="377">systems and toolsets I use</tspan></text>
        <rect x="219" y="355" width="75" height="27" rx="5" fill="#E4774E"/>
        <rect x="296" y="355" width="69" height="27" rx="5" fill="#E9C168"/>
        <rect x="367" y="355" width="178" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="239" y="373">23.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="313" y="373">21.3%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="438" y="373">55.4%</tspan></text>
