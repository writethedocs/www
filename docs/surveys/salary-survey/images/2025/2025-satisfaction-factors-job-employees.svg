        <text font-size="12" class="value-labels-inner"><tspan x="455" y="178">75.5%</tspan></text>
      </g>

      <g class="workload">
        <text font-size="10" fill="#252521"><tspan x="96" y="216">My workload is manageable</tspan></text>
        <rect x="245" y="199" width="57" height="27" rx="5" fill="#E4774E"/>
        <rect x="304" y="199" width="53" height="27" rx="5" fill="#E9C168"/>
        <rect x="359" y="199" width="212" height="27" rx="5" fill="#82A555"/>
        <text font-size="12" class="value-labels-inner"><tspan x="256" y="217">17.8%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="313" y="217">16.4%</tspan></text>
        <text font-size="12" class="value-labels-inner"><tspan x="555" y="217">65.8%</tspan></text>
