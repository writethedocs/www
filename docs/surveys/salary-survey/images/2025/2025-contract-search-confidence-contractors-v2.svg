<svg viewBox="0 0 660 305" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-contract-search-confidence-contractors-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Contract search confidence</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (6)</text>
        <text x="20" y="71" class="subtitle-text">ability to secure a new contract with favorable terms</text>
      </g>

      <g class="legend scale-search-confidence">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="389" y="20" width="74"/>
            <circle class="not-at-all" cx="402" cy="31"/>
            <text class="legend-label" x="410" y="35">Not at all</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="473" y="20" width="92"/>
            <circle class="not-confident" cx="486" cy="31"/>
            <text class="legend-label" x="494" y="35">Not confident</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="575" y="20" width="65"/>
            <circle class="neutral" cx="588" cy="31"/>
            <text class="legend-label" x="596" y="35">Neutral</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="458" y="52" width="76"/>
            <circle class="confident" cx="471" cy="63"/>
            <text class="legend-label" x="479" y="67">Confident</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="544" y="52" width="96"/>
            <circle class="very-confident" cx="557" cy="63"/>
            <text class="legend-label" x="565" y="67">Very confident</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-search-confidence" transform="translate(0 15) translate(330 269) scale(1.2) translate(-330 -269)">
      <path class="slice not-at-all" d="M200.1 194.0 A150 150 0 0 0 180 269 L270 269 A60 60 0 0 1 278.0 239.0 Z"/>
      <path class="slice not-confident" d="M200.1 194.0 A150 150 0 0 1 330 119.0 L330 209.0 A60 60 0 0 0 278.0 239.0 Z"/>
      <path class="slice neutral" d="M330 119.0 A150 150 0 0 1 459.9 194.0 L382.0 239.0 A60 60 0 0 0 330 209.0 Z"/>
      <path class="slice confident" d="M459.9 194.0 A150 150 0 0 1 480 269 L390 269 A60 60 0 0 0 382.0 239.0 Z"/>

      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="229" y="246">16.7%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="278" y="183">33.3%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="383" y="183">33.3%</tspan></text>
      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="431" y="246">16.7%</tspan></text>
    </g>
  </g>

</svg>
