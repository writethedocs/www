<svg viewBox="0 55 660 353" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-organization-size">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Organization size</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Number of employees</tspan></text>
    </g>

    <g class="bar-chart-vertical">

      <g class="y-axis">

        <g class="gridlines">
          <path d="M68 369.5H620" stroke="#F0F0F0"/>
          <path d="M68 229.5H620" stroke="#F0F0F0"/>
          <path d="M68 87.5H620" stroke="#F0F0F0"/>
        </g>

        <g class="axis-labels">
          <text font-size="10"><tspan x="45" y="372">0%</tspan></text>
          <text font-size="10"><tspan x="40" y="232">20%</tspan></text>
          <text font-size="10"><tspan x="40" y="91">40%</tspan></text>
        </g>

      </g>

      <g class="data-series">

        <g class="a">

          <g class="axis-labels">
            <text font-size="10"><tspan x="98" y="386">1-10</tspan></text>
            <text font-size="10"><tspan x="174" y="386">11-50</tspan></text>
            <text font-size="10"><tspan x="251" y="386">51-100</tspan></text>
            <text font-size="10"><tspan x="324" y="386">101-1000</tspan></text>
            <text font-size="10"><tspan x="397" y="386">1001-10,000</tspan></text>
            <text font-size="10"><tspan x="469" y="386">10,001-100,000</tspan></text>
            <text font-size="10"><tspan x="560" y="386">100,000+</tspan></text>
          </g>

          <g class="bars">
            <!-- 1-10: 1.2% → top=362 -->
            <rect x="71"  y="362" width="73" height="8"   rx="2" fill="#00AEFF"/>
            <!-- 11-50: 4.9% → top=335 -->
            <rect x="150" y="335" width="73" height="35"  rx="2" fill="#00AEFF"/>
            <!-- 51-100: 7.4% → top=318 -->
            <rect x="229" y="318" width="72" height="52"  rx="2" fill="#00AEFF"/>
            <!-- 101-1,000: 34.4% → top=127 -->
            <rect x="308" y="127" width="72" height="243" rx="2" fill="#00AEFF"/>
            <!-- 1,001-10,000: 29.4% → top=162 -->
            <rect x="387" y="162" width="72" height="208" rx="2" fill="#00AEFF"/>
            <!-- 10,001-100,000: 14.4% → top=268 -->
            <rect x="465" y="268" width="73" height="102" rx="2" fill="#00AEFF"/>
            <!-- 100,000+: 8.3% → top=311 -->
            <rect x="544" y="311" width="73" height="59"  rx="2" fill="#00AEFF"/>
          </g>

          <g class="value-labels">

          </g>

        </g>

      </g>

      <g class="legend">

      </g>

    </g>

  </g>

</svg>
