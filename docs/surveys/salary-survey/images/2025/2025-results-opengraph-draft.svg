<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Documentation Salary Survey 2025 Results — 755 documentarians from 48 countries; 89% employees, 6% contractors, 4% both">
  <!-- Background: WTD teal -->
  <rect width="1200" height="630" fill="#2D8E9D"/>

  <!-- Subtle inset frame -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2" rx="6"/>

  <!-- Title bar -->
  <text x="60" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#ffffff" font-weight="700">Documentation Salary Survey 2025 — Results</text>

  <!-- WTD logo placeholder (drop the real logo here) -->
  <g transform="translate(1075, 38)">
    <rect x="0" y="0" width="70" height="70" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5"/>
    <text x="35" y="24" font-family="Arial Black, 'Helvetica Neue', sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="900" letter-spacing="0.5">WRITE</text>
    <text x="35" y="40" font-family="Arial Black, 'Helvetica Neue', sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="900" letter-spacing="0.5">THE</text>
    <text x="35" y="56" font-family="Arial Black, 'Helvetica Neue', sans-serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="900" letter-spacing="0.5">DOCS</text>
  </g>

  <!-- Thin divider under title -->
  <line x1="60" y1="105" x2="1050" y2="105" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Hero number: 755 -->
  <text x="600" y="320" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="240" fill="#E4774E" font-weight="900" text-anchor="middle" letter-spacing="-8">755</text>

  <!-- Subhead -->
  <text x="600" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#ffffff" font-weight="400" text-anchor="middle" font-style="italic">documentarians</text>

  <!-- Secondary line: from 48 countries (split into three positioned text elements for reliable spacing) -->
  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="42">
    <text x="558" y="470" fill="#ffffff" font-weight="400" text-anchor="end">from</text>
    <text x="600" y="470" fill="#FFD789" font-weight="900" text-anchor="middle">48</text>
    <text x="642" y="470" fill="#ffffff" font-weight="400" text-anchor="start">countries</text>
  </g>

  <!-- Footer divider -->
  <line x1="60" y1="540" x2="1140" y2="540" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Bottom stat strip: employment breakdown -->
  <g transform="translate(600, 585)">
    <!-- 89% employees -->
    <text x="-310" y="0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="800" text-anchor="end">89%</text>
    <text x="-300" y="0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="400">employees</text>

    <!-- separator -->
    <circle cx="-130" cy="-8" r="3" fill="#ffffff" fill-opacity="0.5"/>

    <!-- 6% contractors -->
    <text x="-110" y="0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="800" text-anchor="end">6%</text>
    <text x="-100" y="0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="400">contractors</text>

    <!-- separator -->
    <circle cx="120" cy="-8" r="3" fill="#ffffff" fill-opacity="0.5"/>

    <!-- 4% both -->
    <text x="140" y="0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="800" text-anchor="end">4%</text>
    <text x="150" y="0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="400">both</text>
  </g>
</svg>
