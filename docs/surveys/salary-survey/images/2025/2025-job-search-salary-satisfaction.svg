<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 660 229">
  <title>Percentage actively looking for work, by salary satisfaction</title>
  <text x="330" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#252521">% actively looking, by salary satisfaction</text>

  <!-- Grid lines -->
  <line x1="341.7" y1="61" x2="341.7" y2="240" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="483.3" y1="61" x2="483.3" y2="240" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="625.0" y1="61" x2="625.0" y2="240" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Axes -->
  <line x1="200" y1="61" x2="200" y2="240" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="200" y1="240" x2="625.0" y2="240" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Bars -->
  <rect x="200" y="61" width="425" height="18" fill="#F0F0F0"/>
  <rect x="200" y="61" width="36.1" height="18" fill="#E4774E"/>
  <text x="195" y="74" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Very satisfied</text>
  <text x="243.1" y="74" font-family="sans-serif" font-size="10" fill="#666666">5.1%</text>
  <rect x="200" y="101" width="425" height="18" fill="#F0F0F0"/>
  <rect x="200" y="101" width="48.2" height="18" fill="#E4774E"/>
  <text x="195" y="114" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Satisfied</text>
  <text x="255.2" y="114" font-family="sans-serif" font-size="10" fill="#666666">6.8%</text>
  <rect x="200" y="141" width="425" height="18" fill="#F0F0F0"/>
  <rect x="200" y="141" width="187.7" height="18" fill="#E4774E"/>
  <text x="195" y="154" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Neutral</text>
  <text x="394.7" y="154" font-family="sans-serif" font-size="10" fill="#666666">26.5%</text>
  <rect x="200" y="181" width="425" height="18" fill="#F0F0F0"/>
  <rect x="200" y="181" width="219.6" height="18" fill="#E4774E"/>
  <text x="195" y="194" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Unsatisfied</text>
  <text x="426.6" y="194" font-family="sans-serif" font-size="10" fill="#666666">31.0%</text>
  <rect x="200" y="221" width="425" height="18" fill="#F0F0F0"/>
  <rect x="200" y="221" width="393.8" height="18" fill="#E4774E"/>
  <text x="195" y="234" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Very unsatisfied</text>
  <text x="600.8" y="234" font-family="sans-serif" font-size="10" fill="#666666">55.6%</text>

  <!-- X-axis ticks and labels -->
  <line x1="200.0" y1="240" x2="200.0" y2="245" stroke="#CCCCCC" stroke-width="1"/>
  <text x="200.0" y="257" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">0%</text>
  <line x1="341.7" y1="240" x2="341.7" y2="245" stroke="#CCCCCC" stroke-width="1"/>
  <text x="341.7" y="257" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">20%</text>
  <line x1="483.3" y1="240" x2="483.3" y2="245" stroke="#CCCCCC" stroke-width="1"/>
  <text x="483.3" y="257" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">40%</text>
  <line x1="625.0" y1="240" x2="625.0" y2="245" stroke="#CCCCCC" stroke-width="1"/>
  <text x="625.0" y="257" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">60%</text>
</svg>