<svg viewBox="0 55 660 238" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-job-search-confidence-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Job search confidence</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees (n=108) — ability to secure a new position with favorable terms</tspan></text>
    </g>

    <g class="donut-chart">

      <!-- Not confident at all: 8.3% — t=180 to 195.0 -->
      <path d="M 180,269 A 150 150 0 0 1 185.1,230.2 L 272.0,253.5 A 60 60 0 0 0 270,269 Z" fill="#C2255C" stroke="white" stroke-width="2"/>

      <!-- Not confident: 38.0% — t=195.0 to 263.3 -->
      <path d="M 185.1,230.2 A 150 150 0 0 1 312.6,120.0 L 323.0,209.4 A 60 60 0 0 0 272.0,253.5 Z" fill="#E4774E" stroke="white" stroke-width="2"/>

      <!-- Neutral: 25.0% — t=263.3 to 308.3 -->
      <path d="M 312.6,120.0 A 150 150 0 0 1 423.0,151.3 L 367.2,221.9 A 60 60 0 0 0 323.0,209.4 Z" fill="#E9C168" stroke="white" stroke-width="2"/>

      <!-- Confident: 25.0% — t=308.3 to 353.3 -->
      <path d="M 423.0,151.3 A 150 150 0 0 1 479.0,251.5 L 389.6,262.0 A 60 60 0 0 0 367.2,221.9 Z" fill="#82A555" stroke="white" stroke-width="2"/>

      <!-- Very confident: 3.7% — t=353.3 to 360 -->
      <path d="M 479.0,251.5 A 150 150 0 0 1 480,269 L 390,269 A 60 60 0 0 0 389.6,262.0 Z" fill="#087F5B" stroke="white" stroke-width="2"/>

      <!-- Inner value labels (≥12% only) -->
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="261.3" y="194.5">38.0%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="358.6" y="172.9">25.0%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="421.7" y="222.7">25.0%</tspan></text>

      <!-- External labels -->
      <text font-size="12"><tspan x="20" y="249">Not confident at all</tspan></text>
      <text font-size="12"><tspan x="90" y="140">Not confident</tspan></text>
      <text font-size="12"><tspan x="375" y="89">Neutral</tspan></text>
      <text font-size="12"><tspan x="490" y="187">Confident</tspan></text>
      <text font-size="12"><tspan x="521" y="254">Very confident</tspan></text>

      <!-- Connectors -->
      <path d="M 144,249 C 152,249 173,249.2 176,249.3 L 180,249.4" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 175,140 C 190,143 220,152 225,153.8 L 231.8,155.6" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 385,93 C 382,103 374,119 372,122.5 L 370.9,124.7" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 485,187 C 479,187 468,194 466,195 L 461.1,196.1" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 516,254 C 508,254 482,260 480,260.2 L 479.7,260.3" stroke="#252521" stroke-dasharray="1 3"/>

    </g>

  </g>

</svg>
