<svg viewBox="0 55 660 238" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-job-search-confidence-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Job search confidence</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees (n=108) — ability to secure a new position with favorable terms</tspan></text>
    </g>

    <g class="donut-chart scale-search-confidence">

      <!-- Not confident at all: 8.3% — t=180 to 195.0 -->
      <path class="slice not-at-all" d="M 180,269 A 150 150 0 0 1 185.1,230.2 L 272.0,253.5 A 60 60 0 0 0 270,269 Z"/>

      <!-- Not confident: 38.0% — t=195.0 to 263.3 -->
      <path class="slice not-confident" d="M 185.1,230.2 A 150 150 0 0 1 312.6,120.0 L 323.0,209.4 A 60 60 0 0 0 272.0,253.5 Z"/>

      <!-- Neutral: 25.0% — t=263.3 to 308.3 -->
      <path class="slice neutral" d="M 312.6,120.0 A 150 150 0 0 1 423.0,151.3 L 367.2,221.9 A 60 60 0 0 0 323.0,209.4 Z"/>

      <!-- Confident: 25.0% — t=308.3 to 353.3 -->
      <path class="slice confident" d="M 423.0,151.3 A 150 150 0 0 1 479.0,251.5 L 389.6,262.0 A 60 60 0 0 0 367.2,221.9 Z"/>

      <!-- Very confident: 3.7% — t=353.3 to 360 -->
      <path class="slice very-confident" d="M 479.0,251.5 A 150 150 0 0 1 480,269 L 390,269 A 60 60 0 0 0 389.6,262.0 Z"/>

      <!-- Inner value labels (≥12% only) -->
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="261.3" y="194.5">38.0%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="358.6" y="172.9">25.0%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="421.7" y="222.7">25.0%</tspan></text>

    </g>

    <g class="legend scale-search-confidence">
      <rect x="261" y="70" width="384" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
      <circle class="swatch not-at-all" cx="274" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="284" y="84">Not all all</tspan></text>
      <circle class="swatch not-confident" cx="345" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="355" y="84">Not confident</tspan></text>
      <circle class="swatch neutral" cx="434" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="444" y="84">Neutral</tspan></text>
      <circle class="swatch confident" cx="494" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="504" y="84">Confident</tspan></text>
      <circle class="swatch very-confident" cx="561" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="571" y="84">Very confident</tspan></text>
    </g>

  </g>

</svg>
