<svg viewBox="0 0 660 323" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-satisfaction-factors-workplaces-contractors-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Satisfaction factors: workplaces</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (80)</text>
      </g>

      <g class="legend scale-statement-bars">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="426" y="20" width="70"/>
            <circle class="disagree" cx="439" cy="31"/>
            <text class="legend-label" x="447" y="35">Disagree</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="506" y="20" width="65"/>
            <circle class="neutral" cx="519" cy="31"/>
            <text class="legend-label" x="527" y="35">Neutral</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="581" y="20" width="59"/>
            <circle class="agree" cx="594" cy="31"/>
            <text class="legend-label" x="602" y="35">Agree</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-horizontal scale-statement-bars" transform="translate(0 33)">
<g class="row-0">
        <text font-size="12" fill="#252521"><tspan x="101" y="107">I have flexibility in my work location</tspan></text>
        <rect x="301" y="82" width="21" height="38" rx="5" class="disagree"/>
        <rect x="324" y="82" width="12" height="38" rx="5" class="neutral"/>
        <rect x="338" y="82" width="289" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="464" y="105">89.7%</tspan></text>
      </g>

      <g class="row-1">
        <text font-size="12" fill="#252521"><tspan x="65" y="157">Our remote work environment functions well</tspan></text>
        <rect x="311" y="132" width="13" height="38" rx="5" class="disagree"/>
        <rect x="326" y="132" width="9" height="38" rx="5" class="neutral"/>
        <rect x="337" y="132" width="300" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="469" y="155">93.2%</tspan></text>
      </g>

      <g class="row-2">
        <text font-size="12" fill="#252521"><tspan x="55" y="207">Our on-site work environment functions well</tspan></text>
        <rect x="297" y="182" width="21" height="38" rx="5" class="disagree"/>
        <rect x="320" y="182" width="21" height="38" rx="5" class="neutral"/>
        <rect x="343" y="182" width="280" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="465" y="205">87.1%</tspan></text>
      </g>

      <g class="row-3">
        <text font-size="12" fill="#252521"><tspan x="55" y="257">Our hybrid work environment functions well</tspan></text>
        <rect x="301" y="232" width="11" height="38" rx="5" class="disagree"/>
        <rect x="314" y="232" width="32" height="38" rx="5" class="neutral"/>
        <rect x="348" y="232" width="279" height="38" rx="5" class="agree"/>
        <text font-size="12" class="value-labels-inner"><tspan x="469" y="255">86.7%</tspan></text>
      </g>
    </g>
  </g>

</svg>
