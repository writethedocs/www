<svg viewBox="0 40 660 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-job-search-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="65">Job search status</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="82">Employees (n=675)</tspan></text>
    </g>

    <g class="donut-chart scale-job-search-status">

      <!-- Not looking — open to offers: 46.2% -->
      <path class="slice open-offers" d="M 220,90 A 150 150 0 0 1 255.3,385.8 L 234.1,298.3 A 60 60 0 0 0 220,180 Z"/>

      <!-- Not looking — not open: 26.1% -->
      <path class="slice not-open" d="M 255.3,385.8 A 150 150 0 0 1 72.2,265.4 L 160.9,250.1 A 60 60 0 0 0 234.1,298.3 Z"/>

      <!-- Actively looking: 12.7% -->
      <path class="slice actively-looking" d="M 72.2,265.4 A 150 150 0 0 1 98.9,151.6 L 171.5,204.6 A 60 60 0 0 0 160.9,250.1 Z"/>

      <!-- Not looking yet: 9.5% -->
      <path class="slice not-looking-yet" d="M 98.9,151.6 A 150 150 0 0 1 169.4,98.8 L 199.7,183.5 A 60 60 0 0 0 171.5,204.6 Z"/>

      <!-- Actively looking, open to contract: 5.5% -->
      <path class="slice open-to-contract" d="M 169.4,98.8 A 150 150 0 0 1 220,90 L 220,180 A 60 60 0 0 0 199.7,183.5 Z"/>

      <!-- Inner value labels -->
      <text font-size="12" fill="white" text-anchor="middle" font-weight="bold"><tspan x="324" y="232">46.2%</tspan></text>
      <text font-size="12" fill="white" text-anchor="middle" font-weight="bold"><tspan x="162" y="332">26.1%</tspan></text>
      <text font-size="11" fill="white" text-anchor="middle" font-weight="bold"><tspan x="118" y="220">12.7%</tspan></text>

    </g>

    <!-- Legend -->
    <g class="legend scale-job-search-status" font-size="10" fill="#50514F">

      <!-- Not looking — open to offers -->
      <rect class="swatch open-offers" x="415" y="175" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="185">Not looking — open to offers (46.2%)</tspan></text>

      <!-- Not looking — not open to offers -->
      <rect class="swatch not-open" x="415" y="203" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="213">Not looking — not open to offers (26.1%)</tspan></text>

      <!-- Actively looking -->
      <rect class="swatch actively-looking" x="415" y="231" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="241">Actively looking (12.7%)</tspan></text>

      <!-- Not looking yet -->
      <rect class="swatch not-looking-yet" x="415" y="259" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="269">Not looking, but expect to be within a year (9.5%)</tspan></text>

      <!-- Actively looking, open to contract -->
      <rect class="swatch open-to-contract" x="415" y="287" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="297">Actively looking, open to contract work (5.5%)</tspan></text>

    </g>

  </g>

</svg>
