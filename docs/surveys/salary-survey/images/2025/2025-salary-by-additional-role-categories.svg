<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 660 315">
  <title>Median salary (USD) by number of additional role categories</title>
  <text x="330" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#252521">Median salary (USD) by number of additional role categories</text>

  <!-- Horizontal grid lines and Y-axis labels -->
  <line x1="90" y1="270.0" x2="570" y2="270.0" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="274.0" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$40K</text>
  <line x1="90" y1="229.8" x2="570" y2="229.8" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="233.8" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$80K</text>
  <line x1="90" y1="189.5" x2="570" y2="189.5" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="193.5" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$120K</text>
  <line x1="90" y1="149.2" x2="570" y2="149.2" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="153.2" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$160K</text>
  <line x1="90" y1="109.0" x2="570" y2="109.0" stroke="#E8E8E8" stroke-width="1"/>
  <text x="82" y="113.0" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888888">$200K</text>

  <!-- Axes -->
  <line x1="90" y1="109.0" x2="90" y2="270.0" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="90" y1="270.0" x2="570" y2="270.0" stroke="#CCCCCC" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="90" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">None</text>
  <text x="250" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">1–2</text>
  <text x="410" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">3–5</text>
  <text x="570" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">6+</text>

  <!-- X-axis sub-label -->
  <text x="330" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">Additional role categories</text>

  <!-- Series lines and markers -->
  <polyline points="90,241.1 250,221.6 410,219.0 570,201.6" fill="none" stroke="#E4774E" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="90" cy="241.1" r="5" fill="#E4774E"/>
  <circle cx="250" cy="221.6" r="5" fill="#E4774E"/>
  <circle cx="410" cy="219.0" r="5" fill="#E4774E"/>
  <circle cx="570" cy="201.6" r="5" fill="#E4774E"/>
  <polyline points="90,214.7 250,205.5 410,191.5 570,171.9" fill="none" stroke="#1A4A8C" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="90" cy="214.7" r="5" fill="#1A4A8C"/>
  <circle cx="250" cy="205.5" r="5" fill="#1A4A8C"/>
  <circle cx="410" cy="191.5" r="5" fill="#1A4A8C"/>
  <circle cx="570" cy="171.9" r="5" fill="#1A4A8C"/>
  <polyline points="90,252.8 250,244.8 410,243.9 570,235.0" fill="none" stroke="#82A555" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="90" cy="252.8" r="5" fill="#82A555"/>
  <circle cx="250" cy="244.8" r="5" fill="#82A555"/>
  <circle cx="410" cy="243.9" r="5" fill="#82A555"/>
  <circle cx="570" cy="235.0" r="5" fill="#82A555"/>

  <!-- Legend -->
  <rect x="545" y="55" width="100" height="50" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
  <circle cx="558" cy="66" r="5" fill="#E4774E"/>
  <text x="567" y="70" font-family="sans-serif" font-size="10" fill="#252521">Worldwide</text>
  <circle cx="558" cy="80" r="5" fill="#1A4A8C"/>
  <text x="567" y="84" font-family="sans-serif" font-size="10" fill="#252521">North America</text>
  <circle cx="558" cy="94" r="5" fill="#82A555"/>
  <text x="567" y="98" font-family="sans-serif" font-size="10" fill="#252521">Europe</text>
</svg>