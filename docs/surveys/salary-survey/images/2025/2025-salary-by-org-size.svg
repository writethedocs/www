<svg viewBox="0 40 660 315" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-org-size" class="scale-salary-lines">

    <g class="title">
      <text font-size="14"><tspan x="40" y="20">Median salary (USD) by organization size</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="36">Employees — worldwide, North America, and Europe</tspan></text>
    </g>

    <!-- Legend (right-aligned, boxed, 15px margins) -->
    <rect x="360" y="55" width="285" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
    <line x1="366" y1="65" x2="388" y2="65" class="worldwide" stroke-width="2.5"/>
    <circle cx="377" cy="65" r="4" class="worldwide"/>
    <text font-size="10" fill="#252521"><tspan x="393" y="69">Worldwide</tspan></text>
    <line x1="459" y1="65" x2="481" y2="65" class="north-america" stroke-width="2.5"/>
    <circle cx="470" cy="65" r="4" class="north-america"/>
    <text font-size="10" fill="#252521"><tspan x="486" y="69">North America</tspan></text>
    <line x1="576" y1="65" x2="598" y2="65" class="europe" stroke-width="2.5"/>
    <circle cx="587" cy="65" r="4" class="europe"/>
    <text font-size="10" fill="#252521"><tspan x="603" y="69">Europe</tspan></text>

    <!-- Horizontal grid lines — same y scale as 2025-salary-by-experience.svg -->
    <!-- y = 270.2 − (value − 40000) × 161.2/120000 -->
    <!-- $160K=109.0, $140K=135.8, $120K=162.7, $100K=189.6, $80K=216.5, $60K=243.4, $40K=270.2 -->
    <line x1="70" y1="109.0" x2="590" y2="109.0" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="135.8" x2="590" y2="135.8" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="162.7" x2="590" y2="162.7" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="189.6" x2="590" y2="189.6" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="216.5" x2="590" y2="216.5" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="243.4" x2="590" y2="243.4" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="270.2" x2="590" y2="270.2" stroke="#E8E8E8" stroke-width="1"/>

    <!-- Y-axis labels -->
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="273">$40K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="246">$60K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="220">$80K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="193">$100K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="166">$120K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="139">$140K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="112">$160K</tspan></text>

    <!-- X-axis line and labels -->
    <!-- 5 bands: x=90, 210, 330, 450, 570 (gap=120px) -->
    <line x1="70" y1="305" x2="590" y2="305" stroke="#CCCCCC" stroke-width="1"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="90"  y="318">1–100</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="210" y="318">101–1,000</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="330" y="318">1,001–10,000</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="450" y="318">10,001–100,000</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="570" y="318">100,000+</tspan></text>

    <!-- Worldwide median line (#E4774E) -->
    <!-- Source: tbl-2025-salary-by-organization-size -->
    <!-- $81,000→215.1, $80,591→215.7, $95,000→196.3, $121,000→161.4, $129,400→150.1 -->
    <polyline points="90,215.1 210,215.7 330,196.3 450,161.4 570,150.1"
              fill="none" class="worldwide" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="90"  cy="215.1" r="4" class="worldwide"/>
    <circle cx="210" cy="215.7" r="4" class="worldwide"/>
    <circle cx="330" cy="196.3" r="4" class="worldwide"/>
    <circle cx="450" cy="161.4" r="4" class="worldwide"/>
    <circle cx="570" cy="150.1" r="4" class="worldwide"/>

    <!-- North America median line (#1A4A8C) -->
    <!-- Source: tbl-2025-salary-by-organization-size-north-america -->
    <!-- $120,000→162.7, $112,000→173.5, $104,474→183.6, $141,196→134.3, $145,000→129.2 -->
    <polyline points="90,162.7 210,173.5 330,183.6 450,134.3 570,129.2"
              fill="none" class="north-america" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="90"  cy="162.7" r="4" class="north-america"/>
    <circle cx="210" cy="173.5" r="4" class="north-america"/>
    <circle cx="330" cy="183.6" r="4" class="north-america"/>
    <circle cx="450" cy="134.3" r="4" class="north-america"/>
    <circle cx="570" cy="129.2" r="4" class="north-america"/>

    <!-- Europe median line (#82A555) — 4 data points only (no 100,000+ in Europe table) -->
    <!-- Source: tbl-2025-salary-by-organization-size-europe -->
    <!-- $63,801→238.2, $62,130→240.5, $72,716→226.2, $90,370→202.5 -->
    <polyline points="90,238.2 210,240.5 330,226.2 450,202.5"
              fill="none" class="europe" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="90"  cy="238.2" r="4" class="europe"/>
    <circle cx="210" cy="240.5" r="4" class="europe"/>
    <circle cx="330" cy="226.2" r="4" class="europe"/>
    <circle cx="450" cy="202.5" r="4" class="europe"/>

  </g>

</svg>
