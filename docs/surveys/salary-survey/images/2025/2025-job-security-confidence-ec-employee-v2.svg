<svg viewBox="0 0 660 325" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-job-security-confidence-ec-employee-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Job security confidence</text>
        <text x="20" y="53" class="title-text">— as employee</text>
        <text x="20" y="75" class="subtitle-text">Employee-contractor respondents (25)</text>
        <text x="20" y="91" class="subtitle-text">compared to same time last year</text>
      </g>

      <g class="legend scale-three-trend">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="321" y="20" width="94"/>
            <circle class="negative" cx="334" cy="31"/>
            <text class="legend-label" x="342" y="35">Less confident</text>
          </g>

          <g class="legend-item">
            <rect class="legend-item-container" x="425" y="20" width="106"/>
            <circle class="neutral" cx="438" cy="31"/>
            <text class="legend-label" x="446" y="35">Around the same</text>
          </g>

          <g class="legend-item">
            <rect class="legend-item-container" x="541" y="20" width="99"/>
            <circle class="positive" cx="554" cy="31"/>
            <text class="legend-label" x="562" y="35">More confident</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-three-trend" transform="translate(0 44) translate(330 259) scale(1.2) translate(-330 -259)">
      <path class="slice negative" d="M180 259 A 150 150 0 0 1 220.7 156.3 L286.3 217.9 A 60 60 0 0 0 270 259 Z"/>
      <path class="slice neutral" d="M220.7 156.3 A 150 150 0 0 1 339.4 109.3 L333.8 199.1 A 60 60 0 0 0 286.3 217.9 Z"/>
      <path class="slice positive" d="M339.4 109.3 A 150 150 0 0 1 480 259 L390 259 A 60 60 0 0 0 333.8 199.1 Z"/>

      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="232.4" y="224.5">24.0%</tspan></text>
      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="291.3" y="165.6">28.0%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="406.5" y="192.0">48.0%</tspan></text>
    </g>
  </g>

</svg>
