<svg viewBox="0 0 660 305" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-earnings-security-confidence-contractors-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Earnings security confidence</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (42)</text>
        <text x="20" y="71" class="subtitle-text">compared to same time last year</text>
      </g>

      <g class="legend scale-three-trend">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="321" y="20" width="94"/>
            <circle class="negative" cx="334" cy="31"/>
            <text class="legend-label" x="342" y="35">Less confident</text>
          </g>

          <g class="legend-item">
            <rect class="legend-item-container" x="425" y="20" width="106"/>
            <circle class="neutral" cx="438" cy="31"/>
            <text class="legend-label" x="446" y="35">Around the same</text>
          </g>

          <g class="legend-item">
            <rect class="legend-item-container" x="541" y="20" width="99"/>
            <circle class="positive" cx="554" cy="31"/>
            <text class="legend-label" x="562" y="35">More confident</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-three-trend" transform="translate(0 22) translate(330 259) scale(1.2) translate(-330 -259)">
      <path class="slice negative" d="M180 259 A 150 150 0 0 1 285.8 115.7 L312.3 201.7 A 60 60 0 0 0 270 259 Z"/>
      <path class="slice neutral" d="M285.8 115.7 A 150 150 0 0 1 423.5 141.7 L367.4 212.1 A 60 60 0 0 0 312.3 201.7 Z"/>
      <path class="slice positive" d="M423.5 141.7 A 150 150 0 0 1 480 259 L390 259 A 60 60 0 0 0 367.4 212.1 Z"/>

      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="245.5" y="201.5">40.5%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="349.5" y="160.7">31.0%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="424.6" y="218.3">28.6%</tspan></text>
    </g>
  </g>

</svg>
