<svg viewBox="0 55 660 225" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-job-security-confidence-ec-employee">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Job security confidence — as employee</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employee-contractors (n=25) — as compared to the same time last year</tspan></text>
    </g>

    <g class="donut-chart scale-three-trend">

      <!-- Less confident: 24.0% — t=180 to 223.2 -->
      <path class="slice negative" d="M 180,259 A 150 150 0 0 1 220.7,156.3 L 286.3,217.9 A 60 60 0 0 0 270,259 Z"/>

      <!-- Around the same: 28.0% — t=223.2 to 273.6 -->
      <path class="slice neutral" d="M 220.7,156.3 A 150 150 0 0 1 339.4,109.3 L 333.8,199.1 A 60 60 0 0 0 286.3,217.9 Z"/>

      <!-- More confident: 48.0% — t=273.6 to 360 -->
      <path class="slice positive" d="M 339.4,109.3 A 150 150 0 0 1 480,259 L 390,259 A 60 60 0 0 0 333.8,199.1 Z"/>

      <!-- Inner value labels -->
      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="232.4" y="224.5">24.0%</tspan></text>
      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="291.3" y="165.6">28.0%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="406.5" y="192.0">48.0%</tspan></text>

    </g>

    <g class="legend scale-three-trend">
      <rect x="371" y="70" width="274" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
      <circle class="swatch negative" cx="384" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="394" y="84">Less confident</tspan></text>
      <circle class="swatch neutral" cx="466" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="476" y="84">Around the same</tspan></text>
      <circle class="swatch positive" cx="562" cy="80" r="6"/>
      <text font-size="10" fill="#252521"><tspan x="572" y="84">More confident</tspan></text>
    </g>

  </g>

</svg>
