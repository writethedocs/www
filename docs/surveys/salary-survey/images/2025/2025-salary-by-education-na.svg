<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 660 265">
  <title>Salary (USD) by education level — North America</title>
  <text x="330" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#252521">Salary (USD) by education level — North America</text>

  <!-- Grid lines -->
  <line x1="285.0" y1="97" x2="285.0" y2="276" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="370.0" y1="97" x2="370.0" y2="276" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="455.0" y1="97" x2="455.0" y2="276" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="540.0" y1="97" x2="540.0" y2="276" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="625.0" y1="97" x2="625.0" y2="276" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Axes -->
  <line x1="200" y1="97" x2="200" y2="276" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="200" y1="276" x2="625.0" y2="276" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Bars -->
  <rect x="200" y="97" width="425" height="18" fill="#F0F0F0"/>
  <rect x="445.0" y="97" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="110" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">High school</text>
  <text x="453.5" y="110" font-family="sans-serif" font-size="10" fill="#666666">$116K</text>
  <rect x="200" y="137" width="425" height="18" fill="#F0F0F0"/>
  <rect x="391.5" y="137" width="141.7" height="18" fill="#A8C8E8"/>
  <rect x="450.3" y="137" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="150" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Undergraduate</text>
  <text x="540.2" y="150" font-family="sans-serif" font-size="10" fill="#252521">$118.5K</text>
  <rect x="200" y="177" width="425" height="18" fill="#F0F0F0"/>
  <rect x="413.1" y="177" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="190" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Multiple undergraduate</text>
  <text x="421.6" y="190" font-family="sans-serif" font-size="10" fill="#666666">$101K</text>
  <rect x="200" y="217" width="425" height="18" fill="#F0F0F0"/>
  <rect x="380.7" y="217" width="161.0" height="18" fill="#A8C8E8"/>
  <rect x="452.4" y="217" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="230" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Postgraduate</text>
  <text x="548.7" y="230" font-family="sans-serif" font-size="10" fill="#252521">$119.5K</text>
  <rect x="200" y="257" width="425" height="18" fill="#F0F0F0"/>
  <rect x="458.8" y="257" width="3" height="18" fill="#1A4A8C"/>
  <text x="195" y="270" text-anchor="end" font-family="sans-serif" font-size="11" fill="#252521">Multiple postgraduate</text>
  <text x="467.3" y="270" font-family="sans-serif" font-size="10" fill="#666666">$122.5K</text>

  <!-- X-axis ticks and labels -->
  <line x1="285.0" y1="276" x2="285.0" y2="281" stroke="#CCCCCC" stroke-width="1"/>
  <text x="285.0" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$40K</text>
  <line x1="370.0" y1="276" x2="370.0" y2="281" stroke="#CCCCCC" stroke-width="1"/>
  <text x="370.0" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$80K</text>
  <line x1="455.0" y1="276" x2="455.0" y2="281" stroke="#CCCCCC" stroke-width="1"/>
  <text x="455.0" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$120K</text>
  <line x1="540.0" y1="276" x2="540.0" y2="281" stroke="#CCCCCC" stroke-width="1"/>
  <text x="540.0" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$160K</text>
  <line x1="625.0" y1="276" x2="625.0" y2="281" stroke="#CCCCCC" stroke-width="1"/>
  <text x="625.0" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888888">$200K</text>

  <!-- Legend -->
  <rect x="502" y="55" width="143" height="36" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
  <rect x="514" y="60" width="3" height="10" fill="#1A4A8C"/>
  <text x="524" y="69" font-family="sans-serif" font-size="10" fill="#252521">Median</text>
  <circle cx="516" cy="79" r="5" fill="#A8C8E8"/>
  <text x="524" y="83" font-family="sans-serif" font-size="10" fill="#252521">25th–75th percentile</text>
</svg>