<svg viewBox="0 55 660 225" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-job-security-confidence-employees">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Job security confidence</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees (n=642) — as compared to the same time last year</tspan></text>
    </g>

    <g class="donut-chart">

      <!-- Less confident: 36.0% — t=180 to 244.77 (clockwise/upward) -->
      <path d="M 180,259 A 150 150 0 0 1 266.1,123.3 L 304.4,204.7 A 60 60 0 0 0 270,259 Z" fill="#E4774E" stroke="white" stroke-width="2"/>

      <!-- Around the same: 45.6% — t=244.77 to 326.92 -->
      <path d="M 266.1,123.3 A 150 150 0 0 1 455.7,177.1 L 380.3,226.2 A 60 60 0 0 0 304.4,204.7 Z" fill="#E9C168" stroke="white" stroke-width="2"/>

      <!-- More confident: 18.4% — t=326.92 to 360 -->
      <path d="M 455.7,177.1 A 150 150 0 0 1 480,259 L 390,259 A 60 60 0 0 0 380.3,226.2 Z" fill="#82A555" stroke="white" stroke-width="2"/>

      <!-- Inner value labels -->
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="241.3" y="207.6">36.0%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="358.7" y="162.9">45.6%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="430.6" y="234.0">18.4%</tspan></text>

      <!-- External labels -->
      <text font-size="12"><tspan x="65" y="204">Less confident</tspan></text>
      <text font-size="12"><tspan x="381" y="85">Around the same</tspan></text>
      <text font-size="12"><tspan x="513" y="209">More confident</tspan></text>

      <!-- Connectors -->
      <path d="M 152,202 C 157,202 181.7,210 183.6,210.7 L 185.5,211.3" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 371.6,85 C 366.6,85 351.4,106 350.2,107.7 L 349,109.3" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 508.5,207 C 503.5,207 478.8,215 476.9,215.7 L 475,216.3" stroke="#252521" stroke-dasharray="1 3"/>

    </g>

  </g>

</svg>
