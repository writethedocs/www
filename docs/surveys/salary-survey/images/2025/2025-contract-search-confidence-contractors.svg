<svg viewBox="0 55 660 238" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-contract-search-confidence-contractors">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Contract search confidence</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Contractors (n=6) — ability to secure a new contract with favorable terms</tspan></text>
    </g>

    <g class="donut-chart">

      <!-- Not confident at all: 16.7% — t=180 to 210.0 -->
      <path d="M 180,269 A 150 150 0 0 1 200.1,194.0 L 278.0,239.0 A 60 60 0 0 0 270,269 Z" fill="#C2255C" stroke="white" stroke-width="2"/>

      <!-- Not confident: 33.3% — t=210.0 to 270.0 -->
      <path d="M 200.1,194.0 A 150 150 0 0 1 330,119.0 L 330,209.0 A 60 60 0 0 0 278.0,239.0 Z" fill="#E4774E" stroke="white" stroke-width="2"/>

      <!-- Neutral: 33.3% — t=270.0 to 330.0 -->
      <path d="M 330,119.0 A 150 150 0 0 1 459.9,194.0 L 382.0,239.0 A 60 60 0 0 0 330,209.0 Z" fill="#E9C168" stroke="white" stroke-width="2"/>

      <!-- Confident: 16.7% — t=330.0 to 360.0 -->
      <path d="M 459.9,194.0 A 150 150 0 0 1 480,269 L 390,269 A 60 60 0 0 0 382.0,239.0 Z" fill="#82A555" stroke="white" stroke-width="2"/>

      <!-- Inner value labels -->
      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="229" y="246">16.7%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="278" y="183">33.3%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="383" y="183">33.3%</tspan></text>
      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="431" y="246">16.7%</tspan></text>

      <!-- External labels -->
      <text font-size="12"><tspan x="20" y="223">Not confident at all</tspan></text>
      <text font-size="12"><tspan x="127" y="128">Not confident</tspan></text>
      <text font-size="12"><tspan x="443" y="128">Neutral</tspan></text>
      <text font-size="12"><tspan x="519" y="228">Confident</tspan></text>

      <!-- Connectors -->
      <path d="M 144,223 C 150,220 179,225.5 181,227 L 185.1,230.2" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 213,128 C 223,125 248,132 251,135.5 L 255,139.1" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 439,128 C 429,125 412,132 409,135.5 L 405,139.1" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M 514,228 C 508,225 477,226.5 476,227.5 L 474.9,230.2" stroke="#252521" stroke-dasharray="1 3"/>

    </g>

  </g>

</svg>
