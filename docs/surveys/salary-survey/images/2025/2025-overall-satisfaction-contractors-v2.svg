<svg viewBox="0 0 660 305" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-overall-satisfaction-contractors-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Overall satisfaction</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (80)</text>
      </g>

      <g class="legend scale-satisfaction">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="373" y="20" width="101"/>
            <circle class="very-unsatisfied" cx="386" cy="31"/>
            <text class="legend-label" x="394" y="35">Very unsatisfied</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="484" y="20" width="81"/>
            <circle class="unsatisfied" cx="497" cy="31"/>
            <text class="legend-label" x="505" y="35">Unsatisfied</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="575" y="20" width="65"/>
            <circle class="neutral" cx="588" cy="31"/>
            <text class="legend-label" x="596" y="35">Neutral</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="471" y="52" width="69"/>
            <circle class="satisfied" cx="484" cy="63"/>
            <text class="legend-label" x="492" y="67">Satisfied</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="550" y="52" width="90"/>
            <circle class="very-satisfied" cx="563" cy="63"/>
            <text class="legend-label" x="571" y="67">Very satisfied</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-satisfaction" transform="translate(0 48) translate(330 236) scale(1.2) translate(-330 -236)">
<!-- Very unsatisfied (11.2%): 180.0°→200.2° -->
      <path class="slice very-unsatisfied" d="M180.000 236.000 A150 150 0 0 1 189.271 184.082 L273.709 215.233 A60 60 0 0 0 270.000 236.000 Z"/>

      <!-- Unsatisfied (12.5%): 200.2°→222.8° -->
      <path class="slice unsatisfied" d="M189.271 184.082 A150 150 0 0 1 219.852 134.180 L285.941 195.272 A60 60 0 0 0 273.709 215.233 Z"/>

      <!-- Neutral (18.8%): 222.8°→256.5° -->
      <path class="slice neutral" d="M219.852 134.180 A150 150 0 0 1 294.983 90.145 L315.993 177.658 A60 60 0 0 0 285.941 195.272 Z"/>

      <!-- Satisfied (33.8%): 256.5°→317.2° -->
      <path class="slice satisfied" d="M294.983 90.145 A150 150 0 0 1 440.148 134.180 L374.059 195.272 A60 60 0 0 0 315.993 177.658 Z"/>

      <!-- Very satisfied (23.8%): 317.2°→360.0° -->
      <path class="slice very-satisfied" d="M440.148 134.180 A150 150 0 0 1 480.000 236.000 L390.000 236.000 A60 60 0 0 0 374.059 195.272 Z"/>

      <!-- Inner percentage labels -->
      <text font-size="14" class="value-labels-inner"><tspan x="204" y="222">11.2%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="218" y="184">12.5%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="256" y="146">18.8%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="344" y="136">33.8%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="414" y="201">23.8%</tspan></text>
    </g>
  </g>

</svg>
