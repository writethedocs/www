<svg viewBox="0 0 660 440" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-job-search-ec-employee-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Job search status</text>
        <text x="20" y="53" class="title-text">— as employee</text>
        <text x="20" y="75" class="subtitle-text">Employee-contractor respondents (34)</text>
      </g>

      <g class="legend scale-job-search-status">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="325" y="20" width="149"/>
            <circle class="open-offers" cx="338" cy="31"/>
            <text class="legend-label" x="346" y="35">Not looking, open to offers</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="484" y="20" width="156"/>
            <circle class="not-open" cx="497" cy="31"/>
            <text class="legend-label" x="505" y="35">Not looking, not open to offers</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="349" y="52" width="179"/>
            <circle class="open-to-contract" cx="362" cy="63"/>
            <text class="legend-label" x="370" y="67">Actively looking, open to contract</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="538" y="52" width="102"/>
            <circle class="actively-looking" cx="551" cy="63"/>
            <text class="legend-label" x="559" y="67">Actively looking</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="452" y="84" width="188"/>
            <circle class="not-looking-yet" cx="465" cy="95"/>
            <text class="legend-label" x="473" y="99">Not looking, expect to within a year</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-job-search-status" transform="translate(110 24)">
      <path class="slice open-offers" d="M 220,90 A 150 150 0 0 1 321.1,350.9 L 260.4,284.3 A 60 60 0 0 0 220,180 Z"/>
      <path class="slice not-open" d="M 321.1,350.9 A 150 150 0 0 1 75.7,281 L 162.3,256.4 A 60 60 0 0 0 260.4,284.3 Z"/>
      <path class="slice open-to-contract" d="M 75.7,281 A 150 150 0 0 1 100.3,149.6 L 172.1,203.8 A 60 60 0 0 0 162.3,256.4 Z"/>
      <path class="slice actively-looking" d="M 100.3,149.6 A 150 150 0 0 1 165.8,100.1 L 198.3,184.1 A 60 60 0 0 0 172.1,203.8 Z"/>
      <path class="slice not-looking-yet" d="M 165.8,100.1 A 150 150 0 0 1 220,90 L 220,180 A 60 60 0 0 0 198.3,184.1 Z"/>

      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="318" y="206">38.2%</tspan></text>
      <text font-size="14" text-anchor="middle" class="value-labels-inner"><tspan x="191" y="345">32.4%</tspan></text>
      <text font-size="12" text-anchor="middle" class="value-labels-inner"><tspan x="117" y="225">14.7%</tspan></text>
    </g>
  </g>

</svg>
