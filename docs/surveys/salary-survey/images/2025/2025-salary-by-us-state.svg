<svg viewBox="0 55 660 325" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-us-state" class="scale-salary-state">

    <g class="title">
      <text font-size="14"><tspan x="40" y="20">Median salary (USD) by US state</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="36">Employees — states with 10 or more respondents shown</tspan></text>
    </g>

    <!-- Scale: x=65–640 (575px), y_bottom=340, y_top=80; range $80K–$180K = $100K over 260px -->
    <!-- SCALE_Y = 260/100000 = 0.0026 px/dollar; y = 340 - (value - 80000) * 0.0026 -->
    <!-- $100K→y=288, $120K→y=236, $140K→y=184, $160K→y=132, $180K→y=80 -->
    <!-- 13 bars, bar_width=30, gap=(575-390)/14=13.2px, slot_width=43.2px -->
    <!-- first_center=65+13.2+15=93.2; centers spaced 43.2px apart -->

    <!-- Horizontal grid lines -->
    <line x1="65" y1="288" x2="640" y2="288" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="65" y1="236" x2="640" y2="236" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="65" y1="184" x2="640" y2="184" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="65" y1="132" x2="640" y2="132" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="65" y1="80"  x2="640" y2="80"  stroke="#E8E8E8" stroke-width="1"/>

    <!-- Y-axis labels -->
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="60" y="344">$80K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="60" y="292">$100K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="60" y="240">$120K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="60" y="188">$140K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="60" y="136">$160K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="60" y="84">$180K</tspan></text>

    <!-- Y-axis and X-axis lines -->
    <line x1="65" y1="80"  x2="65"  y2="340" stroke="#CCCCCC" stroke-width="1"/>
    <line x1="65" y1="340" x2="640" y2="340" stroke="#CCCCCC" stroke-width="1"/>

    <!-- US median line: $125,000 → y=223 -->
    <line x1="65" y1="223" x2="640" y2="223" class="benchmark" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text font-size="9" text-anchor="end" class="benchmark"><tspan x="638" y="218">US median: $125K</tspan></text>

    <!-- Bars, sorted high to low, gap=13.2px between all bars and y-axis -->

    <!-- WA $164,000: center=93.2,  top=121.6, h=218.4 -->
    <rect x="78.2"  y="121.6" width="30" height="218.4" class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="93.2"  y="355">WA</tspan></text>

    <!-- CA $160,000: center=136.4, top=132.0, h=208.0 -->
    <rect x="121.4" y="132.0" width="30" height="208.0" class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="136.4" y="355">CA</tspan></text>

    <!-- PA $141,250: center=179.6, top=180.8, h=159.2 -->
    <rect x="164.6" y="180.8" width="30" height="159.2" class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="179.6" y="355">PA</tspan></text>

    <!-- TX $141,072: center=222.8, top=181.2, h=158.8 -->
    <rect x="207.8" y="181.2" width="30" height="158.8" class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="222.8" y="355">TX</tspan></text>

    <!-- MA $132,000: center=266.0, top=204.8, h=135.2 -->
    <rect x="251.0" y="204.8" width="30" height="135.2" class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="266.0" y="355">MA</tspan></text>

    <!-- OR $127,800: center=309.2, top=215.7, h=124.3 -->
    <rect x="294.2" y="215.7" width="30" height="124.3" class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="309.2" y="355">OR</tspan></text>

    <!-- NY $127,500: center=352.4, top=216.5, h=123.5 -->
    <rect x="337.4" y="216.5" width="30" height="123.5" class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="352.4" y="355">NY</tspan></text>

    <!-- NC $119,800: center=395.6, top=236.5, h=103.5 -->
    <rect x="380.6" y="236.5" width="30" height="103.5" class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="395.6" y="355">NC</tspan></text>

    <!-- IL $117,500: center=438.8, top=242.5, h=97.5 -->
    <rect x="423.8" y="242.5" width="30" height="97.5"  class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="438.8" y="355">IL</tspan></text>

    <!-- WI $111,000: center=482.0, top=259.4, h=80.6 -->
    <rect x="467.0" y="259.4" width="30" height="80.6"  class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="482.0" y="355">WI</tspan></text>

    <!-- CO $106,800: center=525.2, top=270.3, h=69.7 -->
    <rect x="510.2" y="270.3" width="30" height="69.7"  class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="525.2" y="355">CO</tspan></text>

    <!-- OH $105,480: center=568.4, top=273.8, h=66.2 -->
    <rect x="553.4" y="273.8" width="30" height="66.2"  class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="568.4" y="355">OH</tspan></text>

    <!-- FL $102,564: center=611.6, top=281.3, h=58.7 -->
    <rect x="596.6" y="281.3" width="30" height="58.7"  class="state-bar"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="611.6" y="355">FL</tspan></text>

  </g>

</svg>
