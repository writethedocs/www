<svg viewBox="0 0 660 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-us-state" class="scale-salary-state">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Median salary (USD) by US state</text>
        <text x="20" y="55" class="subtitle-text">Employees — states with 10 or more respondents shown</text>
      </g>

      <g class="legend">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="432" y="20" width="108"/>
            <circle class="state-bar" cx="445" cy="31"/>
            <text class="legend-label" x="453" y="35">State median</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="550" y="20" width="90"/>
            <line class="median" x1="563" y1="31" x2="579" y2="31" stroke-width="2"/>
            <text class="legend-label" x="587" y="35">US median</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-vertical" transform="translate(0 28)">
      <g class="y-axis">
        <g class="gridlines">
          <path d="M68 340H640"/>
          <path d="M68 288H640"/>
          <path d="M68 236H640"/>
          <path d="M68 184H640"/>
          <path d="M68 132H640"/>
          <path d="M68 80H640"/>
        </g>

        <g class="axis-labels">
          <text font-size="10"><tspan x="46" y="344">$80K</tspan></text>
          <text font-size="10"><tspan x="41" y="292">$100K</tspan></text>
          <text font-size="10"><tspan x="41" y="240">$120K</tspan></text>
          <text font-size="10"><tspan x="41" y="188">$140K</tspan></text>
          <text font-size="10"><tspan x="41" y="136">$160K</tspan></text>
          <text font-size="10"><tspan x="41" y="84">$180K</tspan></text>
        </g>
      </g>

      <g class="data-series">
        <g class="a">
          <line x1="68" y1="223" x2="640" y2="223" class="median" stroke-width="1.5"/>
          <text font-size="10" text-anchor="end" class="median"><tspan x="640" y="218">US median: $125K</tspan></text>

          <g class="axis-labels">
            <text font-size="10" text-anchor="middle"><tspan x="93.2" y="356">WA</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="136.4" y="356">CA</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="179.6" y="356">PA</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="222.8" y="356">TX</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="266.0" y="356">MA</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="309.2" y="356">OR</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="352.4" y="356">NY</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="395.6" y="356">NC</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="438.8" y="356">IL</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="482.0" y="356">WI</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="525.2" y="356">CO</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="568.4" y="356">OH</tspan></text>
            <text font-size="10" text-anchor="middle"><tspan x="611.6" y="356">FL</tspan></text>
          </g>

          <g class="bars">
            <rect x="78.2" y="121.6" width="30" height="218.4" rx="2" class="state-bar"/>
            <rect x="121.4" y="132.0" width="30" height="208.0" rx="2" class="state-bar"/>
            <rect x="164.6" y="180.8" width="30" height="159.2" rx="2" class="state-bar"/>
            <rect x="207.8" y="181.2" width="30" height="158.8" rx="2" class="state-bar"/>
            <rect x="251.0" y="204.8" width="30" height="135.2" rx="2" class="state-bar"/>
            <rect x="294.2" y="215.7" width="30" height="124.3" rx="2" class="state-bar"/>
            <rect x="337.4" y="216.5" width="30" height="123.5" rx="2" class="state-bar"/>
            <rect x="380.6" y="236.5" width="30" height="103.5" rx="2" class="state-bar"/>
            <rect x="423.8" y="242.5" width="30" height="97.5" rx="2" class="state-bar"/>
            <rect x="467.0" y="259.4" width="30" height="80.6" rx="2" class="state-bar"/>
            <rect x="510.2" y="270.3" width="30" height="69.7" rx="2" class="state-bar"/>
            <rect x="553.4" y="273.8" width="30" height="66.2" rx="2" class="state-bar"/>
            <rect x="596.6" y="281.3" width="30" height="58.7" rx="2" class="state-bar"/>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>