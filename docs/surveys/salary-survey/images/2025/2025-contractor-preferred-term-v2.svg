<svg viewBox="0 0 660 420" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-contractor-preferred-term-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Preferred term</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (46)</text>
      </g>

      <g class="legend scale-preferred-term">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="301" y="20" width="79"/>
            <circle class="contractor" cx="314" cy="31"/>
            <text class="legend-label" x="322" y="35">Contractor</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="390" y="20" width="95"/>
            <circle class="self-employed" cx="403" cy="31"/>
            <text class="legend-label" x="411" y="35">Self-employed</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="495" y="20" width="78"/>
            <circle class="freelancer" cx="508" cy="31"/>
            <text class="legend-label" x="516" y="35">Freelancer</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="583" y="20" width="57"/>
            <circle class="other" cx="596" cy="31"/>
            <text class="legend-label" x="604" y="35">Other</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-preferred-term" transform="translate(2 10)">
      <path class="slice contractor" d="M231.181 117.431 A150 150 0 1 1 258.784 365.076 L300.314 285.230 A60 60 0 1 0 289.273 186.172 Z"/>
      <path class="slice self-employed" d="M258.784 365.076 A150 150 0 0 1 184.958 277.156 L270.783 250.062 A60 60 0 0 0 300.314 285.230 Z"/>
      <path class="slice freelancer" d="M184.958 277.156 A150 150 0 0 1 189.721 173.873 L272.688 208.749 A60 60 0 0 0 270.783 250.062 Z"/>
      <path class="slice other" d="M189.721 173.873 A150 150 0 0 1 231.181 117.431 L289.273 186.172 A60 60 0 0 0 272.688 208.749 Z"/>

      <text class="value-labels-inner" text-anchor="middle"><tspan x="435" y="230">68.8%</tspan></text>
      <text class="value-labels-inner" text-anchor="middle"><tspan x="245" y="305">12.5%</tspan></text>
      <text class="value-labels-inner" text-anchor="middle"><tspan x="226" y="230">11.2%</tspan></text>
      <text class="value-labels-inner" text-anchor="middle"><tspan x="240" y="171">7.5%</tspan></text>
    </g>
  </g>

</svg>
