<svg viewBox="0 0 660 355" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-time-in-role-contractors-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Length of time contracting</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (80)</text>
      </g>

      <g class="legend scale-single-series">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="557" y="20" width="83"/>
            <circle class="series-a" cx="570" cy="31"/>
            <text class="legend-label" x="578" y="35">Contractors</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-vertical scale-single-series">
      <g class="y-axis">
        <g class="gridlines">
          <path d="M20 314.9H640"/>
          <path d="M20 240.7H640"/>
          <path d="M20 166.3H640"/>
          <path d="M20 91.1H640"/>
        </g>

        <g class="axis-labels">
          <text font-size="10"><tspan x="25" y="317.9">0%</tspan></text>
          <text font-size="10"><tspan x="20" y="243.7">10%</tspan></text>
          <text font-size="10"><tspan x="20" y="169.3">20%</tspan></text>
          <text font-size="10"><tspan x="20" y="94.1">30%</tspan></text>
        </g>
      </g>

      <g class="data-series">
        <g class="a">
          <g class="axis-labels">
            <text font-size="10"><tspan x="89.9" y="332.8">0-1 year</tspan></text>
            <text font-size="10"><tspan x="202.9" y="332.8">1-2 years</tspan></text>
            <text font-size="10"><tspan x="315.9" y="332.8">2-5 years</tspan></text>
            <text font-size="10"><tspan x="428.9" y="332.8">5-10 years</tspan></text>
            <text font-size="10"><tspan x="544.9" y="332.8">10+ years</tspan></text>
          </g>

          <g class="bars">
            <rect x="62.0" y="193.1" width="105.0" height="122.4" rx="2"/>
            <rect x="175.0" y="165.0" width="105.0" height="150.5" rx="2"/>
            <rect x="288.0" y="136.9" width="105.0" height="178.6" rx="2"/>
            <rect x="401.0" y="165.0" width="105.0" height="150.5" rx="2"/>
            <rect x="514.0" y="165.0" width="105.0" height="150.5" rx="2"/>
          </g>
        </g>
      </g>
    </g>
  </g>

</svg>
