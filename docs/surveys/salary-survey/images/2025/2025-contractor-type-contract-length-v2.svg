<svg viewBox="0 0 660 440" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-contractor-type-contract-length-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Typical contract length</text>
        <text x="20" y="55" class="subtitle-text">Contractor respondents (46)</text>
      </g>

      <g class="legend scale-contract-length">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="381" y="20" width="76"/>
            <circle class="short-only" cx="394" cy="31"/>
            <text class="legend-label" x="402" y="35">Short only</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="467" y="20" width="89"/>
            <circle class="medium-only" cx="480" cy="31"/>
            <text class="legend-label" x="488" y="35">Medium only</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="566" y="20" width="74"/>
            <circle class="long-only" cx="579" cy="31"/>
            <text class="legend-label" x="587" y="35">Long only</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="482" y="52" width="58"/>
            <circle class="mixed" cx="495" cy="63"/>
            <text class="legend-label" x="503" y="67">Mixed</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="550" y="52" width="90"/>
            <circle class="not-specified" cx="563" cy="63"/>
            <text class="legend-label" x="571" y="67">Not specified</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-contract-length" transform="translate(2 24)">
      <path class="slice long-only" d="M231.181 117.431 A150 150 0 0 1 467.234 176.198 L383.694 209.679 A60 60 0 0 0 289.273 186.172 Z"/>
      <path class="slice not-specified" d="M467.234 176.198 A150 150 0 0 1 350.223 380.345 L336.889 291.338 A60 60 0 0 0 383.694 209.679 Z"/>
