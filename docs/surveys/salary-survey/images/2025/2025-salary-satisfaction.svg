<svg viewBox="0 55 660 231" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-salary-satisfaction">

    <g class="title">
      <text font-size="14"><tspan x="40" y="33">Salary satisfaction</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="49">Employees</tspan></text>
    </g>

    <g class="donut-chart">

      <!-- Very unsatisfied (2.8%): 180.0°→185.1° -->
      <path d="M180.000 262.000 A150 150 0 0 1 180.589 248.724 L270.235 256.690 A60 60 0 0 0 270.000 262.000 Z" fill="#C2255C" stroke="white" stroke-width="2"/>

      <!-- Unsatisfied (14.0%): 185.1°→210.2° -->
      <path d="M180.589 248.724 A150 150 0 0 1 200.374 186.521 L278.150 231.808 A60 60 0 0 0 270.235 256.690 Z" fill="#E4774E" stroke="white" stroke-width="2"/>

      <!-- Neutral (17.2%): 210.2°→241.2° -->
      <path d="M200.374 186.521 A150 150 0 0 1 257.702 130.573 L301.081 209.429 A60 60 0 0 0 278.150 231.808 Z" fill="#E9C168" stroke="white" stroke-width="2"/>

      <!-- Satisfied (45.4%): 241.2°→322.9° -->
      <path d="M257.702 130.573 A150 150 0 0 1 449.691 171.589 L377.876 225.836 A60 60 0 0 0 301.081 209.429 Z" fill="#82A555" stroke="white" stroke-width="2"/>

      <!-- Very satisfied (20.6%): 322.9°→360.0° -->
      <path d="M449.691 171.589 A150 150 0 0 1 480.000 262.000 L390.000 262.000 A60 60 0 0 0 377.876 225.836 Z" fill="#087F5B" stroke="white" stroke-width="2"/>

      <!-- Connectors and labels -->
      <path d="M140.2 255.8 C140.2 255.8 160.2 254.5 177.2 255.2" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M148.7 207.9 C148.7 207.9 168.0 210.5 184.2 215.6" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M195.8 131.6 C195.8 131.6 211.3 140.3 223.1 152.5" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M373.7 83.1 C373.7 83.1 365.5 95.8 362.0 112.4" stroke="#252521" stroke-dasharray="1 3"/>
      <path d="M510.4 205.2 C510.4 205.2 491.2 208.0 475.1 213.4" stroke="#252521" stroke-dasharray="1 3"/>

      <!-- Outer labels -->
      <text font-size="12"><tspan x="20" y="258">Very unsatisfied (2.8%)</tspan></text>
      <text font-size="12"><tspan x="86" y="210">Unsatisfied</tspan></text>
      <text font-size="12"><tspan x="152" y="134">Neutral</tspan></text>
      <text font-size="12"><tspan x="377" y="85">Satisfied</tspan></text>
      <text font-size="12"><tspan x="513" y="207">Very satisfied</tspan></text>

      <!-- Inner percentage labels -->
      <text font-size="14" class="value-labels-inner"><tspan x="207" y="234">14.0%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="235" y="188">17.2%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="335" y="159">45.4%</tspan></text>
      <text font-size="14" class="value-labels-inner"><tspan x="416" y="232">20.6%</tspan></text>

    </g>

  </g>

</svg>