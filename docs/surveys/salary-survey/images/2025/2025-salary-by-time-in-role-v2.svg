<svg viewBox="0 0 660 325" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
        .range-row rect,
        .range-row line {
          transition: opacity 0.15s ease;
          opacity: 0.8;
        }
        .range-row:hover rect,
        .range-row:hover line {
          opacity: 1;
        }
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-time-in-role-v2" class="scale-salary-range">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Salary (USD) by time in current role</text>
        <text x="20" y="55" class="subtitle-text"><tspan x="20" y="55">Bars show 25th–75th percentile range,</tspan><tspan x="20" y="71">markers show median</tspan></text>
      </g>

      <g class="legend">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="431" y="20" width="134"/>
            <rect class="percentile-range" x="444" y="27" width="16" height="8" rx="1"/>
            <text class="legend-label" x="465" y="35">25th–75th percentile</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="575" y="20" width="65"/>
            <line class="median" x1="588" y1="28" x2="588" y2="36" stroke-width="3"/>
            <text class="legend-label" x="596" y="35">Median</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area bar-chart-horizontal scale-salary-range" transform="translate(0 55)">
      <g class="grid" stroke="#E8E8E8" stroke-width="1">
        <line x1="210.4" y1="66" x2="210.4" y2="208"/>
        <line x1="343.0" y1="66" x2="343.0" y2="208"/>
        <line x1="475.6" y1="66" x2="475.6" y2="208"/>
      </g>

      <g class="labels" font-size="10" text-anchor="end">
        <text><tspan x="70" y="80">0-1 year</tspan></text>
        <text><tspan x="70" y="108">1-2 years</tspan></text>
        <text><tspan x="70" y="136">2-5 years</tspan></text>
        <text><tspan x="70" y="164">5-10 years</tspan></text>
        <text><tspan x="70" y="192">10+ years</tspan></text>
      </g>

      <g class="tracks">
        <rect class="track" x="78" y="66" width="530" height="20"/>
        <rect class="track" x="78" y="94" width="530" height="20"/>
        <rect class="track" x="78" y="122" width="530" height="20"/>
        <rect class="track" x="78" y="150" width="530" height="20"/>
        <rect class="track" x="78" y="178" width="530" height="20"/>
      </g>

      <g class="ranges">
        <g class="range-row">
          <rect x="267.2" y="66" width="241.4" height="20" class="percentile-range" rx="2"/>
          <line x1="374.3" y1="63" x2="374.3" y2="89" class="median" stroke-width="3"/>
        </g>
        <g class="range-row">
          <rect x="284.8" y="94" width="241.3" height="20" class="percentile-range" rx="2"/>
          <line x1="380.9" y1="91" x2="380.9" y2="117" class="median" stroke-width="3"/>
        </g>
        <g class="range-row">
          <rect x="290.6" y="122" width="231.0" height="20" class="percentile-range" rx="2"/>
          <line x1="380.9" y1="119" x2="380.9" y2="145" class="median" stroke-width="3"/>
        </g>
        <g class="range-row">
          <rect x="310.6" y="150" width="230.3" height="20" class="percentile-range" rx="2"/>
          <line x1="387.4" y1="147" x2="387.4" y2="173" class="median" stroke-width="3"/>
        </g>
        <g class="range-row">
          <rect x="302.8" y="178" width="272.0" height="20" class="percentile-range" rx="2"/>
          <line x1="423.1" y1="175" x2="423.1" y2="201" class="median" stroke-width="3"/>
        </g>
      </g>

      <g class="value-labels-outer" text-anchor="end">
        <text><tspan x="640" y="80">$90K</tspan></text>
        <text><tspan x="640" y="108">$92K</tspan></text>
        <text><tspan x="640" y="136">$92K</tspan></text>
        <text><tspan x="640" y="164">$94K</tspan></text>
        <text><tspan x="640" y="192">$104K</tspan></text>
      </g>

      <g class="x-axis" text-anchor="middle">
        <line x1="78" y1="218" x2="608" y2="218" stroke="#F0F0F0" stroke-width="1"/>
        <g class="axis-labels">
          <text font-size="10"><tspan x="78" y="238">$0</tspan></text>
          <text font-size="10"><tspan x="210.4" y="238">$40K</tspan></text>
          <text font-size="10"><tspan x="343.0" y="238">$80K</tspan></text>
          <text font-size="10"><tspan x="475.6" y="238">$120K</tspan></text>
          <text font-size="10"><tspan x="608.0" y="238">$160K</tspan></text>
        </g>
      </g>
    </g>
  </g>

</svg>
