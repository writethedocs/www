<svg viewBox="0 0 660 383" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-experience-v2" class="scale-salary-lines">
    <g class="chart-header">
      <g class="chart-title">
        <text class="title-text"><tspan x="20" y="35">Median salary (USD) by years</tspan><tspan x="20" y="53">of experience</tspan></text>
        <text class="subtitle-text"><tspan x="20" y="76">Employees — worldwide, North America,</tspan><tspan x="20" y="92">and Europe</tspan></text>
      </g>

      <g class="legend scale-salary-lines">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="348" y="20" width="91"/>
            <line class="worldwide" x1="360" y1="31" x2="376" y2="31" stroke-width="2.5" stroke-linecap="round"/>
            <circle class="worldwide" cx="368" cy="31" r="4"/>
            <text class="legend-label" x="384" y="35">Worldwide</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="449" y="20" width="109"/>
            <line class="north-america" x1="461" y1="31" x2="477" y2="31" stroke-width="2.5" stroke-linecap="round"/>
            <circle class="north-america" cx="469" cy="31" r="4"/>
            <text class="legend-label" x="485" y="35">North America</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="566" y="20" width="74"/>
            <line class="europe" x1="578" y1="31" x2="594" y2="31" stroke-width="2.5" stroke-linecap="round"/>
            <circle class="europe" cx="586" cy="31" r="4"/>
            <text class="legend-label" x="602" y="35">Europe</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area line-chart scale-salary-lines" transform="translate(0 28)">
      <g class="y-axis">
        <g class="gridlines">
          <line x1="60" y1="109.0" x2="620" y2="109.0"/>
          <line x1="60" y1="135.8" x2="620" y2="135.8"/>
          <line x1="60" y1="162.7" x2="620" y2="162.7"/>
          <line x1="60" y1="189.6" x2="620" y2="189.6"/>
          <line x1="60" y1="216.5" x2="620" y2="216.5"/>
          <line x1="60" y1="243.4" x2="620" y2="243.4"/>
          <line x1="60" y1="270.2" x2="620" y2="270.2"/>
        </g>

        <g class="axis-labels">
          <text font-size="10" text-anchor="end"><tspan x="55" y="273">$40K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="246">$60K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="220">$80K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="193">$100K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="166">$120K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="139">$140K</tspan></text>
          <text font-size="10" text-anchor="end"><tspan x="55" y="112">$160K</tspan></text>
        </g>
      </g>

      <g class="series-lines">
        <polyline points="80,234.4 184,234.1 288,207.1 392,183.2 496,179.0 600,162.7" class="worldwide" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="80" cy="234.4" r="4" class="worldwide"/>
        <circle cx="184" cy="234.1" r="4" class="worldwide"/>
        <circle cx="288" cy="207.1" r="4" class="worldwide"/>
        <circle cx="392" cy="183.2" r="4" class="worldwide"/>
        <circle cx="496" cy="179.0" r="4" class="worldwide"/>
        <circle cx="600" cy="162.7" r="4" class="worldwide"/>

        <polyline points="80,209.4 184,207.9 288,178.8 392,137.9 496,129.1 600,140.5" class="north-america" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="80" cy="209.4" r="4" class="north-america"/>
        <circle cx="184" cy="207.9" r="4" class="north-america"/>
        <circle cx="288" cy="178.8" r="4" class="north-america"/>
        <circle cx="392" cy="137.9" r="4" class="north-america"/>
        <circle cx="496" cy="129.1" r="4" class="north-america"/>
        <circle cx="600" cy="140.5" r="4" class="north-america"/>

        <polyline points="80,235.9 184,258.7 288,229.9 392,223.5 496,218.1 600,217.7" class="europe" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="80" cy="235.9" r="4" class="europe"/>
        <circle cx="184" cy="258.7" r="4" class="europe"/>
        <circle cx="288" cy="229.9" r="4" class="europe"/>
        <circle cx="392" cy="223.5" r="4" class="europe"/>
        <circle cx="496" cy="218.1" r="4" class="europe"/>
        <circle cx="600" cy="217.7" r="4" class="europe"/>
      </g>

      <g class="x-axis" text-anchor="middle">
        <line x1="60" y1="305" x2="620" y2="305" stroke="#F0F0F0" stroke-width="1"/>
        <g class="axis-labels">
          <text font-size="10"><tspan x="80" y="325">0–2 years</tspan></text>
          <text font-size="10"><tspan x="184" y="325">2–5 years</tspan></text>
          <text font-size="10"><tspan x="288" y="325">5–10 years</tspan></text>
          <text font-size="10"><tspan x="392" y="325">10–15 years</tspan></text>
          <text font-size="10"><tspan x="496" y="325">15–20 years</tspan></text>
          <text font-size="10"><tspan x="600" y="325">20+ years</tspan></text>
        </g>
      </g>
    </g>
  </g>
</svg>