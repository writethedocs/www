<svg viewBox="0 0 660 386" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>

  </defs>

  <g id="2025-age-group-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Age group</text>
