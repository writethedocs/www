<svg viewBox="0 0 660 440" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-job-search-employees-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Job search status</text>
        <text x="20" y="55" class="subtitle-text">Employee respondents (675)</text>
      </g>

      <g class="legend scale-job-search-status">
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="315" y="20" width="149"/>
            <circle class="open-offers" cx="328" cy="31"/>
            <text class="legend-label" x="336" y="35">Not looking, open to offers</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="474" y="20" width="166"/>
            <circle class="not-open" cx="487" cy="31"/>
            <text class="legend-label" x="495" y="35">Not looking, not open to offers</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="340" y="52" width="102"/>
            <circle class="actively-looking" cx="353" cy="63"/>
            <text class="legend-label" x="361" y="67">Actively looking</text>
          </g>
          <g class="legend-item">
            <rect class="legend-item-container" x="452" y="52" width="188"/>
            <circle class="not-looking-yet" cx="465" cy="63"/>
            <text class="legend-label" x="473" y="67">Not looking, expect to within a year</text>
          </g>
        </g>
        <g class="legend-row">
          <g class="legend-item">
            <rect class="legend-item-container" x="461" y="84" width="179"/>
            <circle class="open-to-contract" cx="474" cy="95"/>
            <text class="legend-label" x="482" y="99">Actively looking, open to contract</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-job-search-status" transform="translate(110 24)">
      <path class="slice open-offers" d="M 220,90 A 150 150 0 0 1 255.3,385.8 L 234.1,298.3 A 60 60 0 0 0 220,180 Z"/>
      <path class="slice not-open" d="M 255.3,385.8 A 150 150 0 0 1 72.2,265.4 L 160.9,250.1 A 60 60 0 0 0 234.1,298.3 Z"/>
      <path class="slice actively-looking" d="M 72.2,265.4 A 150 150 0 0 1 98.9,151.6 L 171.5,204.6 A 60 60 0 0 0 160.9,250.1 Z"/>
      <path class="slice not-looking-yet" d="M 98.9,151.6 A 150 150 0 0 1 169.4,98.8 L 199.7,183.5 A 60 60 0 0 0 171.5,204.6 Z"/>
      <path class="slice open-to-contract" d="M 169.4,98.8 A 150 150 0 0 1 220,90 L 220,180 A 60 60 0 0 0 199.7,183.5 Z"/>

      <text text-anchor="middle" class="value-labels-inner"><tspan x="324" y="232">46.2%</tspan></text>
      <text text-anchor="middle" class="value-labels-inner"><tspan x="162" y="332">26.1%</tspan></text>
      <text text-anchor="middle" class="value-labels-inner"><tspan x="118" y="220">12.7%</tspan></text>
      <text text-anchor="middle" class="value-labels-inner"><tspan x="157" y="160">9.5%</tspan></text>
      <text text-anchor="middle" class="value-labels-inner"><tspan x="202" y="139">5.5%</tspan></text>
    </g>
  </g>

</svg>
