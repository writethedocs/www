        #2025-salary-change-employees-v2 .slice,
        #2025-salary-change-employees-v2 .value-labels-inner {
          transition: opacity 160ms ease, stroke-width 160ms ease, fill-opacity 160ms ease;
        }

        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:hover) #2025-salary-change-employees-v2 .legend-item,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:hover) #2025-salary-change-employees-v2 .slice,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:hover) #2025-salary-change-employees-v2 .value-labels-inner,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:hover) #2025-salary-change-employees-v2 .legend-item,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:hover) #2025-salary-change-employees-v2 .slice,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:hover) #2025-salary-change-employees-v2 .value-labels-inner,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:hover) #2025-salary-change-employees-v2 .legend-item,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:hover) #2025-salary-change-employees-v2 .slice,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:hover) #2025-salary-change-employees-v2 .value-labels-inner,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:focus-within) #2025-salary-change-employees-v2 .legend-item,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:focus-within) #2025-salary-change-employees-v2 .slice,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:focus-within) #2025-salary-change-employees-v2 .value-labels-inner,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:focus-within) #2025-salary-change-employees-v2 .legend-item,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:focus-within) #2025-salary-change-employees-v2 .slice,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:focus-within) #2025-salary-change-employees-v2 .value-labels-inner,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:focus-within) #2025-salary-change-employees-v2 .legend-item,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:focus-within) #2025-salary-change-employees-v2 .slice,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:focus-within) #2025-salary-change-employees-v2 .value-labels-inner {
          opacity: 0.4;
        }

        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:hover) #2025-salary-change-employees-v2 .legend-item[data-series="negative"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:hover) #2025-salary-change-employees-v2 .slice.negative,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:hover) #2025-salary-change-employees-v2 .value-labels-inner[data-series="negative"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:hover) #2025-salary-change-employees-v2 .legend-item[data-series="neutral"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:hover) #2025-salary-change-employees-v2 .slice.neutral,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:hover) #2025-salary-change-employees-v2 .value-labels-inner[data-series="neutral"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:hover) #2025-salary-change-employees-v2 .legend-item[data-series="positive"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:hover) #2025-salary-change-employees-v2 .slice.positive,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:hover) #2025-salary-change-employees-v2 .value-labels-inner[data-series="positive"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:focus-within) #2025-salary-change-employees-v2 .legend-item[data-series="negative"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:focus-within) #2025-salary-change-employees-v2 .slice.negative,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:focus-within) #2025-salary-change-employees-v2 .value-labels-inner[data-series="negative"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:focus-within) #2025-salary-change-employees-v2 .legend-item[data-series="neutral"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:focus-within) #2025-salary-change-employees-v2 .slice.neutral,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:focus-within) #2025-salary-change-employees-v2 .value-labels-inner[data-series="neutral"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:focus-within) #2025-salary-change-employees-v2 .legend-item[data-series="positive"],
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:focus-within) #2025-salary-change-employees-v2 .slice.positive,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:focus-within) #2025-salary-change-employees-v2 .value-labels-inner[data-series="positive"] {
          opacity: 1;
        }

        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:hover) #2025-salary-change-employees-v2 .legend-item[data-series="negative"] rect.legend-item-container,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:hover) #2025-salary-change-employees-v2 .legend-item[data-series="neutral"] rect.legend-item-container,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:hover) #2025-salary-change-employees-v2 .legend-item[data-series="positive"] rect.legend-item-container,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:focus-within) #2025-salary-change-employees-v2 .legend-item[data-series="negative"] rect.legend-item-container,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:focus-within) #2025-salary-change-employees-v2 .legend-item[data-series="neutral"] rect.legend-item-container,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:focus-within) #2025-salary-change-employees-v2 .legend-item[data-series="positive"] rect.legend-item-container {
          stroke: var(--color-text-dark);
          stroke-width: 1.5;
        }

        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:hover) #2025-salary-change-employees-v2 .slice.negative,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:hover) #2025-salary-change-employees-v2 .slice.neutral,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:hover) #2025-salary-change-employees-v2 .slice.positive,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="negative"]:focus-within) #2025-salary-change-employees-v2 .slice.negative,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="neutral"]:focus-within) #2025-salary-change-employees-v2 .slice.neutral,
        svg:has(#2025-salary-change-employees-v2 .legend-item[data-series="positive"]:focus-within) #2025-salary-change-employees-v2 .slice.positive {
          fill-opacity: 1;
          stroke-width: 3;
        }
      ]]>
    </style>
    <filter id="label-bg" x="-15%" y="-40%" width="130%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="5" result="blurred"/>
      <feComponentTransfer in="blurred" result="rounded">
        <feFuncA type="linear" slope="20" intercept="-5"/>
      </feComponentTransfer>
      <feFlood flood-color="white" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="rounded" operator="in" result="bg"/>
      <feMerge>
        <feMergeNode in="bg"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="2025-salary-change-employees-v2">
    <g class="chart-header">
      <g class="chart-title">
        <text x="20" y="35" class="title-text">Salary change</text>
        <text x="20" y="55" class="subtitle-text">Employee respondents (709)</text>
      </g>

      <g class="legend scale-three-trend">
        <g class="legend-row">
          <g class="legend-item" data-series="negative" tabindex="0">
            <rect class="legend-item-container" x="400" y="20" width="72"/>
            <circle class="negative" cx="413" cy="31"/>
            <text class="legend-label" x="421" y="35">Decrease</text>
          </g>

          <g class="legend-item" data-series="neutral" tabindex="0">
            <rect class="legend-item-container" x="482" y="20" width="79"/>
            <circle class="neutral" cx="495" cy="31"/>
            <text class="legend-label" x="503" y="35">No change</text>
          </g>

          <g class="legend-item" data-series="positive" tabindex="0">
            <rect class="legend-item-container" x="571" y="20" width="69"/>
            <circle class="positive" cx="584" cy="31"/>
            <text class="legend-label" x="592" y="35">Increase</text>
          </g>
        </g>
      </g>
    </g>

    <g class="chart-area donut-chart scale-three-trend" transform="translate(0 33) translate(330 222) scale(1.2) translate(-330 -222)">
      <path class="slice negative" d="M180 222 A150 150 0 0 1 181.24 202.78 L270.49 214.31 A60 60 0 0 0 270 222 Z"/>
      <path class="slice neutral" d="M181.24 202.78 A150 150 0 0 1 236.70 104.55 L292.68 175.02 A60 60 0 0 0 270.49 214.31 Z"/>
      <path class="slice positive" d="M236.70 104.55 A150 150 0 0 1 480 222 L390 222 A60 60 0 0 0 292.68 175.02 Z"/>

      <text font-size="14" class="value-labels-inner" data-series="positive" text-anchor="middle"><tspan x="376" y="127">71.4%</tspan></text>
      <text font-size="14" class="value-labels-inner" data-series="neutral" text-anchor="middle"><tspan x="239" y="170">24.5%</tspan></text>
    </g>
  </g>

</svg>
