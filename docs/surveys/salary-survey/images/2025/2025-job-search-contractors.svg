<svg viewBox="0 40 660 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-job-search-contractors">

    <g class="title">
      <text font-size="14"><tspan x="40" y="65">Job search status</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="82">Contractors (n=46)</tspan></text>
    </g>

    <g class="donut-chart scale-job-search-status">

      <!-- Not looking — open to offers: 34.8% -->
      <path class="slice open-offers" d="M 220,90 A 150 150 0 0 1 342.5,326.5 L 269,274.6 A 60 60 0 0 0 220,180 Z"/>

      <!-- Looking, open to permanent role: 23.9% -->
      <path class="slice open-to-permanent" d="M 342.5,326.5 A 150 150 0 0 1 142.1,368.2 L 188.8,291.3 A 60 60 0 0 0 269,274.6 Z"/>

      <!-- Only contracting while looking: 13.0% -->
      <path class="slice contracting-while-looking" d="M 142.1,368.2 A 150 150 0 0 1 73.1,270.5 L 161.3,252.2 A 60 60 0 0 0 188.8,291.3 Z"/>

      <!-- Not looking — not open: 10.9% -->
      <path class="slice not-open" d="M 73.1,270.5 A 150 150 0 0 1 86.8,171 L 166.7,212.4 A 60 60 0 0 0 161.3,252.2 Z"/>

      <!-- Not looking yet: 10.9% -->
      <path class="slice not-looking-yet" d="M 86.8,171 A 150 150 0 0 1 160.2,102.4 L 196.1,185 A 60 60 0 0 0 166.7,212.4 Z"/>

      <!-- Actively looking: 6.5% -->
      <path class="slice actively-looking" d="M 160.2,102.4 A 150 150 0 0 1 220,90 L 220,180 A 60 60 0 0 0 196.1,185 Z"/>

      <!-- Inner value labels -->
      <text font-size="12" fill="white" text-anchor="middle" font-weight="bold"><tspan x="313" y="196">34.8%</tspan></text>
      <text font-size="12" fill="white" text-anchor="middle" font-weight="bold"><tspan x="241" y="347">23.9%</tspan></text>

    </g>

    <!-- Legend -->
    <g class="legend scale-job-search-status" font-size="10" fill="#50514F">

      <!-- Not looking — open to offers -->
      <rect class="swatch open-offers" x="415" y="162" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="172">Not looking — open to offers (34.8%)</tspan></text>

      <!-- Looking, open to permanent role -->
      <rect class="swatch open-to-permanent" x="415" y="188" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="198">Actively looking, open to permanent role (23.9%)</tspan></text>

      <!-- Only contracting while looking -->
      <rect class="swatch contracting-while-looking" x="415" y="214" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="224">Only contracting while looking for permanent role (13.0%)</tspan></text>

      <!-- Not looking — not open -->
      <rect class="swatch not-open" x="415" y="240" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="250">Not looking — not open to offers (10.9%)</tspan></text>

      <!-- Not looking yet -->
      <rect class="swatch not-looking-yet" x="415" y="266" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="276">Not looking, but expect to be within a year (10.9%)</tspan></text>

      <!-- Actively looking -->
      <rect class="swatch actively-looking" x="415" y="292" width="12" height="12"/>
      <text text-anchor="start"><tspan x="433" y="302">Actively looking (6.5%)</tspan></text>

    </g>

  </g>

</svg>
