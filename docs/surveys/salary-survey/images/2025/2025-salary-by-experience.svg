<svg viewBox="0 40 660 315" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style type="text/css">
      <![CDATA[
        @import url(/_static/survey/css/2025-svg.css);
      ]]>
    </style>
  </defs>

  <g id="2025-salary-by-experience" class="scale-salary-lines">

    <g class="title">
      <text font-size="14"><tspan x="40" y="20">Median salary (USD) by years of experience</tspan></text>
      <text font-size="12" class="subtitle"><tspan x="40" y="36">Employees — worldwide, North America, and Europe</tspan></text>
    </g>

    <!-- Scale: y_bottom=305, y_top=109, height=196px for $40K–$160K -->
    <!-- Chart shifted down 19px from previous to equalise top/bottom gaps (~34px each) -->
    <!-- x positions: 6 bands from x=90 to x=570 (gap=96px) -->

    <!-- Legend (right-aligned, 15px margins, boxed, above chart area) -->
    <rect x="360" y="55" width="285" height="20" fill="white" stroke="#CCCCCC" stroke-width="1" rx="2"/>
    <line x1="366" y1="65" x2="388" y2="65" class="worldwide" stroke-width="2.5"/>
    <circle cx="377" cy="65" r="4" class="worldwide"/>
    <text font-size="10" fill="#252521"><tspan x="393" y="69">Worldwide</tspan></text>
    <line x1="459" y1="65" x2="481" y2="65" class="north-america" stroke-width="2.5"/>
    <circle cx="470" cy="65" r="4" class="north-america"/>
    <text font-size="10" fill="#252521"><tspan x="486" y="69">North America</tspan></text>
    <line x1="576" y1="65" x2="598" y2="65" class="europe" stroke-width="2.5"/>
    <circle cx="587" cy="65" r="4" class="europe"/>
    <text font-size="10" fill="#252521"><tspan x="603" y="69">Europe</tspan></text>

    <!-- Horizontal grid lines -->
    <!-- y($160K)=109.0, y($140K)=135.8, y($120K)=162.7, y($100K)=189.6 -->
    <!-- y($80K)=216.5, y($60K)=243.4, y($40K)=270.2 -->
    <line x1="70" y1="109.0" x2="590" y2="109.0" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="135.8" x2="590" y2="135.8" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="162.7" x2="590" y2="162.7" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="189.6" x2="590" y2="189.6" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="216.5" x2="590" y2="216.5" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="243.4" x2="590" y2="243.4" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="70" y1="270.2" x2="590" y2="270.2" stroke="#E8E8E8" stroke-width="1"/>

    <!-- Y-axis labels -->
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="273">$40K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="246">$60K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="220">$80K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="193">$100K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="166">$120K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="139">$140K</tspan></text>
    <text font-size="9" text-anchor="end" fill="#888888"><tspan x="65" y="112">$160K</tspan></text>

    <!-- X-axis line and labels -->
    <line x1="70" y1="305" x2="590" y2="305" stroke="#CCCCCC" stroke-width="1"/>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="90"  y="318">0–2 yrs</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="186" y="318">2–5 yrs</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="282" y="318">5–10 yrs</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="378" y="318">10–15 yrs</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="474" y="318">15–20 yrs</tspan></text>
    <text font-size="9" text-anchor="middle" fill="#252521"><tspan x="570" y="318">20+ yrs</tspan></text>

    <!-- Worldwide line: #E4774E -->
    <polyline points="90,234.4 186,234.1 282,207.1 378,183.2 474,179.0 570,162.7"
              fill="none" class="worldwide" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="90"  cy="234.4" r="4" class="worldwide"/>
    <circle cx="186" cy="234.1" r="4" class="worldwide"/>
    <circle cx="282" cy="207.1" r="4" class="worldwide"/>
    <circle cx="378" cy="183.2" r="4" class="worldwide"/>
    <circle cx="474" cy="179.0" r="4" class="worldwide"/>
    <circle cx="570" cy="162.7" r="4" class="worldwide"/>

    <!-- North America line: #1A4A8C -->
    <polyline points="90,209.4 186,207.9 282,178.8 378,137.9 474,129.1 570,140.5"
              fill="none" class="north-america" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="90"  cy="209.4" r="4" class="north-america"/>
    <circle cx="186" cy="207.9" r="4" class="north-america"/>
    <circle cx="282" cy="178.8" r="4" class="north-america"/>
    <circle cx="378" cy="137.9" r="4" class="north-america"/>
    <circle cx="474" cy="129.1" r="4" class="north-america"/>
    <circle cx="570" cy="140.5" r="4" class="north-america"/>

    <!-- Europe line: #82A555 -->
    <polyline points="90,235.9 186,258.7 282,229.9 378,223.5 474,218.1 570,217.7"
              fill="none" class="europe" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="90"  cy="235.9" r="4" class="europe"/>
    <circle cx="186" cy="258.7" r="4" class="europe"/>
    <circle cx="282" cy="229.9" r="4" class="europe"/>
    <circle cx="378" cy="223.5" r="4" class="europe"/>
    <circle cx="474" cy="218.1" r="4" class="europe"/>
    <circle cx="570" cy="217.7" r="4" class="europe"/>

  </g>

</svg>
